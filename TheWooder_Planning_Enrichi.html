// ═══════════════════════════════════════
// COURS CONTENT
// ═══════════════════════════════════════
var COURS = {
"Comprendre le positionnement — qu'est-ce qui te rend unique vs Mobalpa, Schmidt, IKEA ?": `
<h3>Le positionnement, c'est quoi ?</h3>
<p>C'est la place que tu occupes dans la tête de ton client. Quand quelqu'un pense "meuble sur-mesure", qu'est-ce qui lui vient en tête ? IKEA = pas cher, prêt-à-monter. Mobalpa = cuisine haut de gamme, showroom. The Wooder doit occuper une place différente et claire.</p>

<h3>La carte des concurrents</h3>
<h4>Axe 1 : Prix vs Qualité</h4>
<p>IKEA → prix bas, qualité standard, industriel. Schmidt/Mobalpa → prix élevé, qualité haute, réseau franchise. The Wooder → prix juste (artisan local, pas de showroom), qualité artisanale.</p>
<h4>Axe 2 : Standardisé vs Sur-mesure</h4>
<p>IKEA → 100% standard. Schmidt → semi-sur-mesure (modules). The Wooder → 100% sur-mesure, configuré par le client, fabriqué par un artisan.</p>

<h3>Ton positionnement The Wooder</h3>
<div class="tip">💡 Formule : "The Wooder est la première plateforme qui permet de commander du mobilier 100% sur-mesure, fabriqué par un artisan menuisier local, au juste prix — sans passer par un réseau de franchise ni un showroom."</div>

<h3>Tes 4 différenciateurs</h3>
<ul>
<li><strong>Artisan local</strong> — pas une usine, un vrai menuisier de ta ville</li>
<li><strong>100% sur-mesure</strong> — configurateur 3D, pas des modules prédéfinis</li>
<li><strong>Prix juste</strong> — pas de showroom, pas de franchise, pas de marge intermédiaire</li>
<li><strong>Transparence</strong> — le client voit le prix en temps réel, choisit ses matériaux, visualise en 3D</li>
</ul>

<h3>Exercice pratique</h3>
<p>Complète cette phrase pour 3 personnes différentes (ami, artisan, investisseur) :</p>
<p>"The Wooder, c'est comme [référence connue] mais pour [ton marché], parce que [ton avantage unique]."</p>
<div class="example">✅ Exemple : "The Wooder, c'est comme Doctolib mais pour le meuble sur-mesure : tu choisis ce que tu veux en ligne, et on te met en relation avec le bon artisan près de chez toi."</div>
`,

"Définir tes personas (client type + artisan type) — exercice pratique": `
<h3>Un persona, c'est quoi ?</h3>
<p>C'est un portrait-robot de ton client idéal. Pas "tout le monde" — une personne précise, avec un prénom, un âge, des frustrations, des envies. Ça te permet de parler directement à elle dans ta communication.</p>

<h3>Persona Client : Marie, 38 ans</h3>
<ul>
<li><strong>Situation</strong> : propriétaire d'un appartement de 75m² à Lyon, en couple, 1 enfant</li>
<li><strong>Projet</strong> : un dressing sur-mesure dans une chambre avec plafond mansardé</li>
<li><strong>Budget</strong> : 2 000–4 000 €, prête à investir si elle a de la visibilité</li>
<li><strong>Frustrations</strong> : IKEA ne fait pas de mansardé. Schmidt demande 6 000 €. Elle ne sait pas comment trouver un menuisier fiable.</li>
<li><strong>Ce qu'elle veut</strong> : voir le résultat avant de commander, connaître le prix, savoir qui va fabriquer</li>
<li><strong>Où elle cherche</strong> : Instagram (inspiration), Google ("dressing sur-mesure Lyon"), Pinterest</li>
</ul>
<div class="tip">💡 Quand tu écris un post Instagram, tu écris pour Marie. Pas pour "les gens".</div>

<h3>Persona Artisan : Thomas, 42 ans</h3>
<ul>
<li><strong>Situation</strong> : menuisier indépendant depuis 8 ans, atelier en Île-de-France, 1 employé</li>
<li><strong>CA</strong> : 120 000 €/an, marge nette ~15%</li>
<li><strong>Frustrations</strong> : passe 25% de son temps en devis gratuits qui n'aboutissent pas. Les clients comparent avec IKEA. Le bouche-à-oreille ne suffit plus.</li>
<li><strong>Ce qu'il veut</strong> : des commandes qualifiées (dimensions, matériaux, budget déjà définis), ne plus se déplacer pour rien</li>
<li><strong>Ce qui le freine</strong> : peur de la technologie, peur de perdre sa liberté, méfiance envers les plateformes</li>
</ul>

<h3>Exercice</h3>
<p>Adapte ces personas à TA réalité. Pense à tes vrais clients passés :</p>
<ul>
<li>Quel était leur projet le plus fréquent ?</li>
<li>Quel était leur budget moyen ?</li>
<li>Qu'est-ce qui les a convaincus de travailler avec toi ?</li>
<li>Qu'est-ce qui les a le plus frustrés dans le processus ?</li>
</ul>
`,

"Le branding — nom, logo, charte graphique, ton de voix": `
<h3>Le branding, c'est bien plus qu'un logo</h3>
<p>C'est l'ensemble des perceptions que les gens ont de ta marque : ce qu'ils voient, ce qu'ils ressentent, ce qu'ils racontent aux autres. Le logo est la partie visible, mais le branding inclut aussi les couleurs, les mots que tu utilises, l'ambiance que tu dégages.</p>

<h3>Les piliers du branding The Wooder</h3>

<h4>1. Le nom</h4>
<p>"The Wooder" — jeu de mots entre "wood" (bois) et "the doer" (celui qui fait). C'est mémorable, international, et ça raconte une histoire. Garde-le.</p>

<h4>2. La palette de couleurs</h4>
<ul>
<li><strong>Principale</strong> : noir (#1a1a1a) — élégance, sérieux, pro</li>
<li><strong>Accent</strong> : or/bois (#B8860B) — chaleur, artisanat, noblesse du bois</li>
<li><strong>Fond</strong> : beige chaud (#FAF8F5) — naturel, accueillant</li>
<li><strong>Succès</strong> : vert (#2E7D32) — confiance, validation</li>
</ul>
<div class="tip">💡 Règle : ne jamais utiliser plus de 3-4 couleurs. La cohérence crée la reconnaissance.</div>

<h4>3. La typographie</h4>
<p>Choisis 2 polices max : une pour les titres (forte, distinctive — type Outfit ou Playfair), une pour le texte (lisible, moderne — type DM Sans). Utilise-les partout : site, posts Instagram, factures, emails.</p>

<h4>4. Le ton de voix</h4>
<p>Comment The Wooder parle :</p>
<ul>
<li><strong>Direct</strong> — pas de jargon corporate. "Un meuble fait pour vous, par un artisan près de chez vous."</li>
<li><strong>Expert mais accessible</strong> — tu connais le métier, tu vulgarises sans condescendre</li>
<li><strong>Chaleureux</strong> — le bois, la main, l'humain. Pas froid ni tech.</li>
<li><strong>Confiant</strong> — tu crois en ton produit, ça se sent</li>
</ul>
<div class="example">✅ Bon ton : "Votre bibliothèque, dessinée par vous, fabriquée par un artisan à 20 km de chez vous."<br>❌ Mauvais ton : "Notre solution innovante de marketplace B2C2B pour le secteur du meuble."</div>

<h4>5. L'univers visuel</h4>
<p>Photos : bois brut, ateliers, mains d'artisan, intérieurs chaleureux. Pas de photos de bureau, pas de stock photos corporate. Montre le vrai.</p>
`,

"Différence entre branding et marketing": `
<h3>En une phrase</h3>
<p><strong>Le branding</strong>, c'est qui tu es. <strong>Le marketing</strong>, c'est comment tu le fais savoir.</p>

<h3>Le branding = la fondation</h3>
<p>C'est ton identité : ton nom, tes couleurs, ton logo, ton ton de voix, tes valeurs, ta promesse. Le branding ne change pas tous les mois. C'est ce qui fait qu'on te reconnaît et qu'on se souvient de toi.</p>
<p>Pour The Wooder : "Mobilier sur-mesure, artisan local, prix juste" — c'est du branding. Ça ne bougera pas.</p>

<h3>Le marketing = l'action</h3>
<p>C'est ce que tu fais pour attirer des clients : posts Instagram, pub Google, articles de blog, emails, salons, partenariats. Le marketing change, s'adapte, se teste.</p>
<p>Pour The Wooder : une campagne Instagram "Avant/Après" d'un dressing sur-mesure — c'est du marketing. Tu peux la changer la semaine prochaine.</p>

<h3>Pourquoi c'est important de faire les deux</h3>
<ul>
<li>Marketing sans branding = tu cries sans identité. Personne ne se souvient de toi.</li>
<li>Branding sans marketing = tu es magnifique mais invisible.</li>
</ul>
<div class="tip">💡 Fais le branding EN PREMIER (c'est ce qu'on fait en semaine 2), puis le marketing s'appuie dessus. Chaque post, chaque pub, chaque email doit "sentir" The Wooder.</div>
`,

"Stratégie réseaux sociaux — quel réseau pour quel objectif ?": `

<h4>1. Instagram — ton réseau principal</h4>
<p><strong>Pourquoi :</strong> le meuble, c'est visuel. Instagram est fait pour ça. C'est là que Marie (ton persona) cherche l'inspiration.</p>
<p><strong>Ce que tu postes :</strong></p>
<ul>
<li>Photos avant/après de réalisations</li>
<li>Vidéos courtes (Reels) de fabrication en atelier</li>

<p><strong>Fréquence :</strong> 3-4 posts/semaine + stories quotidiennes</p>

<p><strong>Ce que tu postes :</strong> vidéos satisfaisantes de fabrication (ponçage, assemblage, finition), time-lapses, "POV : tu commandes un meuble sur-mesure"</p>

<p><strong>Ce que tu postes :</strong> épingles de tes réalisations avec lien vers la galerie The Wooder</p>

<div class="tip">💡 Commence par Instagram seul. Maîtrise-le. Ajoute TikTok en phase 2, Pinterest en phase 3. Ne te disperse pas.</div>

<h3>Les 9 premiers posts Instagram</h3>
<p>Ton feed doit raconter une histoire dès qu'on arrive sur ton profil :</p>
<ul>

</ul>
`,

"Le content marketing — créer du contenu qui attire sans vendre": `
<h3>Le principe</h3>
<p>Le content marketing, c'est attirer les gens vers toi en leur donnant de la valeur AVANT de leur demander d'acheter. Tu deviens une ressource, pas un vendeur.</p>

<h3>Les 3 types de contenu</h3>
<h4>1. Contenu inspirationnel</h4>
<p>Photos de beaux intérieurs, avant/après, tendances déco. Ça fait rêver Marie. Elle enregistre, elle partage. Elle revient.</p>

<h4>2. Contenu éducatif</h4>
<p>Tu partages ton expertise de menuisier :</p>
<ul>
<li>"Comment choisir entre chêne et hêtre pour un meuble de salon"</li>
<li>"Les 5 questions à se poser avant de commander un meuble sur-mesure"</li>
<li>"Pourquoi le mélaminé n'est pas du 'faux bois'"</li>
</ul>
<div class="tip">💡 Ce contenu construit ta crédibilité. Marie se dit "ces gens connaissent leur métier, je leur fais confiance".</div>

<h4>3. Contenu behind-the-scenes</h4>
<p>L'atelier, les copeaux, la machine, tes mains, le processus. C'est ce qui crée le lien émotionnel. Les gens veulent voir l'humain derrière le produit.</p>

<h3>La règle 80/20</h3>
<p>80% de contenu qui donne de la valeur (inspiration, éducation, coulisses). 20% de contenu qui vend (offres, promos, call-to-action). Si tu inverses, tu perds ton audience.</p>

<div class="example">✅ Lundi : Reel fabrication (coulisses)<br>✅ Mercredi : Carrousel "Guide des essences de bois" (éducatif)<br>✅ Vendredi : Avant/après d'un meuble livré (inspiration)<br>✅ Dimanche story : "Cette semaine on a livré 3 meubles !" + lien vers la galerie (vente douce)</div>
`,

"Le SEO — comment Google fonctionne, mots-clés, structure de site": `
<h3>Le SEO en 3 minutes</h3>
<p>SEO = Search Engine Optimization. C'est l'art d'apparaître dans les premiers résultats Google quand quelqu'un tape une recherche. C'est du trafic GRATUIT et CONTINU, contrairement à la pub qui s'arrête quand tu arrêtes de payer.</p>

<h3>Comment Google fonctionne</h3>
<p>Google envoie des robots qui lisent toutes les pages de ton site. Ils analysent : de quoi parle cette page ? Est-elle utile ? Est-elle fiable ? Puis ils la classent par rapport à toutes les autres pages qui parlent du même sujet.</p>

<h3>Les mots-clés pour The Wooder</h3>
<h4>Haute intention (les gens prêts à acheter) :</h4>
<ul>
<li>"meuble sur-mesure" — 8 100 recherches/mois</li>
<li>"dressing sur-mesure" — 14 800/mois</li>
<li>"bibliothèque sur-mesure" — 6 600/mois</li>
<li>"menuisier près de chez moi" — 3 600/mois</li>
<li>"meuble sur-mesure prix" — 1 900/mois</li>
</ul>
<h4>Longue traîne (moins de volume, plus facile à ranker) :</h4>
<ul>
<li>"dressing sous pente sur-mesure prix"</li>
<li>"meuble TV sur-mesure bois massif"</li>
<li>"combien coûte un meuble sur-mesure"</li>
</ul>
<div class="tip">💡 Chaque page de ta galerie doit cibler un mot-clé. La page "Bibliothèques" cible "bibliothèque sur-mesure". La page "Dressings" cible "dressing sur-mesure".</div>

<h3>Les 3 piliers du SEO</h3>
<h4>1. Technique</h4>
<p>Site rapide (< 3 sec), responsive mobile, URLs propres, sitemap, HTTPS. Next.js gère bien ça nativement.</p>
<h4>2. Contenu</h4>
<p>Des pages riches avec du texte utile (pas juste des photos). Articles de blog, descriptions de meubles détaillées, FAQ.</p>
<h4>3. Autorité</h4>
<p>D'autres sites qui font des liens vers le tien (backlinks). Articles de presse, annuaires artisans, partenariats.</p>

<h3>Actions concrètes</h3>
<ul>
<li>Chaque page a un titre unique avec le mot-clé principal</li>
<li>Chaque image a un attribut alt descriptif ("bibliotheque-sur-mesure-chene-massif")</li>
<li>Créer une page par catégorie de meuble avec 300+ mots de contenu</li>
<li>Lancer un blog : 1 article/semaine ciblant un mot-clé longue traîne</li>
</ul>
`,

"Storytelling — raconter ton histoire de menuisier devenu entrepreneur": `
<h3>Pourquoi le storytelling est ton arme secrète</h3>
<p>Les gens n'achètent pas un meuble. Ils achètent l'histoire derrière le meuble. Un menuisier qui a vu les artisans se faire écraser par IKEA et qui a décidé de créer une plateforme pour leur donner une chance — c'est puissant.</p>

<h3>La structure du storytelling (en 5 actes)</h3>

<h4>1. La situation de départ</h4>
<p>"J'étais artisan menuisier. Je fabriquais des meubles sur-mesure pour des clients qui m'avaient trouvé par bouche-à-oreille."</p>

<h4>2. Le problème</h4>
<p>"Je passais 25% de mon temps en devis gratuits. Les clients comparaient mes prix avec IKEA. Le digital avançait et moi je restais invisible."</p>

<h4>3. Le déclic</h4>
<p>"Un jour, un client m'a montré un configurateur 3D en ligne et m'a dit : 'Pourquoi vous n'avez pas ça ?' Ce jour-là, j'ai compris que le problème n'était pas le sur-mesure — c'était l'accès au sur-mesure."</p>

<h4>4. La solution</h4>
<p>"J'ai créé The Wooder : une plateforme où le client configure son meuble en 3D, obtient un devis instantané, et un artisan local le fabrique. Le chaînon manquant entre le digital et l'artisanat."</p>

<h4>5. La vision</h4>
<p>"Mon objectif : que chaque personne en France puisse commander un meuble sur-mesure aussi facilement qu'un meuble IKEA, mais fabriqué par un artisan à côté de chez elle."</p>

<div class="tip">💡 Cette histoire, tu la raconteras partout : page "À propos", pitch investisseur, premier post Instagram, interviews presse. Apprends-la par cœur, mais raconte-la naturellement.</div>

<h3>Où utiliser ton storytelling</h3>
<ul>
<li><strong>Instagram</strong> : post de lancement "Pourquoi j'ai créé The Wooder"</li>
<li><strong>Site web</strong> : page "Notre histoire"</li>
<li><strong>Pitch artisan</strong> : "Je suis menuisier comme vous, et j'ai créé un outil pour nous"</li>
<li><strong>Pitch investisseur</strong> : slide 1 du deck</li>
<li><strong>Presse</strong> : angle "le menuisier qui disrupte le meuble sur-mesure"</li>
</ul>
`,

"Acquisition clients — les 5 canaux principaux (SEO, SEA, social, partenariats, bouche-à-oreille)": `
<h3>Les 5 canaux d'acquisition</h3>

<h4>1. SEO (référencement naturel) — gratuit, long terme</h4>
<p>Tu apparais dans Google quand quelqu'un cherche "meuble sur-mesure". Effet cumulatif : chaque article, chaque page travaille pour toi 24h/24. Résultats visibles après 3-6 mois.</p>
<p><strong>Pour The Wooder :</strong> articles de blog, pages catégories, FAQ optimisées.</p>

<h4>2. SEA (publicité payante) — rapide, coûteux</h4>
<p>Google Ads, Instagram Ads. Tu paies pour apparaître. Résultats immédiats mais tu paies à chaque clic. Bon pour tester et accélérer.</p>
<p><strong>Pour The Wooder :</strong> campagnes Instagram ciblées "propriétaires 30-50 ans, intérêt déco/rénovation" + Google Ads sur "meuble sur-mesure [ville]".</p>

<h4>3. Réseaux sociaux (organique) — gratuit, régulier</h4>
<p>Tes posts Instagram, TikTok, Pinterest. Pas de la pub, du contenu. Construit ta communauté et ta crédibilité.</p>
<p><strong>Pour The Wooder :</strong> reels de fabrication, avant/après, stories coulisses.</p>

<h4>4. Partenariats — effet levier</h4>
<p>Architectes d'intérieur, décorateurs, agents immobiliers, blogueurs déco. Ils ont déjà tes clients dans leur réseau.</p>
<p><strong>Pour The Wooder :</strong> un architecte recommande The Wooder à ses clients → commission ou partenariat.</p>

<h4>5. Bouche-à-oreille — le plus puissant</h4>
<p>Un client satisfait en parle à 3 personnes. Un client mécontent en parle à 10. La qualité du produit EST ta meilleure stratégie marketing.</p>
<p><strong>Pour The Wooder :</strong> programme de parrainage (10% de réduction pour le parrain ET le filleul).</p>

<div class="tip">💡 Stratégie The Wooder : SEO + Instagram organique dès maintenant (gratuit). Instagram Ads en phase pré-lancement (budget test 10€/jour). Partenariats en phase lancement. Le bouche-à-oreille viendra naturellement si le produit est bon.</div>
`,

"Funnel de conversion — comment transformer un visiteur en client": `
<h3>Le funnel en 4 étapes</h3>
<p>Un "funnel" (entonnoir), c'est le chemin que parcourt une personne entre "je ne connais pas The Wooder" et "j'ai commandé mon meuble".</p>

<h4>Étape 1 : Découverte (TOFU — Top of Funnel)</h4>
<p>Marie voit un Reel Instagram d'un beau meuble. Elle ne connaît pas encore The Wooder. Elle clique sur le profil.</p>
<p><strong>Objectif :</strong> attirer l'attention. <strong>Contenu :</strong> inspirationnel, viral.</p>

<h4>Étape 2 : Intérêt (MOFU — Middle of Funnel)</h4>
<p>Marie explore le profil, visite le site, regarde la galerie, joue avec le configurateur 3D.</p>
<p><strong>Objectif :</strong> créer l'intérêt. <strong>Contenu :</strong> éducatif, comparatif, FAQ.</p>

<h4>Étape 3 : Décision (BOFU — Bottom of Funnel)</h4>
<p>Marie a configuré son dressing, vu le prix, lu les avis. Elle hésite. Un email de relance lui propose une visite de faisabilité à 80€.</p>
<p><strong>Objectif :</strong> convaincre. <strong>Contenu :</strong> témoignages, garanties, offre de lancement.</p>

<h4>Étape 4 : Action</h4>
<p>Marie commande. L'artisan reçoit la commande. Le meuble est fabriqué et livré.</p>

<div class="tip">💡 À chaque étape, tu perds des gens. C'est normal. Ton job : optimiser chaque étape pour en perdre le moins possible. Si 1 000 personnes voient ton post, 100 visitent le site, 10 configurent un meuble, 2 commandent → ton taux de conversion est de 0,2%. L'objectif est de l'améliorer constamment.</div>

<h3>Le funnel The Wooder concret</h3>
<p>Instagram/Google → Galerie → Configurateur 3D → Devis instantané → Choix artisan → Paiement. Chaque étape doit être fluide, rapide, et rassurante.</p>
`,

"Publicité en ligne — Google Ads vs Facebook/Instagram Ads vs TikTok": `
<h3>Les 3 grandes plateformes</h3>

<h4>Google Ads — la demande existante</h4>
<p>Les gens cherchent activement "meuble sur-mesure Paris". Tu apparais en haut de Google. C'est de la demande chaude — ils veulent acheter MAINTENANT.</p>
<ul>
<li><strong>Coût :</strong> 1-3€ par clic (secteur meuble/déco)</li>
<li><strong>Avantage :</strong> intention d'achat forte</li>
<li><strong>Inconvénient :</strong> volume limité par le nombre de recherches</li>
</ul>

<h4>Instagram/Facebook Ads — la création de demande</h4>
<p>Marie ne cherche pas un meuble, mais elle scrolle Instagram. Une photo sublime d'un dressing sur-mesure apparaît → elle clique → elle découvre The Wooder.</p>
<ul>
<li><strong>Coût :</strong> 0,30-1€ par clic</li>
<li><strong>Avantage :</strong> ciblage ultra-précis (âge, intérêts, localisation), volume illimité, très visuel</li>
<li><strong>Inconvénient :</strong> les gens n'étaient pas en mode "achat"</li>
</ul>

<h4>TikTok Ads — la viralité</h4>
<p>Format vidéo court. Les pubs qui marchent sont celles qui ne ressemblent pas à des pubs.</p>
<ul>
<li><strong>Coût :</strong> 0,10-0,50€ par clic (encore peu cher)</li>
<li><strong>Avantage :</strong> audience jeune propriétaire (25-35 ans), contenu artisanal = parfait pour TikTok</li>
<li><strong>Inconvénient :</strong> conversion plus lente</li>
</ul>

<div class="tip">💡 Stratégie recommandée pour The Wooder :<br>
1. Commence par Instagram Ads (budget 10-15€/jour) — tu cibles les propriétaires 30-50 ans intéressés par déco/rénovation dans ta zone géographique<br>
2. Ajoute Google Ads sur les mots-clés à haute intention quand le site est bien optimisé<br>
3. TikTok en bonus si tu produis déjà du contenu vidéo</div>
`,

"Le copywriting — écrire pour convaincre (titres, CTA, pages de vente)": `
<h3>Le copywriting, c'est l'art de vendre avec des mots</h3>
<p>Chaque mot sur ton site, tes pubs, tes emails, doit travailler pour toi. Le copywriting, c'est écrire pour déclencher une action : cliquer, s'inscrire, commander.</p>

<h3>Les 5 règles d'or</h3>
<h4>1. Parle du client, pas de toi</h4>
<div class="example">❌ "The Wooder est une plateforme innovante de mise en relation"<br>✅ "Votre meuble sur-mesure, fabriqué par un artisan près de chez vous"</div>

<h4>2. Mets le bénéfice en premier, pas la fonctionnalité</h4>
<div class="example">❌ "Configurateur 3D intégré"<br>✅ "Visualisez votre meuble chez vous avant de commander"</div>

<h4>3. Utilise des chiffres concrets</h4>
<div class="example">❌ "Des prix justes"<br>✅ "30 à 50% moins cher qu'un cuisiniste traditionnel"</div>

<h4>4. Crée l'urgence ou la rareté</h4>
<div class="example">"Un seul artisan partenaire par zone — vérifiez si votre ville est encore disponible"</div>

<h4>5. Le CTA (Call To Action) doit être clair et unique</h4>
<div class="example">❌ "En savoir plus / Nous contacter / Voir les offres"<br>✅ "Configurer mon meuble" (un seul bouton, une seule action)</div>

<h3>Exercice : la landing page artisan</h3>
<p>Titre : "Recevez des commandes sur-mesure sans prospecter"<br>
Sous-titre : "The Wooder vous envoie des clients qui ont déjà configuré leur meuble, choisi leurs matériaux et validé le budget."<br>
CTA : "Devenir artisan fondateur"</p>
`,

"Email marketing — newsletters, séquences automatiques, taux d'ouverture": `
<h3>Pourquoi l'email reste le canal #1</h3>
<p>L'email a le meilleur ROI de tous les canaux marketing : 36€ de retour pour chaque 1€ investi en moyenne. Contrairement aux réseaux sociaux, tu possèdes ta liste — personne ne peut te la retirer.</p>

<h3>Les 3 types d'emails pour The Wooder</h3>

<h4>1. Emails transactionnels (automatiques)</h4>
<p>Confirmation de commande, suivi de fabrication, livraison. C'est le minimum vital, déjà prévu dans ton cahier des charges.</p>

<h4>2. Séquence d'onboarding artisan (automatique)</h4>
<p>Quand un artisan s'inscrit, il reçoit une série de 5 emails sur 2 semaines :</p>
<ul>
<li>J+0 : Bienvenue + comment configurer votre profil</li>
<li>J+2 : Comment fonctionne une commande de A à Z</li>
<li>J+5 : L'outil de fabrication — tutoriel</li>
<li>J+8 : Vos premiers clients arrivent — comment bien les accueillir</li>
<li>J+14 : Besoin d'aide ? Contact direct avec le fondateur</li>
</ul>

<h4>3. Newsletter (manuelle, 1-2x/mois)</h4>
<p>Pour les clients : tendances déco, nouvelles réalisations, meubles du mois. Pour les artisans : métriques de la plateforme, nouveautés, conseils business.</p>

<h3>Les métriques à suivre</h3>
<ul>
<li><strong>Taux d'ouverture</strong> : % de gens qui ouvrent ton email. Bon = 25-35%. Dépend du sujet.</li>
<li><strong>Taux de clic</strong> : % qui cliquent sur un lien. Bon = 3-5%.</li>
<li><strong>Taux de désinscription</strong> : si > 1%, tu envoies trop ou pas assez ciblé.</li>
</ul>
<div class="tip">💡 L'objet de l'email est tout. "Votre dressing est prêt" > "Newsletter #12". Sois spécifique, crée la curiosité.</div>
`,

"SEO avancé — structure technique, balises, maillage interne, backlinks": `
<h3>Au-delà des bases</h3>

<h4>Structure technique</h4>
<p>Ton site Next.js doit avoir :</p>
<ul>
<li>URLs propres : /meubles/bibliotheque-sur-mesure (pas /page?id=123)</li>
<li>Balise title unique par page : "Bibliothèque sur-mesure | The Wooder"</li>
<li>Balise meta description : 150 caractères qui donnent envie de cliquer</li>
<li>Balises H1, H2, H3 hiérarchiques (un seul H1 par page)</li>
<li>Images optimisées (WebP, < 100Ko) avec alt text descriptif</li>
<li>Temps de chargement < 3 secondes (PageSpeed > 80)</li>
</ul>

<h4>Maillage interne</h4>
<p>Chaque page doit lier vers d'autres pages pertinentes. La page "Dressing sur-mesure" doit lier vers "Comment choisir ses matériaux" et vers "Nos artisans en Île-de-France". Ça aide Google à comprendre la structure et garde les visiteurs plus longtemps.</p>

<h4>Backlinks (liens entrants)</h4>
<p>Quand un autre site fait un lien vers le tien, Google considère ça comme un vote de confiance. Comment en obtenir :</p>
<ul>
<li>Articles de presse locale ("Un menuisier parisien lance sa plateforme")</li>
<li>Annuaires artisans (CMA, Pages Jaunes pro)</li>
<li>Partenariats avec des blogs déco</li>
<li>Interviews podcasts</li>
</ul>
<div class="tip">💡 1 backlink de qualité (Le Monde, un blog déco reconnu) vaut plus que 100 backlinks d'annuaires douteux.</div>
`,

"Google My Business & référencement local": `
<h3>Pourquoi c'est crucial pour The Wooder</h3>
<p>Quand quelqu'un tape "menuisier sur-mesure Paris" sur Google, les premiers résultats sont la carte Google Maps avec les fiches Google My Business. Si tu n'y es pas, tu es invisible localement.</p>

<h3>Créer ta fiche</h3>
<ul>
<li>Va sur business.google.com</li>
<li>Crée une fiche "The Wooder" dans la catégorie "Menuisier" ou "Fabricant de meubles"</li>
<li>Ajoute : adresse (même si c'est ton atelier), horaires, téléphone, site web</li>
<li>Ajoute 10+ photos de qualité (tes réalisations, ton atelier, toi en train de travailler)</li>
<li>Écris une description avec tes mots-clés ("Mobilier sur-mesure fabriqué par des artisans menuisiers locaux")</li>
</ul>

<h3>Obtenir des avis</h3>
<p>Les avis Google sont le facteur #1 du classement local. Objectif : 20 avis 5 étoiles dans les 3 premiers mois.</p>
<ul>
<li>Demande systématiquement un avis après chaque livraison (email automatique avec lien direct)</li>
<li>Réponds à CHAQUE avis (positif = merci personnalisé, négatif = solution proposée)</li>
</ul>
<div class="tip">💡 À terme, chaque artisan partenaire aura aussi sa fiche Google qui mentionne The Wooder — effet réseau puissant pour le SEO local.</div>
`,

"Les partenariats stratégiques — avec qui s'allier et comment": `
<h3>Les 5 types de partenaires pour The Wooder</h3>

<h4>1. Architectes d'intérieur</h4>
<p>Ils ont des clients qui veulent du sur-mesure mais ne savent pas à qui s'adresser. Proposition : commission de 5% sur chaque commande référée, ou accès gratuit au configurateur pour leurs projets.</p>

<h4>2. Agents immobiliers</h4>
<p>Un client qui achète un appartement a souvent besoin d'aménagements sur-mesure dans les 6 mois. Proposition : flyer The Wooder dans le dossier de bienvenue, code promo exclusif.</p>

<h4>3. Blogueurs/influenceurs déco</h4>
<p>Échange : tu leur offres un meuble (ou une réduction), ils documentent le processus sur leurs réseaux. Cherche des micro-influenceurs (5K-50K abonnés) — plus authentiques et moins chers.</p>

<h4>4. Fournisseurs de matériaux</h4>
<p>Les négoces bois (Dispano, Silverwood) ont intérêt à ce que plus de meubles soient fabriqués. Proposition : partenariat de visibilité croisée.</p>

<h4>5. Entreprises de rénovation</h4>
<p>Après des travaux, les gens veulent des meubles adaptés. Proposition : recommandation croisée.</p>

<h3>Comment approcher un partenaire</h3>
<div class="example">✅ "Bonjour [prénom], je suis [ton prénom], fondateur de The Wooder. On connecte des particuliers avec des artisans menuisiers locaux pour du mobilier sur-mesure. Je pense qu'on pourrait apporter de la valeur à vos clients — seriez-vous disponible pour un café de 20 minutes ?"</div>
<div class="tip">💡 Toujours proposer ce que TU apportes à EUX en premier. Pas ce que tu veux d'eux.</div>
`,

"Les relations presse — comment obtenir de la couverture média": `
<h3>Pourquoi la presse s'intéresserait à The Wooder</h3>
<p>Ton histoire coche toutes les cases : artisan qui se réinvente, tech au service de l'artisanat, consommation locale, anti-IKEA. Les journalistes adorent ça.</p>

<h3>Le communiqué de presse</h3>
<p>Structure en 5 paragraphes :</p>
<ul>
<li><strong>Titre accrocheur</strong> : "Un menuisier crée la première plateforme de mobilier sur-mesure artisanal"</li>
<li><strong>Chapô</strong> : qui, quoi, où, quand, pourquoi en 2 phrases</li>
<li><strong>Le problème</strong> : les artisans perdent face au digital, les clients n'ont pas accès au sur-mesure</li>
<li><strong>La solution</strong> : The Wooder, comment ça marche</li>
<li><strong>L'ambition</strong> : objectifs, prochaines étapes, chiffres clés</li>
</ul>

<h3>Qui contacter</h3>
<ul>
<li><strong>Presse locale</strong> : Le Parisien, Actu.fr, France 3 régions — angle "entrepreneur local"</li>
<li><strong>Presse spécialisée</strong> : Le Journal du Bois, Artisans Mag, BatiActu — angle métier</li>
<li><strong>Presse startup</strong> : Maddyness, FrenchWeb, BFM Business — angle tech/innovation</li>
<li><strong>Presse déco</strong> : Côté Maison, Marie Claire Maison, AD — angle produit</li>
</ul>
<div class="tip">💡 Envoie un email court et personnalisé, jamais de mail générique. "J'ai lu votre article sur [sujet], et je pense que The Wooder pourrait intéresser vos lecteurs parce que..."</div>
`,

"Community management — construire une communauté engagée": `
<h3>Une communauté vs une audience</h3>
<p>Une audience te regarde. Une communauté interagit, partage, défend ta marque. L'objectif de The Wooder : créer une communauté d'artisans fiers d'en faire partie et de clients qui deviennent ambassadeurs.</p>

<h3>Le groupe artisans fondateurs</h3>
<p>Crée un groupe WhatsApp ou Discord privé pour tes 20 artisans fondateurs :</p>
<ul>
<li>Canal #général : discussions, questions, entraide</li>
<li>Canal #commandes : notifications de nouvelles commandes</li>
<li>Canal #retours : feedback sur la plateforme</li>
<li>Canal #victoires : partager les réalisations, les avis clients positifs</li>
</ul>
<div class="tip">💡 Sois présent et réactif. Réponds dans l'heure. Ce groupe est ton pouls — c'est là que tu sauras si ça marche ou pas.</div>

<h3>Engagement sur les réseaux</h3>
<ul>
<li>Réponds à CHAQUE commentaire et DM dans les 2 heures</li>
<li>Pose des questions dans tes posts ("Vous préférez le chêne ou le noyer ?")</li>
<li>Repartage le contenu de tes artisans et de tes clients</li>
<li>Organise des sondages en stories</li>
<li>Fais des lives atelier (1x/mois)</li>
</ul>
`,

"La preuve sociale — avis, témoignages, études de cas": `
<h3>Pourquoi c'est déterminant</h3>
<p>92% des consommateurs lisent les avis en ligne avant d'acheter. Sans preuve sociale, ton site est une promesse vide. Avec, c'est une certitude.</p>

<h3>Les 4 formes de preuve sociale</h3>

<h4>1. Avis clients</h4>
<p>Étoiles + commentaire. Objectif : en afficher sur chaque page meuble. Système intégré au dashboard + Google.</p>

<h4>2. Témoignages détaillés</h4>
<p>Plus long qu'un avis. "Marie, 38 ans, Lyon" raconte son expérience du configurateur à la livraison. Avec photo du meuble chez elle.</p>

<h4>3. Études de cas (avant/après)</h4>
<p>Le format roi : photo de la pièce vide → configuration 3D → photo du meuble installé. Montre le processus complet.</p>

<h4>4. Chiffres</h4>
<p>"47 meubles livrés", "20 artisans partenaires", "4.8/5 de satisfaction". Les chiffres rassurent, même petits au début.</p>

<div class="tip">💡 Au début tu n'as pas d'avis ? Solutions :<br>
- Offre un meuble à prix coûtant à 2-3 personnes en échange d'un témoignage détaillé + photos<br>
- Demande des témoignages à tes anciens clients menuisier (ils parlent de toi, pas de la plateforme, mais ça marche)<br>
- Fais une bêta gratuite avec documentation vidéo</div>
`,

"Lancement de produit — stratégie de teasing, countdown, exclusivité": `
<h3>Les 3 phases d'un lancement réussi</h3>

<h4>Phase 1 : Teasing (4 semaines avant)</h4>
<p>Crée l'anticipation sans tout dévoiler :</p>
<ul>
<li>Posts mystère : "Quelque chose arrive pour les amoureux du sur-mesure..."</li>
<li>Behind-the-scenes de la construction de la plateforme</li>
<li>Page waitlist : "Soyez les premiers à découvrir The Wooder" → collecte des emails</li>
</ul>

<h4>Phase 2 : Révélation (1 semaine avant)</h4>
<p>Dévoile tout :</p>
<ul>
<li>Vidéo de présentation complète (2 min max)</li>
<li>Série de posts "Comment ça marche"</li>
<li>Offre de lancement exclusive pour les inscrits waitlist</li>
<li>Countdown en stories</li>
</ul>

<h4>Phase 3 : Lancement (Jour J + 1 semaine)</h4>
<ul>
<li>Post d'annonce officiel sur tous les réseaux</li>
<li>Envoi email à toute la waitlist</li>
<li>Communiqué de presse</li>
<li>Activation de toutes les campagnes pub</li>
<li>Offre limitée : "Les 50 premières commandes avec -15%"</li>
</ul>
<div class="tip">💡 L'exclusivité crée la désirabilité. "Artisan fondateur" est déjà un statut exclusif — joue dessus aussi côté client : "Accès prioritaire", "Membre fondateur", "Early adopter".</div>
`,

"Métriques & analytics — Google Analytics, taux de conversion, coût d'acquisition": `
<h3>Les 7 métriques qui comptent pour The Wooder</h3>

<h4>1. Visiteurs uniques</h4>
<p>Combien de personnes visitent ton site par mois. Objectif lancement : 1 000/mois.</p>

<h4>2. Taux de conversion visiteur → configuration</h4>
<p>% de visiteurs qui lancent le configurateur 3D. Bon = 10-15%.</p>

<h4>3. Taux de conversion configuration → commande</h4>
<p>% de configurations qui deviennent des commandes. Bon = 2-5%.</p>

<h4>4. Coût d'acquisition client (CAC)</h4>
<p>Combien tu dépenses en marketing pour obtenir 1 client. Si tu dépenses 500€ de pub et obtiens 5 commandes → CAC = 100€.</p>

<h4>5. Valeur moyenne de commande (AOV)</h4>
<p>Prix moyen d'une commande. Objectif : 2 000-4 000€.</p>

<h4>6. Nombre d'artisans actifs</h4>
<p>Artisans qui ont reçu au moins 1 commande dans le mois.</p>

<h4>7. NPS (Net Promoter Score)</h4>
<p>"Sur une échelle de 0 à 10, recommanderiez-vous The Wooder ?" Si > 50, excellent.</p>

<h3>Outils à installer</h3>
<ul>
<li><strong>Google Analytics 4</strong> : trafic, pages vues, conversions. Gratuit.</li>
<li><strong>Hotjar</strong> (gratuit jusqu'à 35 sessions/jour) : cartes de chaleur, enregistrements de sessions. Tu vois exactement où les gens cliquent et où ils abandonnent.</li>
<li><strong>Google Search Console</strong> : quels mots-clés t'amènent du trafic. Gratuit.</li>
</ul>
<div class="tip">💡 Règle : si tu ne mesures pas, tu ne peux pas améliorer. Installe les outils DÈS le premier jour de la bêta.</div>
`,

"Publicité payante en pratique — créer ta première campagne": `
<h3>Ta première campagne Instagram Ads, étape par étape</h3>

<h4>1. Objectif : Trafic vers le site</h4>
<p>Pas "notoriété", pas "engagement". Tu veux des gens sur ton site.</p>

<h4>2. Audience</h4>
<ul>
<li>Localisation : ta zone de couverture artisan (ex: Île-de-France)</li>
<li>Âge : 28-55 ans</li>
<li>Intérêts : décoration intérieure, rénovation, architecture, meubles, bricolage</li>
<li>Comportement : propriétaires immobiliers</li>
</ul>

<h4>3. Visuels</h4>
<p>Prépare 3 visuels différents pour tester :</p>
<ul>
<li>Photo avant/après d'un meuble (format carré)</li>
<li>Vidéo courte du configurateur 3D (15 sec)</li>
<li>Carrousel "Du clic à la livraison" (4 images)</li>
</ul>

<h4>4. Texte</h4>
<div class="example">✅ "Votre dressing sur-mesure, fabriqué par un artisan à côté de chez vous. Configurez-le en 3D, obtenez votre devis en 2 minutes. → Configurer mon meuble"</div>

<h4>5. Budget</h4>
<p>Commence à 10€/jour pendant 7 jours. Analyse les résultats. Double le budget sur le visuel qui marche le mieux, arrête les autres.</p>

<h4>6. Mesurer</h4>
<p>Après 7 jours, regarde : coût par clic (bon < 1€), taux de clic (bon > 1%), nombre de configurations lancées.</p>
<div class="tip">💡 Ne juge jamais une pub en moins de 3 jours. L'algorithme a besoin de temps pour optimiser. Et ne change jamais tout en même temps — change un seul élément à la fois pour savoir ce qui fonctionne.</div>
`,

"Retargeting — comment relancer les visiteurs qui n'ont pas commandé": `
<h3>Le retargeting, c'est quoi ?</h3>
<p>97% des gens qui visitent ton site ne commandent pas du premier coup. Le retargeting, c'est leur montrer des pubs spécifiques APRÈS leur visite, pour les faire revenir.</p>

<h3>Comment ça marche</h3>
<p>Tu installes un "pixel" Facebook/Instagram sur ton site (un petit bout de code). Ce pixel identifie les visiteurs. Ensuite tu crées une campagne qui cible spécifiquement ces personnes.</p>

<h3>Les 3 audiences de retargeting pour The Wooder</h3>
<ul>
<li><strong>Visiteurs galerie</strong> : ils ont regardé des meubles mais n'ont pas configuré → montre-leur un carrousel des meubles les plus populaires</li>
<li><strong>Configurateurs abandonnés</strong> : ils ont lancé le configurateur mais pas commandé → montre-leur un témoignage client + "Reprenez votre configuration"</li>
<li><strong>Visiteurs page prix</strong> : ils ont vu le prix mais hésitent → montre-leur l'offre visite de faisabilité à 80€ (rassurance)</li>
</ul>
<div class="tip">💡 Le retargeting est 3 à 5x plus efficace que les pubs classiques parce que tu cibles des gens qui te connaissent déjà. Budget recommandé : 5€/jour, séparé de ton budget pub principal.</div>
`,

"Growth hacking — techniques de croissance rapide pour startups": `
<h3>Le growth hacking en bref</h3>
<p>C'est une mentalité : tester beaucoup, mesurer tout, et doubler ce qui marche. Pas de gros budgets, de l'ingéniosité.</p>

<h3>5 techniques applicables à The Wooder</h3>

<h4>1. Le programme de parrainage</h4>
<p>Client satisfait → partage un code promo → son ami commande → les deux ont 10% de réduction. Coût : ta marge sur une commande. Gain : un client qualifié.</p>

<h4>2. Le contenu viral</h4>
<p>Un time-lapse de fabrication d'un meuble en 30 secondes peut faire 100K vues sur TikTok. Coût : 0€. Investis dans 1 bon Reel par semaine.</p>

<h4>3. L'exclusivité géographique</h4>
<p>Tu as déjà ce mécanisme : 1 artisan par zone. Utilise-le comme levier marketing côté CLIENT aussi : "The Wooder est disponible dans votre quartier !" crée un sentiment de privilège.</p>

<h4>4. Le partenariat à effet de levier</h4>
<p>Un architecte d'intérieur avec 10 000 followers Instagram qui montre un meuble The Wooder dans un projet = des centaines de visiteurs qualifiés. Coût : un meuble à prix coûtant.</p>

<h4>5. La liste d'attente stratégique</h4>
<p>Avant d'ouvrir une nouvelle zone : "The Wooder arrive à Bordeaux — inscrivez-vous pour être prévenu en premier." Tu mesures la demande AVANT de chercher un artisan.</p>
<div class="tip">💡 Le growth hacking, c'est pas tricher. C'est être malin avec peu de moyens. Teste une technique par semaine, mesure, garde ou jette.</div>
`,

"La rétention — comment garder ses clients (NPS, satisfaction, fidélisation)": `
<h3>Acquérir un client coûte 5x plus cher que de le garder</h3>
<p>Un client qui a commandé un dressing reviendra pour une bibliothèque, un meuble TV, un bureau. Si tu le perds, tu dois payer à nouveau pour en trouver un autre.</p>

<h3>Le NPS (Net Promoter Score)</h3>
<p>Question unique envoyée après livraison : "De 0 à 10, recommanderiez-vous The Wooder à un ami ?"</p>
<ul>
<li>9-10 = Promoteurs (tes ambassadeurs)</li>
<li>7-8 = Passifs (satisfaits mais pas enthousiastes)</li>
<li>0-6 = Détracteurs (risque de mauvais avis)</li>
</ul>
<p>NPS = % promoteurs - % détracteurs. Objectif : > 50.</p>

<h3>5 leviers de rétention pour The Wooder</h3>
<ul>
<li><strong>Email post-livraison J+30</strong> : "Comment se porte votre meuble ? Besoin d'un autre projet ?"</li>
<li><strong>Programme fidélité</strong> : -10% sur la 2e commande, -15% sur la 3e</li>
<li><strong>Contenu exclusif</strong> : newsletter "Tendances déco" mensuelle aux anciens clients</li>
<li><strong>Anniversaire de commande</strong> : "Il y a 1 an, on fabriquait votre bibliothèque. Envie d'un nouveau projet ?"</li>
<li><strong>Parrainage</strong> : récompenser les clients qui recommandent</li>
</ul>
<div class="tip">💡 Un détracteur (note 0-6) doit être contacté personnellement dans les 24h. Comprends le problème, propose une solution. Un détracteur transformé en promoteur devient ton meilleur ambassadeur.</div>
`,

"Scaling marketing — passer de 100 à 1000 clients": `
<h3>Quand scaler ?</h3>
<p>Seulement quand tu as validé 3 choses :</p>
<ul>
<li>Le produit fonctionne (clients satisfaits, NPS > 40)</li>
<li>Un canal d'acquisition est rentable (CAC < valeur du client)</li>
<li>Tu peux absorber la demande (assez d'artisans pour couvrir)</li>
</ul>
<p>Si ces 3 conditions sont remplies, tu peux accélérer.</p>

<h3>Comment scaler chaque canal</h3>

<h4>SEO — Passer de 10 à 100 pages</h4>
<p>Créer une page par ville ("Meuble sur-mesure Lyon", "Menuisier Paris 11e"), par type de meuble, par matériau. Chaque page = un nouveau point d'entrée Google.</p>

<h4>Pub — Augmenter le budget de 10x</h4>
<p>Si 10€/jour te rapporte 2 commandes/semaine avec un CAC de 50€ → passe à 50€/jour, puis 100€. Surveille le CAC : s'il augmente trop, tu satures l'audience.</p>

<h4>Partenariats — Systématiser</h4>
<p>Créer un programme d'affiliation formel : chaque architecte/décorateur a un lien unique, touche 5% sur les commandes. Automatiser avec Stripe.</p>

<h4>Géographique — Ouvrir zone par zone</h4>
<p>Modèle : liste d'attente → valider la demande → recruter artisan → ouvrir → communiquer localement. Répéter pour chaque grande agglomération.</p>

<div class="tip">💡 Scaler trop vite est le piège #1 des startups. Mieux vaut 50 clients très satisfaits dans 3 villes que 200 clients mécontents dans 20 villes. La qualité d'abord, le volume ensuite.</div>
`

function countAll(){var total=0,done=0,cours=0;PHASES.forEach(function(ph,pi){ph.semaines.forEach(function(sem,si){sem.blocs.forEach(function(bl,bi){bl.t.forEach(function(t,ti){total++;if(checked[pi+'-'+si+'-'+bi+'-'+ti])done++;if(t.indexOf('📚')===0)cours++})})})});return{total:total,done:done,cours:cours}}
function updateStats(){var c=countAll();document.getElementById('statProgress').textContent=c.done+'/'+c.total;document.getElementById('progressBar').style.width=(c.total?Math.round(c.done/c.total*100):0)+'%';document.getElementById('statCours').textContent=c.cours}

function renderPhases(){var h='';PHASES.forEach(function(ph,i){var cls=i===activePhase?' active':'';var bc=i===activePhase?ph.color:'#e8e4de';var bg=i===activePhase?ph.color+'18':'#fff';h+='<button class="phase-btn'+cls+'" style="border-color:'+bc+';background:'+bg+'" onclick="selectPhase('+i+')"><div class="phase-title" style="color:'+ph.color+'">'+ph.title+'</div><div class="phase-weeks">'+ph.subtitle+'</div></button>'});document.getElementById('phasesContainer').innerHTML=h}

function renderPhaseInfo(){var ph=PHASES[activePhase];document.getElementById('phaseDesc').textContent=ph.desc;var bH='',lH='';for(var k in ph.repart){bH+='<div class="repart-seg" style="width:'+ph.repart[k]+'%;background:'+PILIERS[k].color+'"></div>';lH+='<span class="repart-tag" style="color:'+PILIERS[k].color+'">'+PILIERS[k].emoji+' '+PILIERS[k].label+' '+ph.repart[k]+'%</span>'}document.getElementById('repartBar').innerHTML=bH;document.getElementById('repartLegend').innerHTML=lH}

function renderSemTabs(){var ph=PHASES[activePhase];var h='';ph.semaines.forEach(function(s,i){var cls=i===activeSemaine?' active':'';var col=i===activeSemaine?ph.color:'#999';var bdr=i===activeSemaine?'1.5px solid '+ph.color:'1px solid #e8e4de';h+='<button class="sem-btn'+cls+'" style="color:'+col+';border:'+bdr+'" onclick="selectSemaine('+i+')">S'+s.num+'</button>'});document.getElementById('semTabs').innerHTML=h}

function renderSemaine(){var ph=PHASES[activePhase];var sem=ph.semaines[activeSemaine];document.getElementById('semTitle').textContent='Semaine '+sem.num+' — '+sem.titre;var tH=0;sem.blocs.forEach(function(b){tH+=b.h});document.getElementById('semHours').textContent=tH+'h prévues cette semaine';var h='';sem.blocs.forEach(function(bl,bi){var m=PILIERS[bl.p];var isO=openBlocs[bi]!==false;var dc=0;bl.t.forEach(function(t,ti){if(checked[activePhase+'-'+activeSemaine+'-'+bi+'-'+ti])dc++});var aD=dc===bl.t.length&&bl.t.length>0;h+='<div class="bloc"><button class="bloc-header" onclick="toggleBloc('+bi+')"><span class="bloc-emoji">'+m.emoji+'</span><div class="bloc-info"><div class="bloc-name" style="color:'+m.color+'">'+m.label+'</div><div class="bloc-meta">'+bl.h+'h · '+dc+'/'+bl.t.length+' tâches</div></div>';if(aD)h+='<span class="bloc-done-tag">✓ Fait</span>';h+='<span class="bloc-arrow'+(isO?' open':'')+'">▼</span></button>';if(isO){h+='<div class="bloc-body">';bl.t.forEach(function(t,ti){var k=activePhase+'-'+activeSemaine+'-'+bi+'-'+ti;var d=!!checked[k];var iC=t.indexOf('📚')===0;var cs='background:'+m.color+';border:none';var tc='task-text'+(d?' done':'')+(iC&&!d?' cours':'');h+='<div class="task" onclick="toggleTask(\''+k+'\')"><div class="task-check'+(d?' done':'')+'" style="'+(d?cs:'')+'"></div><div class="'+tc+'">'+t+'</div></div>'});h+='</div>'}h+='</div>'});document.getElementById('blocsContainer').innerHTML=h}

function renderCours(){var h='<div class="cours-section"><h2>Programme de formation marketing</h2><p class="intro">20 modules complets, appliqués à The Wooder. Clique sur un cours pour lire le contenu. Chaque cours est positionné à la semaine où tu en as besoin dans le planning.</p>';PHASES.forEach(function(ph){var cours=[];ph.semaines.forEach(function(sem){sem.blocs.forEach(function(bl){bl.t.forEach(function(t){if(t.indexOf('📚')===0){var name=t.replace('📚 COURS : ','');cours.push({sem:sem.num,titre:name})}})})});if(cours.length){h+='<div class="cours-phase" style="color:'+ph.color+'">Phase '+ph.id+' — '+ph.title+'</div>';cours.forEach(function(c,ci){var cKey=ph.id+'-'+ci;var isOpen=!!openCours[cKey];var content=COURS[c.titre]||'<p>Contenu à venir — demande-moi ce cours dans notre prochaine conversation !</p>';h+='<div class="cours-item"><button class="cours-item-header" onclick="toggleCours(\''+cKey+'\')"><span class="cours-sem">S'+c.sem+'</span><span class="cours-name">'+c.titre+'</span><span class="cours-chevron'+(isOpen?' open':'')+'">▼</span></button>';if(isOpen)h+='<div class="cours-content">'+content+'</div>';h+='</div>'})}});h+='</div>';document.getElementById('viewCours').innerHTML=h}

function selectPhase(i){activePhase=i;activeSemaine=0;openBlocs={};renderAll()}
function selectSemaine(i){activeSemaine=i;openBlocs={};renderAll()}
function toggleBloc(i){openBlocs[i]=openBlocs[i]===false?true:(openBlocs[i]?false:false);renderSemaine()}
function toggleTask(k){checked[k]=!checked[k];saveChecked();renderSemaine();updateStats()}
function toggleCours(k){openCours[k]=!openCours[k];renderCours()}
function switchView(v){document.getElementById('viewPlanning').style.display=v==='planning'?'':'none';document.getElementById('viewCours').style.display=v==='cours'?'':'none';document.getElementById('navPlanning').className='nav-btn'+(v==='planning'?' active':'');document.getElementById('navCours').className='nav-btn'+(v==='cours'?' active':'')}
function renderAll(){renderPhases();renderPhaseInfo();renderSemTabs();renderSemaine();updateStats()}
renderAll();renderCours();

var ETABLI = [{"id": "I", "title": "Sprint opérationnel de 4 semaines", "subtitle": "Plan d'action détaillé pour les 4 premières semaines", "sections": [{"title": "Introduction", "html": "<p><strong>Objectif final</strong> : à la fin de ces 4 semaines, tu dois avoir :\n1. Un prototype de plateforme démontrable de bout en bout\n2. Un outil de calcul validé par 3 à 5 menuisiers CNC sur des critères réels\n3. Un carnet d'apprentissages terrain qui va piloter la suite du développement</p>\n<p><strong>Hypothèse de travail</strong> : ~30 h/semaine. Ajuste si besoin.</p>\n<p><strong>Principe directeur</strong> : les chantiers avancent en parallèle, mais le chantier \"menuisiers\" démarre en premier parce que c'est celui qui dépend d'autres personnes. Les rendez-vous se calent à 2-3 semaines, donc si tu lances la prospection en S1, tu as tes retours en S3–S4 — juste à temps pour réorienter l'outil de calcul.</p>\n<hr />"}, {"title": "Vue d'ensemble — répartition du temps", "html": "<table>\n<thead>\n<tr>\n<th>Semaine</th>\n<th>Prototype plateforme</th>\n<th>Outil de calcul</th>\n<th>Prospection menuisiers</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>S1</strong></td>\n<td>12 h</td>\n<td>8 h</td>\n<td>10 h</td>\n</tr>\n<tr>\n<td><strong>S2</strong></td>\n<td>14 h</td>\n<td>6 h</td>\n<td>10 h</td>\n</tr>\n<tr>\n<td><strong>S3</strong></td>\n<td>10 h</td>\n<td>8 h (prép démo)</td>\n<td>12 h (RDV)</td>\n</tr>\n<tr>\n<td><strong>S4</strong></td>\n<td>6 h</td>\n<td>10 h (corrections)</td>\n<td>14 h (RDV + synthèse)</td>\n</tr>\n</tbody>\n</table>\n<hr />"}, {"title": "SEMAINE 1 — Cadrer et enclencher", "html": "<h3>Prototype plateforme (12 h)</h3>\n<ul>\n<li>Lister précisément ce qui reste à faire pour que le parcours démo tienne debout de bout en bout : client arrive → configure → voit un devis → télécharge les fichiers fabrication (mode \"happy path\" uniquement).</li>\n<li>Identifier les blocages techniques majeurs et les trancher (simplifier si besoin).</li>\n<li>Ne pas chercher la perfection : vise une démo qui ne plante pas devant un inconnu.</li>\n</ul>\n<h3>Outil de calcul (8 h)</h3>\n<ul>\n<li>Faire un <strong>audit honnête</strong> de l'état actuel en listant : ce qui marche, ce qui est approximatif, ce qui est faux.</li>\n<li>Préparer <strong>2 cas de test</strong> : un meuble simple (caisson standard) et un meuble complexe (module multi-tiroirs avec connecteurs).</li>\n<li>Générer les fichiers de sortie sur ces 2 cas. Les ouvrir toi-même dans un visualiseur DXF (LibreCAD, par exemple — gratuit). Vérifier visuellement.</li>\n</ul>\n<h3>Prospection menuisiers (10 h)</h3>\n<ul>\n<li>Constituer une <strong>liste cible de 30 menuisiers CNC</strong> (sources : voir le Kit de prospection, document B).</li>\n<li>Préparer les emails et le script téléphone (voir document B).</li>\n<li>Envoyer les <strong>15 premiers emails</strong> cette semaine. Ne pas tout envoyer d'un coup — tu veux pouvoir ajuster ton message selon les premières réactions.</li>\n</ul>\n<h3>Livrables de fin de S1</h3>\n<ul>\n<li>Liste écrite des chantiers techniques restants sur le prototype, avec priorités</li>\n<li>2 exemples de fichiers de sortie de l'outil de calcul, ouverts et évalués</li>\n<li>30 menuisiers identifiés, 15 emails envoyés</li>\n</ul>\n<hr />"}, {"title": "SEMAINE 2 — Avancer et relancer", "html": "<h3>Prototype plateforme (14 h)</h3>\n<ul>\n<li>Attaque le gros œuvre : finir les blocages identifiés en S1.</li>\n<li>À ce stade, tu dois être capable de dérouler la démo de bout en bout en moins de 5 minutes sans rien casser.</li>\n</ul>\n<h3>Outil de calcul (6 h)</h3>\n<ul>\n<li>Tu <strong>ne touches pas aux fonctionnalités majeures</strong> cette semaine. Tu corriges seulement les erreurs flagrantes identifiées dans l'audit S1.</li>\n<li>Tu laisses volontairement \"suffisamment bon\" ce qui l'est. Les retours menuisiers de S3 vont peut-être tout remettre en cause.</li>\n</ul>\n<h3>Prospection menuisiers (10 h)</h3>\n<ul>\n<li><strong>Relancer les 15 premiers emails</strong> (en règle : 7 jours après le premier envoi, puis 7 jours encore).</li>\n<li><strong>Envoyer les 15 suivants</strong> en ajustant le message selon ce qui a marché ou pas.</li>\n<li><strong>Appeler directement</strong> les 5-10 menuisiers les plus intéressants pour caler des créneaux de RDV.</li>\n<li>Objectif de fin S2 : <strong>3 à 5 RDV confirmés</strong> pour S3 et S4.</li>\n</ul>\n<h3>Livrables de fin de S2</h3>\n<ul>\n<li>Démo de bout en bout qui tient la route (tu peux la montrer à n'importe qui sans préparation)</li>\n<li>3 à 5 rendez-vous menuisiers CNC calés (physique ou visio)</li>\n</ul>\n<h3>Point de contrôle ⚠️</h3>\n<p>Si à la fin de S2 tu as moins de 3 RDV calés, <strong>la prospection devient la priorité numéro 1</strong> en S3. Les autres chantiers attendent.</p>\n<hr />"}, {"title": "SEMAINE 3 — Rencontrer", "html": "<h3>Prototype plateforme (10 h)</h3>\n<ul>\n<li>Finitions cosmétiques et robustesse (ce qui fera mauvais effet en démo).</li>\n<li>Préparer un \"mode démo\" propre : un compte utilisateur prérempli, des configurations d'exemple prêtes, pas d'écran \"en construction\" visible.</li>\n</ul>\n<h3>Outil de calcul — préparation démo (8 h)</h3>\n<ul>\n<li>Utilise la checklist du document C pour faire le tour de contrôle complet.</li>\n<li>Prépare <strong>3 cas d'exemple</strong> différents à montrer pendant les RDV, en exportant tous les fichiers en avance (cutting sheet, DXF, devis).</li>\n<li>Imprime les cutting sheets en papier pour les montrer physiquement si le RDV est en présentiel. C'est l'élément le plus parlant pour un menuisier.</li>\n</ul>\n<h3>Prospection menuisiers — RDV (12 h)</h3>\n<ul>\n<li><strong>Faire 2 à 3 rendez-vous cette semaine</strong>. Compte 1h30 à 2h par RDV (préparation + trajet éventuel + entretien + debrief immédiat).</li>\n<li>Utilise la trame de questions du document B.</li>\n<li><strong>Rédige le compte-rendu structuré dans les 24 heures</strong> après chaque RDV. À chaud, tu te souviens de tout. Trois jours plus tard, 50% est perdu.</li>\n</ul>\n<h3>Livrables de fin de S3</h3>\n<ul>\n<li>2 à 3 comptes-rendus de RDV structurés</li>\n<li>Première liste d'ajustements à apporter à l'outil de calcul (ce que les menuisiers ont signalé)</li>\n</ul>\n<hr />"}, {"title": "SEMAINE 4 — Écouter et réorienter", "html": "<h3>Prototype plateforme (6 h)</h3>\n<ul>\n<li>Tu ralentis volontairement. Tu gardes juste ce qu'il faut pour que la démo reste propre pour les RDV restants.</li>\n</ul>\n<h3>Outil de calcul — corrections ciblées (10 h)</h3>\n<ul>\n<li>Tu analyses les retours menuisiers et tu <strong>priorises</strong> :</li>\n<li><strong>Critique</strong> : ce sans quoi l'outil est inutilisable pour eux → à corriger immédiatement</li>\n<li><strong>Important</strong> : gros gain de valeur → à planifier pour les semaines suivantes</li>\n<li><strong>Nice-to-have</strong> : pas bloquant → à noter et garder en backlog</li>\n<li>Tu corriges les critiques cette semaine, tu planifies les importants.</li>\n</ul>\n<h3>Prospection menuisiers (14 h)</h3>\n<ul>\n<li>Les <strong>2 derniers RDV</strong> (S4).</li>\n<li><strong>Synthèse globale</strong> : que disent-ils en commun ? Où divergent-ils ? Quel signal est clair ? Quel signal est faible ?</li>\n<li>Renvoie un message court à chaque menuisier rencontré pour les remercier. Garde le contact chaud — ce sont tes premiers artisans fondateurs potentiels.</li>\n</ul>\n<h3>Livrables de fin de S4</h3>\n<ul>\n<li><strong>Document de synthèse terrain</strong> (1 à 2 pages) : ce que tu as appris, les 3 conclusions fortes, les 3 questions ouvertes</li>\n<li>Roadmap actualisée de l'outil de calcul (critiques corrigés, importants planifiés, nice-to-have en backlog)</li>\n<li>Relances envoyées aux 5 menuisiers rencontrés</li>\n</ul>\n<hr />"}, {"title": "Indicateurs de succès à la fin des 4 semaines", "html": "<p>Coche chaque ligne honnêtement. Si tu coches moins de 7/10, ne passe pas à la suite avant d'avoir comblé les manques.</p>\n<ul>\n<li>[ ] La démo plateforme passe de bout en bout sans plantage</li>\n<li>[ ] J'ai rencontré au moins 3 menuisiers équipés CNC</li>\n<li>[ ] J'ai des notes structurées pour chacun des RDV</li>\n<li>[ ] Je sais quels formats de fichiers sont réellement attendus sur le terrain</li>\n<li>[ ] Je sais comment les menuisiers chiffrent aujourd'hui</li>\n<li>[ ] J'ai identifié au moins 2 menuisiers ouverts à un pilote</li>\n<li>[ ] Mon outil de calcul a été corrigé sur les points critiques remontés</li>\n<li>[ ] Je peux décrire en 3 phrases ce que ma plateforme apporte concrètement à un menuisier</li>\n<li>[ ] J'ai documenté ce qui NE fonctionne pas dans ma proposition actuelle</li>\n<li>[ ] J'ai une liste claire des chantiers des 4 semaines suivantes</li>\n</ul>\n<hr />"}, {"title": "Points de vigilance", "html": "<p><strong>Ne pas perfectionner avant d'avoir rencontré les menuisiers.</strong> C'est le piège classique du fondateur technique : continuer à coder parce que c'est confortable. Les RDV sont inconfortables mais c'est eux qui débloquent.</p>\n<p><strong>Ne pas vendre en RDV. Écouter.</strong> Tu n'es pas là pour convaincre qu'ils doivent utiliser ta plateforme. Tu es là pour comprendre leur métier et leurs contraintes. Si tu passes 80% du temps à écouter et 20% à répondre à leurs questions, tu es sur la bonne voie.</p>\n<p><strong>Accepter que certains retours vont faire mal.</strong> Si un menuisier te dit \"ton DXF est inutilisable chez nous\", ce n'est pas une critique personnelle — c'est une information en or. Note-la, remercie-le, corrige.</p>\n<p><strong>Tenir le tempo.</strong> Les 4 semaines peuvent déborder de 1 à 2 semaines sans drame. Au-delà, c'est un signal qu'il faut revoir le périmètre.</p>"}]}, {"id": "II", "title": "Kit de prospection menuisiers CNC", "subtitle": "Sources, scripts et templates pour aller sur le terrain", "sections": [{"title": "Introduction", "html": "<p><strong>Objectif</strong> : caler 3 à 5 rendez-vous qualifiés avec des menuisiers équipés en commande numérique, en 2 à 3 semaines, pour valider ton outil de calcul sur des machines réelles.</p>\n<p><strong>Principe directeur</strong> : tu n'es <strong>pas</strong> en train de vendre. Tu es en train d'<strong>apprendre</strong>. Le menuisier doit avoir l'impression qu'il t'aide. C'est vrai, et c'est ce qui fait que les RDV sont acceptés.</p>\n<hr />"}, {"title": "1. Où trouver tes cibles", "html": "<h3>Sources directes</h3>\n<ul>\n<li><strong>Annuaire de la Chambre des Métiers et de l'Artisanat</strong> (artisanat.fr, annuaire de ta région) — filtrer sur \"menuiserie / ébénisterie\"</li>\n<li><strong>CAPEB</strong> (syndicat des artisans du bâtiment) — annuaire par département</li>\n<li><strong>UNAMA</strong> (Union Nationale de l'Artisanat des Métiers de l'Ameublement) — accès via la CMA</li>\n<li><strong>Google Maps</strong> avec requêtes du type : \"menuiserie sur mesure [ville]\", \"ébénisterie [ville]\", \"agencement [ville]\" — cliquer sur chaque site web pour voir s'ils mentionnent \"commande numérique\", \"CNC\", \"plaqueuse de chant\", \"débiteuse à panneaux\"</li>\n</ul>\n<h3>Signaux à repérer sur les sites web</h3>\n<p>Un menuisier équipé CNC le mentionne presque toujours sur son site, parce que c'est un argument commercial. Mots-clés à chercher :\n- Commande numérique, CNC, centre d'usinage\n- Noms de marques : <strong>SCM, Biesse, Homag, Felder, Holz-Her, Maka</strong>\n- Noms de logiciels : <strong>TopSolid, Alphacam, Maestro, WoodWOP, Cabinet Vision, SketchList</strong>\n- \"Bureau d'études intégré\", \"production automatisée\"</p>\n<h3>Sources indirectes</h3>\n<ul>\n<li><strong>LinkedIn</strong> : recherche \"menuisier\" + \"CNC\" ou \"commande numérique\" dans ta région. Filtrer par ville.</li>\n<li><strong>Groupes Facebook professionnels</strong> : \"Menuisiers de France\", \"Ébénistes &amp; Menuisiers\", \"CNC &amp; Menuiserie\"</li>\n<li><strong>Salons professionnels</strong> : Eurobois (Lyon), Batimat (Paris), Forum Bois Construction — les exposants et visiteurs sont des cibles directes</li>\n<li><strong>Revendeurs de machines CNC</strong> : parfois, en contactant un revendeur (SCM France, Biesse France), tu peux demander s'ils ont des clients dans ta région ouverts à des collaborations</li>\n</ul>\n<h3>Critères de qualification des cibles</h3>\n<p>Privilégie les menuisiers qui cochent au moins 3 de ces critères :\n- Équipés d'une CNC (3 axes minimum, idéalement 5 axes ou centre d'usinage multi-opérations)\n- Entre 2 et 20 salariés (les très petits ne savent pas quoi te dire, les très gros ne te donneront pas de RDV)\n- Site web propre et actif\n- Présence sur les réseaux sociaux\n- Localisation : &lt; 100 km de chez toi pour les premiers RDV (tu peux te déplacer physiquement, c'est beaucoup mieux)</p>\n<p><strong>Ton objectif</strong> : 30 cibles identifiées pour 3-5 RDV à l'arrivée. Taux de réponse réaliste : 15 à 25%.</p>\n<hr />"}, {"title": "2. Email d'approche", "html": "<p>Trois variantes selon le contexte. Toutes tiennent en 150 mots maximum.</p>\n<h3>Variante 1 — Directe et honnête (à privilégier)</h3>\n<blockquote>\n<p><strong>Objet</strong> : Menuisier qui développe un outil pour menuisiers — 30 min de votre avis ?</p>\n<p>Bonjour [Prénom],</p>\n<p>Je suis Pierre, menuisier de formation, et je développe depuis 3 ans une plateforme qui connecte des clients particuliers à des menuisiers équipés en commande numérique, avec génération automatique des fichiers de fabrication (cutting sheet, DXF, pricing, implantation des connecteurs type Clamex/Cabineo).</p>\n<p>Avant d'aller plus loin, j'ai besoin du regard d'artisans qui travaillent réellement sur CNC pour valider que les fichiers que je génère sont exploitables chez eux — ou comprendre ce qu'il faudrait adapter.</p>\n<p>J'aimerais 30 minutes de votre temps, dans votre atelier si possible, pour vous montrer et surtout écouter vos retours. Il n'y a rien à vendre, c'est une démarche d'apprentissage de ma part.</p>\n<p>Seriez-vous disponible [proposer 2 créneaux] ?</p>\n<p>Cordialement,\nPierre [NOM]\n[Téléphone] — [Site web The Wooder]</p>\n</blockquote>\n<p><strong>Pourquoi ça marche</strong> : tu te présentes comme pair (menuisier), tu es transparent sur ta démarche, tu ne promets rien, tu laisses une sortie facile.</p>\n<h3>Variante 2 — Avec point commun</h3>\n<p>À utiliser si tu as un lien (même faible) : ancien fournisseur commun, participation au même salon, mention dans un article de la CMA, etc.</p>\n<blockquote>\n<p><strong>Objet</strong> : [Point commun] — 30 min pour vous montrer mon projet ?</p>\n<p>Bonjour [Prénom],</p>\n<p>J'ai découvert votre atelier via [source]. Votre [spécificité repérée : travail sur X, réalisation de Y, équipement Z] correspond exactement au profil d'artisan auquel s'adresse le projet sur lequel je travaille.</p>\n<p>[Reprendre les paragraphes 2 et 3 de la Variante 1]</p>\n</blockquote>\n<h3>Variante 3 — Via recommandation</h3>\n<p>À utiliser si un premier menuisier rencontré te donne le contact d'un confrère.</p>\n<blockquote>\n<p><strong>Objet</strong> : Recommandé par [Prénom Nom] — 30 min pour un retour sur mon projet ?</p>\n<p>Bonjour [Prénom],</p>\n<p>[Prénom du contact commun] m'a suggéré de vous contacter suite à notre échange de la semaine dernière. Je lui présentais la plateforme The Wooder, qui génère automatiquement les fichiers de fabrication pour la menuiserie sur mesure (cutting sheet, DXF, pricing), et il a pensé que vous seriez un interlocuteur particulièrement pertinent.</p>\n<p>Je cherche à confronter mon outil à la réalité de la production CNC, et votre expertise m'aiderait énormément. 30 minutes dans votre atelier, à votre convenance.</p>\n<p>Seriez-vous disponible [proposer 2 créneaux] ?</p>\n</blockquote>\n<p><strong>Règle d'or</strong> : une recommandation triple le taux de réponse. Chaque RDV doit se conclure par \"auriez-vous un ou deux confrères équipés CNC à me recommander ?\"</p>\n<hr />"}, {"title": "3. Relance (7 jours après le premier envoi)", "html": "<blockquote>\n<p><strong>Objet</strong> : Re: [reprendre l'objet initial]</p>\n<p>Bonjour [Prénom],</p>\n<p>Je me permets un petit rappel, au cas où mon précédent message se serait perdu. Je sais que vous êtes sollicité.</p>\n<p>Si les 30 minutes ne sont pas possibles dans l'immédiat, je peux aussi vous envoyer quelques questions par mail auxquelles vous répondez quand vous avez un moment — ce sera déjà précieux.</p>\n<p>Bien cordialement,\nPierre</p>\n</blockquote>\n<p><strong>Deuxième relance</strong> : 7 jours après. Plus courte encore.</p>\n<blockquote>\n<p><strong>Objet</strong> : Re: [objet]</p>\n<p>Bonjour [Prénom],</p>\n<p>Un dernier message pour vous. Si le sujet ne vous intéresse pas, pas de souci — merci de me le signaler en une ligne, je retire votre contact de ma liste.</p>\n<p>S'il vous intéresse mais que le timing n'est pas bon, je peux revenir vers vous dans 2 mois.</p>\n<p>Bien cordialement,\nPierre</p>\n</blockquote>\n<p>Après 3 messages sans réponse, tu laisses tomber. Ce n'est pas un échec, c'est du tri.</p>\n<hr />"}, {"title": "4. Script téléphone", "html": "<p>Le téléphone est <strong>beaucoup plus efficace</strong> que l'email pour les artisans. N'hésite pas à appeler directement, surtout en fin de matinée ou milieu d'après-midi (quand ils sont plus disponibles). Évite lundi matin et vendredi après-midi.</p>\n<h3>Ouverture (30 secondes)</h3>\n<blockquote>\n<p>\"Bonjour, c'est Pierre [NOM]. Je vous dérange en pleine production ?\n[Attendre la réponse]\nJe suis menuisier de formation et je travaille depuis 3 ans sur une plateforme qui génère automatiquement les fichiers de fabrication pour la menuiserie sur mesure — cutting sheet, DXF, implantation Clamex/Cabineo. Avant de finaliser, j'ai besoin du regard d'artisans qui travaillent sur CNC comme chez vous. Ça vous parle ?\"</p>\n</blockquote>\n<h3>Si \"oui / intéressé\"</h3>\n<blockquote>\n<p>\"Super. Je ne vous vends rien, je veux juste 30 minutes pour vous montrer où j'en suis et avoir vos retours honnêtes, surtout sur ce qui ne marcherait pas chez vous. Ce serait possible de passer à l'atelier dans les 2 prochaines semaines ?\"</p>\n</blockquote>\n<h3>Si \"pas le temps / occupé\"</h3>\n<blockquote>\n<p>\"Je comprends. Est-ce que je vous rappelle dans 2 semaines, ou vous préférez que je vous envoie un mail avec 3-4 questions et vous répondez quand vous avez un moment ?\"</p>\n</blockquote>\n<h3>Si \"ça ne m'intéresse pas\"</h3>\n<blockquote>\n<p>\"Ok, pas de souci. Juste une question avant de raccrocher : c'est parce que ça ne correspond pas à votre activité, ou c'est le principe de plateforme qui ne vous parle pas ? [Écouter]. Merci pour votre honnêteté, c'est précieux.\"</p>\n</blockquote>\n<p>Chaque refus argumenté est une info en or. Note-la.</p>\n<hr />"}, {"title": "5. Les questions à poser en rendez-vous", "html": "<p>Imprime cette trame et prends-la avec toi. <strong>Prends des notes pendant le RDV</strong>, pas après. Demande l'autorisation d'enregistrer si le menuisier accepte (ça libère ta main pour relancer).</p>\n<h3>A. Connaître l'atelier (5 min — briser la glace)</h3>\n<ul>\n<li>Depuis combien de temps existe votre atelier ?</li>\n<li>Combien êtes-vous ?</li>\n<li>Quelle est votre spécialité dominante (cuisines, dressings, agencement pro, mobilier, etc.) ?</li>\n<li>Quel profil de clients (particuliers, pros, architectes) ?</li>\n<li>Quelle part de sur-mesure dans votre activité ?</li>\n</ul>\n<h3>B. L'équipement CNC (5 min)</h3>\n<ul>\n<li>Quelle(s) machine(s) CNC utilisez-vous ? (marque, modèle si possible)</li>\n<li>Depuis combien de temps ? Quel usage quotidien ?</li>\n<li>Qui pilote la CNC dans l'atelier ?</li>\n<li>Quel(s) logiciel(s) CAM ? (TopSolid, Alphacam, WoodWOP, autre)</li>\n<li>Quel workflow : de l'idée client au G-code, quelles étapes ?</li>\n</ul>\n<h3>C. Le process de devis actuel (10 min — <strong>la partie la plus importante</strong>)</h3>\n<ul>\n<li>Quand un client vous contacte pour du sur-mesure, quelles sont les étapes jusqu'au devis ?</li>\n<li>Combien de temps ça vous prend en moyenne ?</li>\n<li>Combien de devis faites-vous par mois ? Quelle part se transforme en commande ?</li>\n<li>Quels outils utilisez-vous pour le chiffrage (Excel, logiciel dédié, calcul mental) ?</li>\n<li>Comment décomposez-vous le prix (matière, main d'œuvre, quincaillerie, marge) ?</li>\n<li>Quel est votre taux horaire atelier ?</li>\n<li>Qu'est-ce qui est pénible / chronophage dans ce process ?</li>\n</ul>\n<h3>D. Les fichiers de fabrication (10 min)</h3>\n<ul>\n<li>Aujourd'hui, qui génère les fichiers pour la CNC ? Comment ?</li>\n<li>Quel format attendez-vous : DXF, DWG, fichier natif TopSolid / Alphacam / autre ?</li>\n<li>Quelles caractéristiques du DXF sont critiques pour vous (version, unités, calques, couleurs) ?</li>\n<li>Comment gérez-vous les cutting sheets (feuilles de débit) : logiciel dédié, manuel ?</li>\n<li>Comment optimisez-vous les panneaux (nesting) ?</li>\n<li>Comment placez-vous les connecteurs (Clamex, Cabineo, excentriques) dans vos projets ?</li>\n</ul>\n<h3>E. Douleurs et manques (5 min)</h3>\n<ul>\n<li>Si vous pouviez éliminer <strong>une</strong> tâche de votre semaine, laquelle ?</li>\n<li>Qu'est-ce qui vous fait perdre du temps dans le passage commande → fabrication ?</li>\n<li>Avez-vous déjà refusé des commandes faute de temps pour les chiffrer ?</li>\n</ul>\n<h3>F. Ta démo (10 min — tu montres l'outil)</h3>\n<ul>\n<li>Montrer un cas de test simple d'abord</li>\n<li>Laisser le menuisier commenter à chaque étape</li>\n<li>Lui demander explicitement : \"qu'est-ce qui ne va pas dans ce que je vous montre ?\"</li>\n<li>Lui passer physiquement les cutting sheets imprimées</li>\n<li>Ouvrir le DXF dans <strong>son</strong> logiciel si possible (ou lui envoyer pour qu'il teste plus tard)</li>\n</ul>\n<h3>G. Projection et contrepartie (5 min)</h3>\n<ul>\n<li>Imaginons que ce genre de plateforme vous apporte des clients qualifiés avec les fichiers prêts : ça vous intéresse ? À quelles conditions ?</li>\n<li>Quelle commission vous paraîtrait juste pour un apport client complet (8% ? 10% ? 15% ?) ?</li>\n<li>Seriez-vous prêt à être parmi les premiers menuisiers pilotes ?</li>\n</ul>\n<h3>H. Ouverture du réseau (2 min)</h3>\n<ul>\n<li>Connaissez-vous des confrères équipés CNC que ce projet pourrait intéresser ? Accepteriez-vous de me mettre en relation ?</li>\n</ul>\n<hr />"}, {"title": "6. Template de compte-rendu", "html": "<p>À remplir <strong>dans les 24h après le RDV</strong>, idéalement dans la voiture ou au café du coin juste après. Duplique ce template pour chaque RDV.</p>\n<pre><code>═══════════════════════════════════════════\nCOMPTE-RENDU RDV — [Date]\n═══════════════════════════════════════════\n\nMenuisier : [Nom de l'atelier]\nInterlocuteur : [Prénom Nom — fonction]\nLieu : [Atelier / visio]\nDurée : [XX min]\nQualité de l'échange (1-5) : [X]\n\n─── L'ATELIER ───\nTaille : [X salariés]\nAncienneté : [X ans]\nSpécialité : [...]\nClients types : [...]\n\n─── ÉQUIPEMENT CNC ───\nMachine(s) : [marque, modèle]\nLogiciel CAM : [...]\nFormats de fichiers attendus : [...]\nDétails techniques critiques : [version DXF, unités, calques, etc.]\n\n─── PROCESS DEVIS ACTUEL ───\nTemps moyen par devis : [...]\nVolume mensuel : [...]\nTaux horaire : [...]\nMéthode de chiffrage : [...]\n\n─── CE QUI A FAIT RÉAGIR LE MENUISIER (positivement) ───\n• [...]\n• [...]\n\n─── CE QUI A FAIT RÉAGIR LE MENUISIER (négativement) ───\n• [...]\n• [...]\n\n─── CITATIONS VERBATIM (mots exacts, utiles pour comprendre) ───\n&quot;[...]&quot;\n&quot;[...]&quot;\n\n─── DOULEURS ACTUELLES IDENTIFIÉES ───\n• [...]\n• [...]\n\n─── OBJECTIONS / FREINS À REJOINDRE UNE PLATEFORME ───\n• [...]\n• [...]\n\n─── SIGNAUX D'INTÉRÊT ───\nPrêt à être pilote : [OUI / NON / PEUT-ÊTRE]\nRecommandations confrères : [liste]\nRelance possible : [date / conditions]\n\n─── ACTIONS DE MA PART ───\n[ ] Envoyer email de remerciement (sous 24h)\n[ ] Envoyer [document, fichier promis]\n[ ] Relancer [date]\n[ ] Intégrer [correction identifiée] dans l'outil\n\n─── APPRENTISSAGE MAJEUR DE CE RDV ───\n(Une phrase qui résume ce que j'ai appris d'essentiel)\n[...]\n</code></pre>\n<hr />"}, {"title": "7. Synthèse globale (après les 3-5 RDV)", "html": "<p>Une fois tous les RDV faits, fais <strong>un seul document de synthèse</strong> qui croise les retours. Pose-toi 5 questions :</p>\n<ol>\n<li><strong>Qu'est-ce qui revient systématiquement ?</strong> (douleur partagée, attente commune) → ce sont les fondations de ta proposition de valeur.</li>\n<li><strong>Qu'est-ce qui divergeait ?</strong> → ce sont des segments de marché à trancher (tu ne peux pas servir tout le monde, choisis).</li>\n<li><strong>Quel défaut de mon outil a été signalé par au moins 2 personnes ?</strong> → priorité absolue de correction.</li>\n<li><strong>Quel niveau de commission semblait acceptable ?</strong> → ça calibre ton business model.</li>\n<li><strong>Combien sont prêts à être pilotes ?</strong> → ta base d'artisans fondateurs est en train de se constituer.</li>\n</ol>\n<hr />"}, {"title": "8. Les erreurs à éviter", "html": "<p><strong>Parler plus que le menuisier.</strong> Règle des 80/20 : tu écoutes 80% du temps, tu parles 20%. Si tu parles plus, tu es en mode vente et tu ne captures pas les infos réelles.</p>\n<p><strong>Promettre des choses que tu ne sais pas tenir.</strong> Si on te demande \"vous lancez quand ?\" ou \"vous pouvez gérer le cas X ?\", dis la vérité. \"Je ne sais pas encore\" ou \"c'est dans ma roadmap mais pas encore dev\" sont des réponses acceptables et respectées.</p>\n<p><strong>Défendre ton outil.</strong> Quand un menuisier dit \"ça ne marchera pas chez nous\", ta réaction naturelle est d'expliquer pourquoi si. Résiste. Remercie, creuse (\"qu'est-ce qui ne marcherait pas précisément ?\"), note. C'est son avis qui compte, pas le tien.</p>\n<p><strong>Ne pas demander le réseau.</strong> La question \"vous connaissez des confrères que ça pourrait intéresser ?\" ouvre ton pipeline pour les semaines suivantes. Pose-la systématiquement, en fin de RDV.</p>\n<p><strong>Rester en mode prospect froid.</strong> Les 3-5 menuisiers rencontrés deviennent tes <strong>alliés</strong>, pas juste des sources d'info. Tiens-les au courant de l'avancement. Envoie-leur une mise à jour tous les 1-2 mois. Ce sont tes premiers ambassadeurs potentiels.</p>\n<p><strong>Ne pas prendre de notes.</strong> Tu vas oublier la moitié. Toujours un carnet ou un ordi ouvert.</p>\n<p><strong>Juger les réponses.</strong> Si un menuisier te dit qu'il chiffre tout à la calculette sur un coin de table, ne pense pas \"ah ces artisans sont en retard\". Pense \"super, il y a un vrai besoin d'outil\".</p>"}]}, {"id": "III", "title": "Checklist de validation de l'outil", "subtitle": "Tour de contrôle technique avant chaque démo menuisier", "sections": [{"title": "Introduction", "html": "<p><strong>Objectif</strong> : avoir la certitude que ce que tu montres à un menuisier CNC ne contient pas d'erreur grossière qui te ferait perdre toute crédibilité. L'idée n'est pas d'avoir un outil parfait — c'est d'éviter les fautes qui signent un amateur.</p>\n<p><strong>Principe directeur</strong> : un menuisier CNC expérimenté repère une erreur de DXF ou de cutting sheet en 30 secondes. Si ça arrive pendant ta démo, tu perds l'échange. Fais ce tour de contrôle avant <strong>chaque</strong> RDV.</p>\n<p><strong>Comment l'utiliser</strong> : coche au fur et à mesure, directement dans ce document ou sur une copie imprimée. Ne t'en remets pas à ta mémoire.</p>\n<hr />"}, {"title": "Section 1 — Cutting sheets (feuilles de débit)", "html": "<p>Le document que tu produis doit ressembler à quelque chose qu'un atelier pro sortirait de son propre logiciel. Sinon, il va faire tache.</p>\n<h3>Informations obligatoires sur la feuille</h3>\n<ul>\n<li>[ ] Nom du projet / client / référence commande (en en-tête)</li>\n<li>[ ] Date de génération</li>\n<li>[ ] Numéro de version du fichier (important si tu régénères après modif)</li>\n<li>[ ] Essence et épaisseur du matériau pour chaque pièce</li>\n<li>[ ] Finition prévue (brut, mélaminé, plaqué, stratifié, etc.)</li>\n<li>[ ] Numéro d'identification unique pour chaque pièce (ex. P01, P02…)</li>\n<li>[ ] Désignation claire (ex. \"côté gauche caisson haut\")</li>\n</ul>\n<h3>Dimensions et cotes</h3>\n<ul>\n<li>[ ] Longueur et largeur en mm (jamais en cm ou en m)</li>\n<li>[ ] Épaisseur rappelée pour chaque pièce</li>\n<li>[ ] <strong>Cotes finies ou cotes brutes clairement indiquées</strong> — c'est crucial</li>\n<li>[ ] Surcotes de placage intégrées si applicable (typiquement +10 mm sur chaque dimension pour chant plaqué)</li>\n<li>[ ] Sens du fil ou du décor indiqué par une flèche, ou par la convention longueur = sens du fil</li>\n<li>[ ] Pour les panneaux avec décor directionnel : orientation explicite</li>\n</ul>\n<h3>Lisibilité et format</h3>\n<ul>\n<li>[ ] Format A4 portrait imprimable (ou A3 si vraiment beaucoup de pièces)</li>\n<li>[ ] Lisible en noir et blanc (les couleurs sont un plus, pas une béquille)</li>\n<li>[ ] Typographie sobre, pas de fantaisie</li>\n<li>[ ] Regroupement par matériau / essence pour optimiser l'achat</li>\n<li>[ ] Total matière par référence (pour commander le bon volume)</li>\n</ul>\n<h3>Optimisation matière (nesting)</h3>\n<ul>\n<li>[ ] Plan d'imbrication proposé OU clairement annoncé comme \"optimisation à faire par l'atelier\"</li>\n<li>[ ] Taux de chute annoncé si optimisation automatique</li>\n<li>[ ] Si nesting fait : rotation des pièces autorisée ou non selon sens du fil</li>\n</ul>\n<h3>Ce que tu testes</h3>\n<p><strong>Test 1</strong> : imprime une cutting sheet sur papier. Fais-la lire à quelqu'un qui n'est pas dans le projet. Est-ce qu'il comprend immédiatement ce que c'est ? Si non, c'est illisible.</p>\n<p><strong>Test 2</strong> : ouvre une cutting sheet d'un logiciel pro (demande à un menuisier de t'en envoyer un exemple anonymisé, ou regarde des exemples de sortie TopSolid / Alphacam). Compare. La tienne a-t-elle la même densité d'information ?</p>\n<hr />"}, {"title": "Section 2 — Fichiers DXF", "html": "<p>C'est là que les vrais problèmes se cachent. Un DXF techniquement correct est une chose. Un DXF <strong>exploitable par la CNC du menuisier</strong> en est une autre.</p>\n<h3>Conformité du fichier</h3>\n<ul>\n<li>[ ] Extension .dxf (pas .dwg — les menuisiers utilisent rarement DWG)</li>\n<li>[ ] Version compatible : R12 (max compatibilité) ou 2000 / 2007 (très large). Éviter les versions trop récentes qui posent problème sur les vieux logiciels CAM.</li>\n<li>[ ] Encodage ASCII (pas binaire — plus portable)</li>\n<li>[ ] Ouvrable dans <strong>LibreCAD</strong>, <strong>DraftSight</strong> ET idéalement testé dans un CAM (Alphacam démo, par exemple)</li>\n</ul>\n<h3>Unités et repère</h3>\n<ul>\n<li>[ ] Unités en <strong>millimètres</strong> (jamais en pouces, jamais en mètres)</li>\n<li>[ ] Variable <code>$INSUNITS</code> = 4 (millimètres)</li>\n<li>[ ] Zéro pièce placé à un endroit logique : coin inférieur gauche de la pièce, ou centre selon la convention métier</li>\n<li>[ ] Pièces orientées selon la convention \"face visible vers le haut\"</li>\n<li>[ ] Pas de décalage aléatoire (une pièce au coin (0,0), pas à (15874, 27341))</li>\n</ul>\n<h3>Structure des calques</h3>\n<p>Standard minimal attendu sur un DXF d'usinage menuiserie :\n- [ ] <strong>Calque contour</strong> : contour extérieur de la pièce (couleur typique : blanc/noir ou rouge)\n- [ ] <strong>Calque perçages</strong> : tous les perçages traversants ou borgnes (couleur différenciée : bleu par exemple)\n- [ ] <strong>Calque rainures / feuillures</strong> : usinages de profil (vert ou autre)\n- [ ] <strong>Calque texte / annotations</strong> : numéro de pièce, cotes informatives (calque séparé, souvent gris)\n- [ ] Un calque = un type d'opération = un outil (convention largement adoptée)\n- [ ] Pas de
