 géométrie sur le calque <code>0</code> (réservé)</p>\n<h3>Géométrie</h3>\n<ul>\n<li>[ ] Pas de polylignes ouvertes qui devraient être fermées (le contour doit être fermé)</li>\n<li>[ ] Pas de doublons de lignes (deux lignes superposées = l'outil passe deux fois)</li>\n<li>[ ] Pas d'entités orphelines isolées</li>\n<li>[ ] Perçages : cercles simples (pas des polygones de 32 côtés approximant un cercle)</li>\n<li>[ ] Tous les arcs et cercles en vraies primitives DXF <code>ARC</code> / <code>CIRCLE</code></li>\n<li>[ ] Profondeur des usinages : soit indiquée par couleur/calque convenu, soit dans un attribut texte associé</li>\n<li>[ ] Précision : 3 décimales minimum (0,001 mm)</li>\n</ul>\n<h3>Cas spéciaux</h3>\n<ul>\n<li>[ ] <strong>Perçages de connecteurs</strong> : diamètres et cotes exacts selon la fiche technique du connecteur (voir Section 4)</li>\n<li>[ ] <strong>Rainures de prise type Clamex</strong> : profil correct, profondeur indiquée</li>\n<li>[ ] <strong>Texte gravé</strong> : sur calque dédié, police stick/monoline (pas de police pleine)</li>\n</ul>\n<h3>Ce que tu testes</h3>\n<p><strong>Test 1</strong> : ouvre ton DXF dans <strong>LibreCAD</strong> (gratuit, <a href=\"https://librecad.org\">librecad.org</a>). Vérifie visuellement : la pièce est-elle à la bonne taille ? Les calques sont-ils propres ? Rien ne dépasse ?</p>\n<p><strong>Test 2</strong> : télécharge une version d'essai d'<strong>Alphacam</strong> ou <strong>TopSolid Wood</strong> (périodes d'essai disponibles). Importe ton DXF. Est-ce qu'il est reconnu sans erreur ? Est-ce que les calques sont bien interprétés ?</p>\n<p><strong>Test 3</strong> : imagine que ton DXF passe en production sans qu'un humain le vérifie. Est-ce que la pièce sortirait juste ? Si la réponse est \"ça dépend de ce que la CNC interprète\", ton DXF n'est pas prêt.</p>\n<hr />"}, {"title": "Section 3 — Pricing (devis généré)", "html": "<p>Le prix est le point le plus sensible. Un prix farfelu discrédite tout ton outil, même si le DXF est parfait.</p>\n<h3>Structure du devis</h3>\n<ul>\n<li>[ ] Décomposition visible et claire : matière / main d'œuvre / quincaillerie / marge</li>\n<li>[ ] Prix unitaire par poste, pas juste un total</li>\n<li>[ ] TVA : 10% si pose comprise et prestations associées (logement achevé + 2 ans), 20% sinon — <strong>à préciser avec un expert-comptable</strong>, ne te fie pas à une règle générale</li>\n<li>[ ] Acompte proposé (typiquement 30-50% à la commande)</li>\n<li>[ ] Délais de livraison indicatifs</li>\n<li>[ ] Durée de validité du devis (30 ou 60 jours)</li>\n<li>[ ] Coordonnées complètes (légalement obligatoires : SIRET, adresse, assurance décennale pour la menuiserie intégrée)</li>\n</ul>\n<h3>Paramétrage</h3>\n<ul>\n<li>[ ] <strong>Taux horaire configurable</strong> par le menuisier (tu ne peux pas imposer 45 €/h si lui est à 60 €/h)</li>\n<li>[ ] Prix matière actualisable (les prix du panneau bougent beaucoup)</li>\n<li>[ ] Marge configurable</li>\n<li>[ ] Frais de livraison paramétrables selon distance / poids</li>\n<li>[ ] Coefficient de difficulté appliquable sur certaines pièces (cintres, finitions spéciales)</li>\n</ul>\n<h3>Méthode de calcul</h3>\n<ul>\n<li>[ ] Temps de main d'œuvre estimé à partir d'une <strong>logique transparente</strong> (pas d'une boîte noire)</li>\n<li>[ ] Coût matière = surface pièces × prix m² × coefficient de chute</li>\n<li>[ ] Coefficient de chute réaliste : 15-20% pour du panneau standard, 25-30% pour des formes complexes</li>\n<li>[ ] Quincaillerie : charnières, coulisses, poignées, connecteurs — chacun avec son prix unitaire</li>\n<li>[ ] Pas d'arrondi grossier qui fausse les totaux</li>\n</ul>\n<h3>Cohérence avec le marché</h3>\n<ul>\n<li>[ ] Fais tourner ton outil sur <strong>3 cas standard</strong> et compare les prix obtenus avec :</li>\n<li>Un devis Ikea d'un meuble équivalent (borne basse)</li>\n<li>Un devis menuisier pro (borne haute — demande des ordres de grandeur en RDV)</li>\n<li>Un devis Schmidt / Mobalpa (milieu)</li>\n<li>[ ] Ton prix doit se situer <strong>entre</strong> ces bornes pour du sur-mesure artisanal, plus proche du haut</li>\n</ul>\n<h3>Ce que tu testes</h3>\n<p><strong>Test 1</strong> : génère un devis pour un caisson simple de dressing (2 m × 0,6 m × 2,5 m). Compare avec les prix pratiqués dans ta région. S'il est 2× trop cher ou 2× trop bon marché, il y a un problème de paramétrage.</p>\n<p><strong>Test 2</strong> : fais tester le devis par un menuisier (même pas en RDV — juste un collègue). Demande : \"ce prix te choque ?\" S'il te dit oui, creuse d'où vient l'écart.</p>\n<hr />"}, {"title": "Section 4 — Connecteurs (Clamex, Cabineo, excentriques)", "html": "<p>Les connecteurs sont ta valeur différenciante — et aussi là où une erreur technique est la plus visible pour un menuisier.</p>\n<h3>Clamex P-14 (cas le plus courant)</h3>\n<ul>\n<li>[ ] Profondeur de rainure : <strong>14 mm</strong> (pour P-14) ou <strong>10 mm</strong> (pour P-10)</li>\n<li>[ ] Épaisseur de rainure : <strong>7 mm</strong> (épaisseur de la fraise standard Lamello)</li>\n<li>[ ] Largeur / longueur de rainure : <strong>50 mm environ</strong> selon modèle</li>\n<li>[ ] Distance entre deux Clamex sur une pièce : typiquement 200-250 mm</li>\n<li>[ ] Distance du bord : minimum 50 mm</li>\n<li>[ ] Orientation correcte (Clamex mâle / femelle positionné cohérent)</li>\n</ul>\n<h3>Cabineo 8 / Cabineo 12</h3>\n<ul>\n<li>[ ] Perçage central : <strong>Ø12 mm</strong> (pour Cabineo 12) ou <strong>Ø8 mm</strong> (pour Cabineo 8)</li>\n<li>[ ] Profondeur de perçage : selon épaisseur pièce (typique 12-15 mm en chant, 10-13 mm en face)</li>\n<li>[ ] Fraisure / lamage de tête si applicable</li>\n<li>[ ] Vis cachée : orientation et sens cohérents</li>\n</ul>\n<h3>Excentriques (Rastex, Minifix)</h3>\n<ul>\n<li>[ ] Perçage du boîtier excentrique : <strong>Ø15 mm</strong> ou <strong>Ø20 mm</strong> selon modèle</li>\n<li>[ ] Profondeur : <strong>13 mm</strong> typique</li>\n<li>[ ] Perçage de l'axe : <strong>Ø5 mm</strong> ou <strong>Ø6 mm</strong> selon modèle</li>\n<li>[ ] Entraxe excentrique-axe : <strong>34 mm</strong> (norme)</li>\n<li>[ ] Accès outil : toujours perpendiculaire à la face visible</li>\n</ul>\n<h3>Cohérence sur la pièce</h3>\n<ul>\n<li>[ ] Sur chaque pièce, les connecteurs du même type sont tous de la même main (mâle ou femelle cohérent selon la logique d'assemblage)</li>\n<li>[ ] Pas de conflit entre deux connecteurs proches</li>\n<li>[ ] Espace suffisant pour l'outil d'usinage (pas de connecteur trop près d'un bord)</li>\n<li>[ ] Connecteurs sur les pièces qui s'assemblent : <strong>positions exactement symétriques</strong> (sinon, ça ne se monte pas)</li>\n</ul>\n<h3>Ce que tu testes</h3>\n<p><strong>Test 1</strong> : choisis un cas avec 4-6 connecteurs mélangés (Clamex + Cabineo). Génère le DXF. Vérifie manuellement, pièce par pièce, que chaque connecteur a son pendant sur la pièce qui s'assemble, au bon endroit.</p>\n<p><strong>Test 2</strong> : imprime les cutting sheets et trace physiquement l'assemblage mental. Les connecteurs tombent-ils en face ?</p>\n<hr />"}, {"title": "Section 5 — Cas de test à jouer en démo", "html": "<p>Prépare <strong>3 cas différents</strong> que tu peux dérouler rapidement pendant un RDV. Un menuisier appréciera que tu montres la diversité, mais il détestera attendre 10 minutes de calcul.</p>\n<h3>Cas A — Simple (meuble basique)</h3>\n<ul>\n<li>Caisson de rangement : 600 × 400 × 800 mm</li>\n<li>Panneau mélaminé 19 mm</li>\n<li>4 charnières, 1 étagère, connecteurs Cabineo</li>\n<li><strong>Objectif</strong> : démontrer que l'outil marche de façon fluide sur un cas standard.</li>\n</ul>\n<h3>Cas B — Moyen (avec complexité)</h3>\n<ul>\n<li>Dressing 2 portes : 1 200 × 600 × 2 200 mm</li>\n<li>Panneau mélaminé + une essence plaquée bois</li>\n<li>Tringle, tiroirs, étagères ajustables</li>\n<li>Mélange de connecteurs : Clamex + Cabineo</li>\n<li><strong>Objectif</strong> : démontrer que l'outil gère la complexité métier réelle.</li>\n</ul>\n<h3>Cas C — Limite (ce qui casse)</h3>\n<ul>\n<li>Meuble avec une dimension atypique (ex. très grand, cintré, ou avec retour d'angle)</li>\n<li><strong>Objectif</strong> : tu ne le lances <strong>que si le menuisier veut te challenger</strong>. Ça te sert à dire : \"voilà où l'outil a ses limites aujourd'hui, voici ce que je prévois de rajouter.\" C'est plus crédible que prétendre que tout marche.</li>\n</ul>\n<h3>Préparation avant chaque RDV</h3>\n<ul>\n<li>[ ] Les 3 cas sont enregistrés en favori dans l'outil (pas à ressaisir)</li>\n<li>[ ] Les fichiers de sortie (DXF + cutting sheet + devis) sont pré-générés et stockés localement, au cas où la connexion soit mauvaise</li>\n<li>[ ] Les cutting sheets sont imprimées sur papier, dans une chemise</li>\n<li>[ ] Tu as un visualiseur DXF installé sur ton ordi portable (LibreCAD)</li>\n<li>[ ] Si tu comptes montrer les fichiers sur le logiciel du menuisier, apporte-les sur <strong>clé USB</strong> (les emails avec pièces jointes DXF sont parfois filtrés)</li>\n</ul>\n<hr />"}, {"title": "Section 6 — Préparation matérielle du RDV", "html": "<h3>Équipement</h3>\n<ul>\n<li>[ ] Ordinateur portable chargé + chargeur + adaptateurs</li>\n<li>[ ] Partage de connexion téléphone prêt (si la connexion de l'atelier est faible)</li>\n<li>[ ] Clé USB avec tous les fichiers (outil hors-ligne si besoin)</li>\n<li>[ ] Carnet + 2 stylos (toujours prévoir un stylo de secours)</li>\n<li>[ ] Trame de questions imprimée (document B, section 5)</li>\n<li>[ ] Cartes de visite</li>\n<li>[ ] Chemise avec cutting sheets imprimées</li>\n</ul>\n<h3>État d'esprit</h3>\n<ul>\n<li>[ ] Tu sais répondre en 30 secondes à \"c'est quoi The Wooder ?\"</li>\n<li>[ ] Tu sais répondre honnêtement à \"où vous en êtes exactement ?\"</li>\n<li>[ ] Tu as identifié <strong>3 questions spécifiques</strong> que tu veux absolument poser à ce menuisier (selon son profil)</li>\n</ul>\n<hr />"}, {"title": "Section 7 — Les questions pièges à anticiper", "html": "<p>Un menuisier expérimenté te posera ces questions. Mieux vaut y avoir réfléchi avant.</p>\n<h3>\"Pourquoi tu génères pas directement le G-code ?\"</h3>\n<p><strong>Réponse honnête</strong> : parce que le G-code dépend de la machine, du post-processeur, des outils montés. Le DXF est un format intermédiaire universel qui laisse le menuisier maître de sa chaîne CAM. Si tu veux un jour générer du G-code, c'est par machine-cible et ça se fait après.</p>\n<h3>\"Et si mon logiciel n'accepte pas ce format de DXF ?\"</h3>\n<p><strong>Réponse honnête</strong> : c'est justement pour ça que je suis là. Dites-moi quel format il attend, et je regarde ce que je peux adapter. (Tu notes, tu corriges après.)</p>\n<h3>\"Comment tu gères le sens du fil sur les essences bois ?\"</h3>\n<p><strong>Réponse</strong> : actuellement, la longueur de la pièce correspond au sens du fil par convention. Si besoin de retourner une pièce, c'est indiqué explicitement sur la cutting sheet. (Vérifie que c'est vrai dans ton outil.)</p>\n<h3>\"Et les panneaux stratifiés double-face ? Tu gères le décor sur deux faces ?\"</h3>\n<p><strong>Réponse</strong> : c'est prévu dans la roadmap. Aujourd'hui l'outil gère les mélaminés monoface correctement, le double-face est une complexité supplémentaire qui arrive ensuite.</p>\n<h3>\"Les surcotes de placage, tu les appliques comment ?\"</h3>\n<p><strong>Réponse</strong> : attention, c'est une vraie question technique. Si tu n'as pas une réponse claire, ne bluffe pas. Dis : \"j'aimerais justement que vous me donniez vos pratiques pour que je calibre l'outil correctement.\"</p>\n<h3>\"Et si je veux modifier une pièce après génération ?\"</h3>\n<p><strong>Réponse</strong> : l'outil permet de revenir en arrière, modifier, régénérer. Chaque version du fichier a un numéro de version.</p>\n<h3>\"Combien ça coûte pour nous ?\"</h3>\n<p><strong>Réponse</strong> : phase 1 (à ton stade de bêta), c'est gratuit pour les artisans fondateurs. Phase 2, commission de 8% (ou ce que tu as décidé) sur les commandes apportées par la plateforme — mais aucune mensualité, aucun frais fixe. Les devis hors-plateforme restent à 100% au menuisier.</p>\n<h3>\"Tu vas me remplacer par ton outil ?\"</h3>\n<p><strong>Réponse</strong> : au contraire. L'outil prend en charge la partie la plus chronophage (chiffrage + fichiers de fab), pour que vous puissiez accepter plus de commandes. La valeur menuisier — exécution, conseil, finition — reste entièrement la vôtre. Et la relation client finale est la vôtre également.</p>\n<hr />"}, {"title": "Section 8 — Après le RDV : la boucle de correction", "html": "<p>Pour chaque RDV, dans les 48h :</p>\n<ul>\n<li>[ ] Compte-rendu écrit (template dans le document B, section 6)</li>\n<li>[ ] Tri des retours en 3 catégories :</li>\n<li><strong>Critique</strong> (l'outil est inutilisable sans ça) → correction cette semaine</li>\n<li><strong>Important</strong> (forte valeur ajoutée) → à planifier sous 2 semaines</li>\n<li><strong>Nice-to-have</strong> (amélioration confort) → backlog</li>\n<li>[ ] Email de remerciement au menuisier, avec mention des actions que tu vas prendre suite à ses retours</li>\n<li>[ ] Mise à jour de ta roadmap produit</li>\n</ul>\n<p><strong>Règle importante</strong> : une correction flaggée \"critique\" par <strong>un seul</strong> menuisier devient \"importante\" si elle n'est pas confirmée par d'autres. Une correction flaggée par <strong>2 menuisiers minimum</strong> devient \"critique\" absolue. Laisse le terrain t'indiquer les vraies priorités, pas tes intuitions.</p>"}]}, {"id": "IV", "title": "Étude technique : logiciels, machines, formats", "subtitle": "L'écosystème technique de la menuiserie CNC en profondeur", "sections": [{"title": "Document de référence pour The Wooder", "html": "<p><strong>Objet</strong> : comprendre en profondeur l'écosystème technique de la menuiserie CNC, pour calibrer tes fichiers de sortie et pouvoir parler d'égal à égal avec tous les menuisiers que tu vas rencontrer.</p>\n<p><strong>Comment lire ce document</strong> : il fait volontairement l'objet d'une lecture approfondie. La partie I (vision d'ensemble) te donne le modèle mental global en 15 minutes. Les parties II à VI sont des références techniques — tu y reviens au fur et à mesure. La partie VII (stratégie pour The Wooder) est ta synthèse opérationnelle.</p>\n<hr />"}, {"title": "Sommaire", "html": "<ul>\n<li><strong>Partie I</strong> — Anatomie d'une chaîne CAO → CAM → CNC</li>\n<li><strong>Partie II</strong> — Les machines CNC en menuiserie</li>\n<li><strong>Partie III</strong> — Les logiciels CAO et CAM</li>\n<li><strong>Partie IV</strong> — Les formats de fichiers (DXF, MPR, CIX, BTL, etc.)</li>\n<li><strong>Partie V</strong> — Conventions DXF pour menuiserie CNC (standards de facto)</li>\n<li><strong>Partie VI</strong> — Spécifications des connecteurs (Clamex, Cabineo, excentriques)</li>\n<li><strong>Partie VII</strong> — Stratégie d'adaptation pour The Wooder</li>\n<li><strong>Partie VIII</strong> — Plan d'action technique</li>\n</ul>\n<hr />"}, {"title": "1.1 Le principe fondamental : trois maillons distincts", "html": "<p>Quand un client commande un meuble qui va passer en production CNC, le projet traverse trois univers logiciels différents. Ce sont <strong>trois métiers, trois logiciels, trois formats</strong>. Comprendre cette séparation est la clé de tout.</p>\n<table>\n<thead>\n<tr>\n<th>Maillon</th>\n<th>Rôle</th>\n<th>Question qu'il répond</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>CAO</strong> (Conception Assistée par Ordinateur)</td>\n<td>Concevoir le meuble en 3D</td>\n<td>\"À quoi ressemble le meuble ?\"</td>\n</tr>\n<tr>\n<td><strong>CAM</strong> (Fabrication Assistée par Ordinateur)</td>\n<td>Décomposer en pièces et définir les usinages</td>\n<td>\"Comment on le fabrique, avec quels outils ?\"</td>\n</tr>\n<tr>\n<td><strong>CN</strong> (Commande Numérique)</td>\n<td>Piloter la machine</td>\n<td>\"Quel mouvement d'outil à quel instant ?\"</td>\n</tr>\n</tbody>\n</table>\n<p>Chaque maillon produit un fichier différent et parle un \"langage\" différent. La sortie de l'un devient l'entrée du suivant.</p>"}, {"title": "1.2 Le parcours complet d'une pièce", "html": "<p>Voici ce qui se passe, de l'idée au copeau :</p>\n<p><strong>Étape 1 — Conception (CAO)</strong>\nLe menuisier ou le bureau d'études modélise le meuble en 3D dans un logiciel de CAO (TopSolid, Cadwork, SketchUp, Fusion 360, Polyboard, etc.). À la fin, on a un modèle 3D complet du meuble, généralement enregistré dans le format natif du logiciel (.top pour TopSolid, .dwg pour AutoCAD-based, etc.) ou exporté en STEP / IGES pour échange.</p>\n<p><strong>Étape 2 — Décomposition en pièces</strong>\nOn génère une nomenclature de pièces : chaque panneau, chaque élément est extrait et identifié. Pour chaque pièce, on connaît ses dimensions, son matériau, son épaisseur, ses usinages (perçages, rainures, feuillures, contour).</p>\n<p><strong>Étape 3 — Préparation fabrication (CAM)</strong>\nPour chaque pièce individuelle, on définit les usinages : quel outil, quelle profondeur, quelle trajectoire, quel ordre. Ça se fait dans un logiciel CAM (Alphacam, woodWOP, bSolid, Maestro, TopSolid'Cam, etc.). Ce logiciel produit un fichier au format compris par la machine (MPR, CIX, TCN, HOP, etc.) ou un DXF technologique enrichi.</p>\n<p><strong>Étape 4 — Exécution (CN)</strong>\nLa machine reçoit le fichier, le lit via son contrôleur, et exécute les mouvements. Parfois, le fichier CAM contient déjà le G-code. Parfois, le contrôleur de la machine régénère le G-code à partir d'un fichier de plus haut niveau (MPR, CIX). Le G-code est le langage bas niveau de la machine (\"va à la position X,Y,Z\", \"descends la broche\", \"tourne dans le sens horaire\").</p>"}, {"title": "1.3 Où ton outil s'insère dans la chaîne", "html": "<p>The Wooder génère des <strong>fichiers de sortie qui doivent s'insérer dans cette chaîne</strong>. La question critique est : <strong>à quel maillon ?</strong></p>\n<p>Trois stratégies sont possibles :</p>\n<p><strong>Stratégie A — Sortir en amont du CAM (DXF générique)</strong>\nTu génères un DXF 2D avec la géométrie des pièces et les positions d'usinage. Le menuisier importe ce DXF dans son logiciel CAM (Alphacam, woodWOP, bSolid), applique ses outils, génère le programme machine. <strong>Avantage</strong> : universel, compatible avec tout le monde. <strong>Inconvénient</strong> : le menuisier refait du travail CAM, donc il gagne peu de temps net.</p>\n<p><strong>Stratégie B — Sortir en format natif machine (MPR, CIX, TCN, HOP)</strong>\nTu génères directement le fichier dans le format de la machine du menuisier. <strong>Avantage</strong> : plug-and-play, le menuisier lance la production sans intervention. <strong>Inconvénient</strong> : il faut un export par format, soit 5-6 formats à maintenir, avec des particularités pour chaque version de chaque logiciel.</p>\n<p><strong>Stratégie C — Sortir en DXF \"technologique\" avec conventions enrichies</strong>\nTu génères un DXF 2D, mais avec des calques nommés selon les conventions woodWOP (qui sont les plus largement supportées par les logiciels CAM modernes). Cela permet aux logiciels CAM de reconnaître automatiquement les usinages (perçages verticaux, rainures, contours) sans intervention manuelle. <strong>C'est le meilleur compromis pour une V1</strong> — nous y revenons en Partie VII.</p>"}, {"title": "1.4 Le vocabulaire à maîtriser", "html": "<p>Quelques termes qui reviennent constamment et qu'un menuisier utilise sans les définir :</p>\n<p><strong>Nesting</strong> : optimisation du placement des pièces sur un panneau brut pour minimiser les chutes. Une machine \"de nesting\" est un centre d'usinage conçu pour débiter plusieurs pièces imbriquées d'un panneau en une seule passe.</p>\n<p><strong>Post-processeur (ou post-processor, souvent abrégé \"post\")</strong> : logiciel qui traduit la sortie d'un CAM en langage compris par une machine spécifique. Chaque marque/modèle de machine a (en général) son propre post-processeur. C'est souvent une zone de friction — la machine ne comprend pas les fichiers sans le bon post.</p>\n<p><strong>G-code (ou ISO)</strong> : langage bas niveau standardisé (ISO 6983) que comprennent toutes les machines CNC. En menuiserie, on l'utilise rarement directement — on passe par des formats de plus haut niveau (MPR, CIX, etc.) qui sont plus expressifs.</p>\n<p><strong>Usinage 3 axes / 4 axes / 5 axes</strong> : nombre de degrés de liberté de la tête d'usinage. Les 5 axes permettent d'usiner n'importe quelle face d'une pièce dans n'importe quelle orientation.</p>\n<p><strong>Agrégats</strong> : petits modules d'outils interchangeables montés sur la broche principale (agrégat de perçage horizontal, agrégat de rainurage, agrégat de lame circulaire, etc.).</p>\n<p><strong>Tête de perçage (ou cabochon, ou boîte de perçage)</strong> : module avec plusieurs broches de perçage parallèles, qui permet de faire plusieurs perçages simultanément (ligne de système à 32 mm par exemple).</p>\n<p><strong>Ventouses et tables</strong> : les pièces sont maintenues pendant l'usinage soit par aspiration sur une table lisse (nesting), soit par des ventouses positionnées sur des barres (table à consoles), soit par brides mécaniques.</p>\n<p><strong>Pas de 32 (ligne de système)</strong> : norme de positionnement des perçages verticaux pour les ferrures de meubles (charnières, coulisses, équerres). Les perçages sont espacés de 32 mm les uns des autres, à 37 mm du bord.</p>\n<hr />"}, {"title": "2.1 Les grandes familles de machines", "html": "<p>On confond souvent \"CNC menuiserie\" avec \"centre d'usinage\". En réalité, il y a plusieurs familles distinctes, chacune avec son usage.</p>\n<h3>Centre d'usinage à ventouses (table à consoles)</h3>\n<p><strong>Principe</strong> : la pièce est posée et maintenue par ventouses sur des barres positionnables. La tête d'usinage se déplace au-dessus. Adaptée aux pièces finies (portes, plans de travail, panneaux déjà au format).</p>\n<p><strong>Usages typiques</strong> : agencement, portes, fenêtres, escaliers, pièces unitaires ou petites séries.</p>\n<p><strong>Exemples machines</strong> : Biesse Rover, Homag Venture / BMG / BMB, SCM Morbidelli M, Felder Format-4 profit H, Holz-Her Pro-Master.</p>\n<h3>Centre d'usinage nesting (table lisse + aspiration)</h3>\n<p><strong>Principe</strong> : un panneau brut entier est posé sur une table lisse avec aspiration uniforme. La machine débite et usine plusieurs pièces imbriquées en une seule passe.</p>\n<p><strong>Usages typiques</strong> : production de meubles en panneaux (cuisines, dressings), agencement en série.</p>\n<p><strong>Exemples</strong> : Biesse Rover K / Rover A Nesting, Homag Centateq N / Rober-Knight, SCM Morbidelli X200, Felder Format-4 profit H08.</p>\n<p><strong>C'est le type de machine qui correspond le mieux à ton cas d'usage</strong> (meubles en panneaux sur mesure).</p>\n<h3>Perceuse CNC dédiée</h3>\n<p><strong>Principe</strong> : machine spécialisée dans le perçage avec plusieurs têtes de perçage parallèles. Souvent utilisée en post-process d'un centre d'usinage pour percer les chants.</p>\n<p><strong>Exemples</strong> : Homag DRILLTEQ D, Biesse Skipper, SCM Startech.</p>\n<h3>Plaqueuse de chant CNC</h3>\n<p><strong>Principe</strong> : applique une bande de chant thermocollée ou à colle fondue sur les bords des panneaux. Souvent en ligne avec le centre d'usinage nesting.</p>\n<p><strong>Exemples</strong> : Homag Edgeteq, Biesse Stream, SCM Olimpic.</p>\n<h3>Machine combinée (combi ou centre 5 axes)</h3>\n<p><strong>Principe</strong> : très polyvalentes, avec tête 5 axes qui permet tous types d'usinages complexes.</p>\n<p><strong>Usages typiques</strong> : ateliers pro haut de gamme, pièces complexes (escaliers, charpente bois, menuiserie architecturale).</p>\n<p><strong>Exemples</strong> : Biesse Rover B FT, Homag Centateq P-300 / BMG, SCM Accord.</p>"}, {"title": "2.2 Les axes d'usinage : ce que ça change", "html": "<table>\n<thead>\n<tr>\n<th>Nombre d'axes</th>\n<th>Capacités</th>\n<th>Usage typique en menuiserie</th>\n<th>Prix indicatif</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>3 axes</strong></td>\n<td>Fraisage + perçage vertical uniquement</td>\n<td>Nesting standard, meuble simple</td>\n<td>40–80 k€ neuf, 15–35 k€ occasion</td>\n</tr>\n<tr>\n<td><strong>3 + boîte perçage</strong></td>\n<td>Ajoute perçages verticaux multiples</td>\n<td>Cuisines, dressings en série</td>\n<td>50–100 k€</td>\n</tr>\n<tr>\n<td><strong>3 + tête inclinable</strong></td>\n<td>Ajoute perçage horizontal (chants)</td>\n<td>Meubles avec connecteurs en chant</td>\n<td>70–130 k€</td>\n</tr>\n<tr>\n<td><strong>4 axes</strong></td>\n<td>Tête pivotante sur un axe supplémentaire</td>\n<td>Formes courbes, découpes 2D+</td>\n<td>80–150 k€</td>\n</tr>\n<tr>\n<td><strong>5 axes</strong></td>\n<td>Tête pivotante sur deux axes</td>\n<td>Agencement complexe, escaliers, formes libres</td>\n<td>100–250 k€ et plus</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Implication pour The Wooder</strong> : tu dois savoir à qui tu t'adresses. Les menuisiers avec <strong>centre nesting 3 axes + boîte perçage</strong> sont ta cible principale — c'est la configuration dominante pour la production de meubles en panneaux.</p>"}, {"title": "2.3 Les principaux fabricants (marché français)", "html": "<h3>Les leaders mondiaux</h3>\n<p><strong>Homag (Allemagne)</strong> — groupe Weinmann, inclut les marques Homag, Weeke (entrée de gamme), Butfering. Très présent en France sur l'industrie et l'artisanat pro. Logiciel CAM propriétaire : <strong>woodWOP</strong> (référence de facto du marché). Ligne de commande la plus cohérente du marché.</p>\n<p><strong>Biesse (Italie)</strong> — présent partout. Logiciels : <strong>BiesseWorks</strong> (legacy) et <strong>bSolid</strong> (moderne). Très bien implanté chez les artisans équipés CNC en France.</p>\n<p><strong>SCM Group (Italie)</strong> — inclut SCM, Morbidelli, CMS. Logiciels : <strong>Xilog Plus</strong> (legacy), <strong>Xilog Maestro</strong> (moderne). Historiquement très présent en France via Philippon et d'autres distributeurs.</p>\n<h3>Les acteurs de qualité</h3>\n<p><strong>Felder Group (Autriche)</strong> — machines d'entrée et milieu de gamme, très populaires chez les artisans français. Utilise <strong>TpaCAD</strong> (format TCN). Inclut aussi la marque Format-4.</p>\n<p><strong>Holz-Her (Allemagne / Weinig)</strong> — milieu de gamme, bien placé. Logiciel : <strong>NC-HOPS</strong> (format HOP).</p>\n<h3>Les autres</h3>\n<p><strong>Maka, Vitap, Brema, Masterwood, IMA Schelling, CMS, Uniteam</strong> — présents de façon plus ciblée. Vitap et Brema utilisent TpaCAD.</p>"}, {"title": "2.4 Ce qu'il faut comprendre pour ton RDV menuisier", "html": "<p>Quand tu rencontres un menuisier, <strong>les 4 questions machine à poser</strong> sont :</p>\n<ol>\n<li><strong>Marque et modèle de la machine</strong> (ex. Biesse Rover A 1332) → te dit quel format natif il attend</li>\n<li><strong>Nombre d'axes</strong> (3, 3+1, 4, 5) → te dit quels types d'usinages il peut faire</li>\n<li><strong>Logiciel CAM utilisé</strong> (woodWOP, bSolid, Xilog Maestro, Alphacam, TopSolid, etc.) → te dit quel format de fichier tu dois produire</li>\n<li><strong>Version du logiciel</strong> (woodWOP 6.1, 7.0, 8.x, etc.) → les formats évoluent entre versions</li>\n</ol>\n<p>Ces 4 réponses définissent entièrement la compatibilité.</p>\n<hr />"}, {"title": "3.1 Comprendre la séparation CAO / CAM / CAO-CAM intégré", "html": "<p>Il y a <strong>trois familles de logiciels</strong>, parfois confondues :</p>\n<ul>\n<li><strong>Logiciels CAO pure</strong> : font de la conception 3D, produisent des modèles. Exemples : SketchUp, Fusion 360 (mode design), Rhino.</li>\n<li><strong>Logiciels CAM pure</strong> : reçoivent un modèle 3D et le préparent pour la machine. Exemples : Alphacam, woodWOP, bSolid, Maestro, NC-HOPS, TpaCAD.</li>\n<li><strong>Logiciels CAO-CAM intégrés</strong> : font les deux dans un seul logiciel. Exemples : TopSolid'Wood, Cabinet Vision, Polyboard (CAD + Pro PP), Cadwork, woodLAB CAD+CAM.</li>\n</ul>"}, {"title": "3.2 Les logiciels CAM dominants", "html": "<h3>woodWOP (Homag / Weeke)</h3>\n<p><strong>Qui l'utilise</strong> : tous les ateliers avec une machine Homag ou Weeke. C'est aussi le format de référence que <strong>beaucoup d'autres logiciels CAO savent exporter</strong>, ce qui en fait de facto un standard de l'industrie.</p>\n<p><strong>Format de sortie</strong> : <strong>MPR</strong> (texte, historique) ou <strong>MPR5</strong> (XML moderne). Ces fichiers décrivent la pièce, ses dimensions, et la séquence d'usinages avec les outils.</p>\n<p><strong>Particularités</strong> :\n- L'import DXF dans woodWOP se fait sur la base de <strong>noms de calques</strong> standardisés (BOHRV, BOHRH, NUT, etc.) — voir Partie V\n- Les versions 6.1 à 8.x lisent encore les MPR de l'ancien format\n- Peut lire G-code en entrée, mais ce n'est pas l'usage normal</p>\n<h3>BiesseWorks / bSolid (Biesse)</h3>\n<p><strong>Qui l'utilise</strong> : tous les ateliers avec une machine Biesse.</p>\n<p><strong>Format de sortie</strong> : <strong>BPP</strong> (legacy), <strong>CIX</strong> / <strong>CID</strong> (moderne, XML). La transition de BiesseWorks vers bSolid est en cours, donc tu verras les deux formats dans la nature.</p>\n<p><strong>Particularités</strong> :\n- Le format CIX est plus compatible multi-machines que l'ISO pur\n- bSolid accepte aussi les DXF avec des conventions propres (différentes de woodWOP)</p>\n<h3>Xilog Plus / Xilog Maestro / Maestro Active (SCM, Morbidelli)</h3>\n<p><strong>Qui l'utilise</strong> : ateliers avec machines SCM ou Morbidelli.</p>\n<p><strong>Format de sortie</strong> : <strong>XXL</strong> / <strong>.tlf</strong> (Xilog legacy) ou fichiers Maestro. Maestro Active est la génération actuelle.</p>\n<h3>NC-HOPS (Holz-Her)</h3>\n<p><strong>Format de sortie</strong> : <strong>HOP</strong>.</p>\n<h3>TpaCAD (Felder, Vitap, Brema, et autres clients TPA)</h3>\n<p><strong>Format de sortie</strong> : <strong>TCN</strong>.</p>\n<p>TPA est un éditeur italien qui fournit le logiciel CAM de plusieurs constructeurs — donc le format TCN est assez répandu.</p>\n<h3>Alphacam (Hexagon, éditeur Vero Software)</h3>\n<p><strong>Qui l'utilise</strong> : c'est le CAM <strong>généraliste</strong> le plus répandu dans le monde de la menuiserie pro. Utilisé par des ateliers qui ont des machines de différentes marques, ou qui veulent un outil indépendant du fabricant.</p>\n<p><strong>Particularités</strong> :\n- Importe à peu près tous les formats CAO (DXF, DWG, STEP, IGES, SAT, IPT, x_t, SLDPRT, etc.)\n- Possède des modules spécialisés : <strong>xNesting</strong> (imbrication), <strong>xSolids</strong> (usinage de solides 3D), <strong>xSimultaneous</strong> (5 axes continus)\n- Produit du G-code via post-processeur pour à peu près n'importe quelle machine</p>\n<p>Si un menuisier te dit \"j'utilise Alphacam\", c'est <strong>excellente nouvelle</strong> — l'import DXF y est très bien géré.</p>"}, {"title": "3.3 Les logiciels CAO / CAO-CAM intégrés orientés meuble", "html": "<h3>TopSolid'Wood (Missler Software, France)</h3>\n<p><strong>Qui l'utilise</strong> : <strong>le logiciel pro de référence en France</strong> pour la menuiserie sur mesure. Éditeur français (Missler). Suite complète CAO + CAM + ERP + ShopFloor.</p>\n<p><strong>Positionnement</strong> : haut de gamme. Très puissant mais coûteux (5 000 à 50 000 € selon configuration). Courbe d'apprentissage importante.</p>\n<p><strong>Pourquoi c'est important pour toi</strong> : si un menuisier haut de gamme te dit \"j'utilise TopSolid\", tu sais que tu as affaire à une structure déjà bien équipée techniquement. C'est une cible \"premium\" : ils seront exigeants sur la qualité de tes fichiers, mais s'ils t'adoptent, ce sont des ambassadeurs précieux.</p>\n<h3>Cabinet Vision (Hexagon)</h3>\n<p><strong>Usage</strong> : très populaire chez les fabricants de meubles en Amérique du Nord, moins en France, mais présent. Spécialisé meubles.</p>\n<h3>Polyboard (Wood Designer)</h3>\n<p><strong>Usage</strong> : logiciel français (édité par Wood Designer), orienté meuble modulaire. Produit directement des fichiers natifs pour woodWOP, BiesseWorks/bSolid, Xilog, TpaCAD, NC-HOPS.</p>\n<p><strong>Particularité</strong> : postprocesseurs configurables, export DXF \"technologique\" (avec calques nommés), très utilisé chez les petits ateliers qui veulent une solution intégrée sans payer TopSolid.</p>\n<h3>Cadwork</h3>\n<p><strong>Usage</strong> : principalement pour la charpente bois et la menuiserie extérieure (fenêtres, escaliers, ossature). Exports STEP, DXF, format BTL.</p>\n<h3>Fusion 360 (Autodesk)</h3>\n<p><strong>Usage</strong> : plutôt mécanique, mais certains artisans petits/moyens l'utilisent pour la menuiserie. CAO + CAM intégré. Son atout : abordable (gratuit pour les usages non commerciaux ou petits CA).</p>\n<h3>SketchList 3D, SketchUp + extensions, Cabinet Pro</h3>\n<p><strong>Usage</strong> : logiciels d'entrée de gamme ou semi-professionnels. SketchUp est très utilisé pour la conception rapide, mais pas pour le CAM pur.</p>"}, {"title": "3.4 Ce que ça veut dire pour toi en RDV", "html": "<p><strong>Le paysage CAM est fragmenté par marque de machine.</strong> Il y a environ <strong>5 à 7 formats natifs</strong> qui couvrent 90% du marché professionnel.</p>\n<p><strong>Mais le DXF reste le dénominateur commun universel.</strong> Tous les logiciels CAM savent importer un DXF. La qualité du DXF (calques, précision, conventions) détermine le travail d'import.</p>\n<p><strong>Ta question clé en RDV</strong> : \"Est-ce que votre logiciel CAM importe les DXF avec les conventions de calques woodWOP ?\"</p>\n<p>Si la réponse est oui → tu produis un DXF woodWOP-compatible et ça marche.\nSi la réponse est non → tu dois soit adapter, soit produire un export natif de leur format.</p>\n<hr />"}, {"title": "4.1 Vue d'ensemble", "html": "<table>\n<thead>\n<tr>\n<th>Format</th>\n<th>Type</th>\n<th>Nature</th>\n<th>Usage en menuiserie</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>G-code (ISO)</strong></td>\n<td>CN bas niveau</td>\n<td>Texte, ASCII</td>\n<td>Langage machine universel, rarement utilisé directement en menuiserie</td>\n</tr>\n<tr>\n<td><strong>DXF</strong></td>\n<td>Échange 2D/3D</td>\n<td>Texte (ASCII) ou binaire</td>\n<td>Format d'échange universel — <strong>le plus important pour toi</strong></td>\n</tr>\n<tr>\n<td><strong>DWG</strong></td>\n<td>Format natif AutoCAD</td>\n<td>Binaire</td>\n<td>Variante propriétaire du DXF. Moins utilisée en menuiserie</td>\n</tr>\n<tr>\n<td><strong>STEP (.stp, .step)</strong></td>\n<td>Échange 3D</td>\n<td>Texte ISO 10303</td>\n<td>Échange de modèles 3D paramétriques entre CAO</td>\n</tr>\n<tr>\n<td><strong>IGES (.igs)</strong></td>\n<td>Échange 3D</td>\n<td>Texte</td>\n<td>Ancêtre du STEP, encore lisible mais obsolète</td>\n</tr>\n<tr>\n<td><strong>MPR / MPR5</strong></td>\n<td>woodWOP</td>\n<td>Texte / XML</td>\n<td>Format Homag/Weeke</td>\n</tr>\n<tr>\n<td><strong>BPP</strong></td>\n<td>BiesseWorks legacy</td>\n<td>Texte</td>\n<td>Ancien format Biesse</td>\n</tr>\n<tr>\n<td><strong>CIX / CID</strong></td>\n<td>bSolid moderne</td>\n<td>XML</td>\n<td>Format Biesse actuel</td>\n</tr>\n<tr>\n<td><strong>XXL / .tlf</strong></td>\n<td>Xilog</td>\n<td>Texte</td>\n<td>Format SCM/Morbidelli</td>\n</tr>\n<tr>\n<td><strong>TCN</strong></td>\n<td>TpaCAD</td>\n<td>Texte</td>\n<td>Format Felder, Vitap, Brema</td>\n</tr>\n<tr>\n<td><strong>HOP</strong></td>\n<td>NC-HOPS</td>\n<td>Texte</td>\n<td>Format Holz-Her</td>\n</tr>\n<tr>\n<td><strong>BTL</strong></td>\n<td>Échange bois structure</td>\n<td>XML</td>\n<td>Charpente, ossature</td>\n</tr>\n<tr>\n<td><strong>Izy</strong></td>\n<td>Nouvelle norme</td>\n<td>XML</td>\n<td>Interface commune Biesse/Homag/SCM lancée en 2021 (émergent)</td>\n</tr>\n<tr>\n<td><strong>SAT, x_t</strong></td>\n<td>Échange solide 3D</td>\n<td>Binaire</td>\n<td>Formats de solide paramétrique</td>\n</tr>\n</tbody>\n</table>"}, {"title": "4.2 Le DXF en détail (ce que tu produis actuellement)", "html": "<p>Le DXF (<strong>Drawing eXchange Format</strong>) est un format ouvert créé par Autodesk en 1982 pour AutoCAD. C'est devenu le <strong>standard universel d'échange 2D</strong> en CAO/CAM, malgré ses nombreuses imperfections.</p>\n<h3>Structure d'un DXF</h3>\n<p>Un DXF est un fichier texte (en ASCII) organisé en <strong>sections</strong> :</p>\n<ul>\n<li><strong>HEADER</strong> : variables globales (unités, limites, version)</li>\n<li><strong>TABLES</strong> : définitions (calques, styles de texte, types de ligne, blocs)</li>\n<li><strong>BLOCKS</strong> : définitions de blocs réutilisables</li>\n<li><strong>ENTITIES</strong> : les objets dessinés (lignes, cercles, arcs, polylignes, textes, etc.)</li>\n</ul>\n<p>Chaque entité a des propriétés : calque, couleur, type de ligne, coordonnées.</p>\n<h3>Les versions de DXF</h3>\n<p>Les versions importantes à connaître :</p>\n<table>\n<thead>\n<tr>\n<th>Version AutoCAD</th>\n<th>Version DXF</th>\n<th>Commentaire</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>AutoCAD R12</td>\n<td>DXF R12 / AC1009</td>\n<td><strong>Compatibilité maximale</strong>. Tous les CAM le lisent. Recommandé par défaut.</td>\n</tr>\n<tr>\n<td>AutoCAD 2000</td>\n<td>AC1015</td>\n<td>Large compatibilité.</td>\n</tr>\n<tr>\n<td>AutoCAD 2007</td>\n<td>AC1021</td>\n<td>Large compatibilité, supporte Unicode.</td>\n</tr>\n<tr>\n<td>AutoCAD 2010</td>\n<td>AC1024</td>\n<td>Moderne mais parfois pas supporté par vieux CAM.</td>\n</tr>\n<tr>\n<td>AutoCAD 2013</td>\n<td>AC1027</td>\n<td>Récent.</td>\n</tr>\n<tr>\n<td>AutoCAD 2018+</td>\n<td>AC1032+</td>\n<td>Très récent. Support pas universel.</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Recommandation pour toi</strong> : génère <strong>DXF R12 ou AutoCAD 2000</strong>. C'est la compatibilité maximale sans rien perdre de fonctionnalité utile en menuiserie.</p>\n<h3>Unités dans un DXF</h3>\n<p>La variable <code>$INSUNITS</code> du header indique l'unité :\n- 0 = sans unité\n- 1 = pouces\n- 4 = millimètres (<strong>ce que tu dois utiliser</strong>)\n- 5 = centimètres\n- 6 = mètres</p>\n<p><strong>ATTENTION</strong> : certains logiciels ignorent <code>$INSUNITS</code> et assument que les coordonnées numériques sont en mm. D'autres s'y fient. Par prudence, <strong>toujours exprimer les coordonnées en millimètres</strong> et positionner <code>$INSUNITS = 4</code>.</p>\n<h3>Entités DXF utiles en menuiserie</h3>\n<table>\n<thead>\n<tr>\n<th>Entité</th>\n<th>Usage en menuiserie</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>LINE</code></td>\n<td>Segments droits</td>\n</tr>\n<tr>\n<td><code>ARC</code></td>\n<td>Arcs de cercle (ex. arrondis)</td>\n</tr>\n<tr>\n<td><code>CIRCLE</code></td>\n<td>Perçages (centre + rayon)</td>\n</tr>\n<tr>\n<td><code>LWPOLYLINE</code></td>\n<td>Contours fermés, polylignes simples</td>\n</tr>\n<tr>\n<td><code>POLYLINE</code></td>\n<td>Ancien format, même rôle</td>\n</tr>\n<tr>\n<td><code>TEXT</code></td>\n<td>Annotations, numéros de pièce</td>\n</tr>\n<tr>\n<td><code>INSERT</code></td>\n<td>Insertion de bloc (à éviter pour les imports CAM)</td>\n</tr>\n</tbody>\n</table>\n<p><strong>À éviter absolument</strong> :\n- Les <strong>splines</strong> (<code>SPLINE</code>) — mal interprétées par de nombreux CAM, convertir en polyligne approchée\n- Les <strong>blocs imbriqués</strong> — certains logiciels ne savent pas les résoudre à l'import\n- Les <strong>ellipses pures</strong> — même problème, préférer des arcs</p>"}, {"title": "4.3 Le format MPR (woodWOP)", "html": "<p>Le <strong>MPR</strong> est le format natif de woodWOP. C'est un fichier texte structuré qui décrit :\n- <strong>Les dimensions de la pièce</strong> (longueur, largeur, épaisseur)\n- <strong>Les paramètres du matériau</strong>\n- <strong>La séquence d'usinages</strong> : chaque usinage (perçage, rainure, contour) est décrit avec ses coordonnées et paramètres d'outil</p>\n<p>Exemple simplifié de structure MPR :</p>\n<pre><code>[H]\nLA=600      ← Longueur panneau (mm)\nBR=400      ← Largeur panneau (mm)\nDI=19       ← Épaisseur (mm)\n\n[001]\n&lt;BEGIN&gt;\nBS XMP 5\nXA=50\nYA=50\nTI=10       ← Profondeur\nBM=5        ← Diamètre\n&lt;END&gt;\n</code></pre>\n<p><strong>Ce que tu dois en retenir</strong> : le MPR est <strong>plus qu'un DXF</strong>, parce qu'il inclut les paramètres d'usinage (profondeur, outil). Un menuisier qui reçoit un MPR a besoin de rien ajouter. Un DXF, lui, a besoin d'être associé à des règles d'usinage dans le CAM.</p>"}, {"title": "4.4 Le format CIX (bSolid)", "html": "<p>Le <strong>CIX</strong> est la version XML du format Biesse. Lisible par un humain, structuré en macros d'usinage. Il décrit les opérations géométriques (GEO) et les opérations de routage (ROUT), avec les outils et paramètres.</p>\n<p><strong>Particularité</strong> : sensible aux doublons de points avec mêmes coordonnées X/Y et des Z différents — peut poser des problèmes lors de plongées d'outil.</p>"}, {"title": "4.5 Les autres formats natifs", "html": "<p><strong>TCN (TpaCAD)</strong> : format texte structuré, similaire dans l'esprit au MPR.</p>\n<p><strong>HOP (NC-HOPS)</strong> : format Holz-Her, texte structuré.</p>\n<p><strong>XXL (Xilog Plus)</strong> et Maestro : formats SCM.</p>\n<p>Tu n'as pas à générer ces formats en V1. Mais il faut savoir qu'ils existent pour calibrer tes conversations.</p>"}, {"title": "4.6 Les formats 3D d'échange", "html": "<h3>STEP (.stp / .step)</h3>\n<p>Format ISO 10303 (AP203 / AP214 / AP242), <strong>standard mondial</strong> pour l'échange de modèles 3D paramétriques entre logiciels de CAO.</p>\n<p><strong>Usage pour toi</strong> : si un jour The Wooder passe de la 2D à la 3D (génération de modèles paramétriques depuis le configurateur), c'est le STEP que tu utiliseras comme format d'échange. Les logiciels comme TopSolid, Cabinet Vision, Alphacam xSolids savent l'importer et en extraire les pièces + usinages.</p>\n<h3>IGES (.igs)</h3>\n<p>Ancêtre du STEP, encore supporté mais peu utilisé pour du neuf.</p>\n<h3>SAT, x_t (Parasolid)</h3>\n<p>Formats de noyau géométrique. Utilisés en interne par les logiciels haut de gamme.</p>"}, {"title": "4.7 Le format Izy (à connaître, émergent)", "html": "<p>En 2021, 7 acteurs majeurs de la machine à bois (Biesse, Bürkle, Homag, IMA Schelling, SCM, Weber, Weinig) ont lancé <strong>Izy</strong>, une interface XML commune pour la communication entre logiciels et machines. L'objectif est d'éviter la fragmentation des formats natifs.</p>\n<p>Izy n'est pas encore massivement adopté (en 2026), mais c'est une direction structurante du marché à surveiller.</p>\n<hr />"}, {"title": "5.1 Le principe : pilotage par calques", "html": "<p>Dans un DXF pour menuiserie CNC, <strong>la géométrie seule ne suffit pas</strong>. Un cercle de 5 mm de diamètre peut être un perçage traversant, un perçage borgne de 10 mm de profondeur, un perçage d'accroche de charnière, un point de repère, etc. La machine a besoin de savoir <strong>quelle opération</strong> faire et <strong>avec quels paramètres</strong>.</p>\n<p>La solution standard : <strong>placer chaque type d'usinage sur un calque spécifique avec un nom normé</strong>. Le logiciel CAM reconnaît le nom du calque et applique automatiquement les règles d'usinage correspondantes.</p>\n<p><strong>La convention woodWOP est devenue un standard de facto</strong>, adoptée par Alphacam, Polyboard, bSolid (en import), TpaCAD (en import), et bien d'autres. Donc <strong>si tu génères un DXF woodWOP-compatible, tu maximises ta compatibilité</strong>.</p>"}, {"title": "5.2 Convention woodWOP — calques standards", "html": "<p>Voici les noms de calques standards utilisés par woodWOP (ancien et BPP5), qui sont reconnus par la plupart des logiciels CAM :</p>\n<h3>Contours</h3>\n<ul>\n<li><code>AUSSEN</code> : contour extérieur (découpe de la pièce)</li>\n<li><code>INNEN</code> : contours intérieurs (poches, ouvertures)</li>\n</ul>\n<h3>Perçages verticaux (depuis la face)</h3>\n<ul>\n<li><code>BOHRV</code> : perçages verticaux traversants ou borgnes, diamètres standards</li>\n<li><code>BOHRVxx</code> où <code>xx</code> est le diamètre (ex. <code>BOHRV5</code> pour Ø5, <code>BOHRV8</code> pour Ø8, <code>BOHRV15</code> pour Ø15)</li>\n</ul>\n<h3>Perçages horizontaux (depuis le chant)</h3>\n<ul>\n<li><code>BOHRHxx</code> : perçage horizontal diamètre xx</li>\n<li><code>BOHRHOLx</code> : perçage horizontal côté gauche (Links)</li>\n<li><code>BOHRHORx</code> : perçage horizontal côté droit (Rechts)</li>\n<li><code>BOHRHVOx</code> : perçage horizontal chant avant (Vorn)</li>\n<li><code>BOHRHHIx</code> : perçage horizontal chant arrière (Hinten)</li>\n</ul>\n<h3>Rainures et feuillures</h3>\n<ul>\n<li><code>NUT</code> : rainure générique</li>\n<li><code>NUTxx</code> : rainure largeur xx</li>\n<li><code>FALZ</code> : feuillure (rebate)</li>\n</ul>\n<h3>Profil / contournage</h3>\n<ul>\n<li><code>FRAES</code> : fraisage de contour (routing)</li>\n<li><code>TASCHE</code> : poche</li>\n</ul>\n<h3>Texte et annotations</h3>\n<ul>\n<li><code>TEXT</code> : annotations imprimables (numéro de pièce, référence)</li>\n</ul>"}, {"title": "5.3 Convention couleurs (indicatives, pas obligatoires)", "html": "<p>Les couleurs dans un DXF sont \"visuelles\", mais certains logiciels peuvent les interpréter. La convention courante :</p>\n<table>\n<thead>\n<tr>\n<th>Couleur (AutoCAD Color Index)</th>\n<th>Numéro</th>\n<th>Usage typique</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Blanc / Noir</td>\n<td>7</td>\n<td>Contour principal</td>\n</tr>\n<tr>\n<td>Rouge</td>\n<td>1</td>\n<td>Découpes, perçages critiques</td>\n</tr>\n<tr>\n<td>Jaune</td>\n<td>2</td>\n<td>Perçages secondaires</td>\n</tr>\n<tr>\n<td>Vert</td>\n<td>3</td>\n<td>Rainures</td>\n</tr>\n<tr>\n<td>Cyan</td>\n<td>4</td>\n<td>Poches, fraisages</td>\n</tr>\n<tr>\n<td>Bleu</td>\n<td>5</td>\n<td>Texte, annotations</td>\n</tr>\n<tr>\n<td>Magenta</td>\n<td>6</td>\n<td>Perçages horizontaux</td>\n</tr>\n</tbody>\n</table>\n<p><strong>À savoir</strong> : dans la plupart des logiciels CAM, <strong>c'est le nom du calque qui pilote l'usinage</strong>, pas la couleur. Mais une couleur cohérente aide l'opérateur à valider visuellement.</p>"}, {"title": "5.4 Règles de géométrie obligatoires", "html": "<h3>Contours fermés</h3>\n<p>Tout contour extérieur (calque <code>AUSSEN</code>) doit être une <strong>polyligne fermée</strong> (<code>LWPOLYLINE</code> avec drapeau fermé à 1). Si la machine reçoit un contour ouvert, elle ne sait pas ce qu'est \"l'intérieur\" ni \"l'extérieur\" de la pièce.</p>\n<h3>Pas de doublons</h3>\n<p>Deux lignes superposées = la machine passe deux fois au même endroit = perte de temps ou casse d'outil.</p>\n<h3>Cercles en vraies primitives</h3>\n<p>Les perçages doivent être de <strong>vrais cercles</strong> (entité <code>CIRCLE</code>), pas des polygones à 32 côtés approximant un cercle. Sinon le CAM va vouloir \"contourner\" au lieu de percer.</p>\n<h3>Référentiel clair</h3>\n<p>Le zéro pièce (0,0) doit être placé au <strong>coin inférieur gauche</strong> de la pièce (convention la plus courante), ou au centre selon la machine. <strong>Pas à un endroit aléatoire</strong>.</p>\n<p>La pièce doit être orientée avec la <strong>face visible vers le haut</strong> (Z positif) par convention.</p>\n<h3>Précision numérique</h3>\n<p>Exprimer les coordonnées avec au moins <strong>3 décimales</strong> (précision 0,001 mm). Les arrondis à 0,1 mm peuvent créer des décalages visibles.</p>\n<h3>Profondeur d'usinage</h3>\n<p>Pour les perçages borgnes, la profondeur est généralement indiquée :\n- Soit par <strong>une couleur / un calque dédié</strong> (ex. <code>BOHRV8_P10</code> = perçage Ø8 profondeur 10)\n- Soit par un <strong>texte associé</strong> sur un calque spécifique\n- Soit par une <strong>convention de sous-calques</strong> (ex. calque = diamètre, attribut = profondeur)</p>\n<p>Chaque CAM a sa convention précise. Certains CAM acceptent plusieurs méthodes.</p>"}, {"title": "5.5 Exemple concret", "html": "<p>Supposons une étagère simple : panneau 600 × 300 × 19 mm, avec 4 perçages Ø5 pour taquets, une rainure de 6 mm de large et 8 mm de profondeur en arrière.</p>\n<p>Le DXF devrait contenir :</p>\n<pre><code>Calque AUSSEN (contour):\n  LWPOLYLINE fermée: (0,0) - (600,0) - (600,300) - (0,300) - (0,0)\n\nCalque BOHRV5 (perçages Ø5):\n  CIRCLE centre=(32,32)    rayon=2.5\n  CIRCLE centre=(568,32)   rayon=2.5\n  CIRCLE centre=(32,268)   rayon=2.5\n  CIRCLE centre=(568,268)  rayon=2.5\n\nCalque NUT6 (rainure 6mm):\n  LINE (0, 290) - (600, 290)\n\nCalque TEXT:\n  TEXT &quot;P01&quot; position=(300,150)\n</code></pre>\n<p>Chaque calque porte une sémantique. La CAM applique automatiquement :\n- <code>AUSSEN</code> → défonceuse contour, outil fraise Ø8, profondeur = épaisseur + surcoupe\n- <code>BOHRV5</code> → perçage vertical Ø5, profondeur 12 mm (convention)\n- <code>NUT6</code> → rainurage 6 mm large, profondeur 8 mm (convention)</p>"}, {"title": "5.6 Particularités par logiciel", "html": "<p><strong>woodWOP</strong> : accepte les noms de calques ci-dessus, plus des variantes <code>BPP5</code> avec des noms plus descriptifs.</p>\n<p><strong>Alphacam</strong> : beaucoup plus flexible, l'utilisateur configure ses propres règles de reconnaissance. Mais lit très bien les conventions woodWOP.</p>\n<p><strong>bSolid</strong> : attend soit du CIX natif, soit un DXF avec ses propres conventions (différentes de woodWOP, plus orientées vers une description géométrique pure + configuration dans le logiciel).</p>\n<p><strong>Polyboard Pro PP</strong> : génère directement les formats natifs, n'a pas besoin de DXF technologique.</p>\n<p><strong>TpaCAD</strong> : accepte l'import DXF mais demande souvent une étape manuelle de configuration des macros.</p>\n<hr />"}, {"title": "PARTIE VI — Spécifications des connecteurs", "html": "<p>Les connecteurs Lamello et les excentriques sont souvent le talon d'Achille des fichiers générés automatiquement. Voici les spécifications précises à implémenter dans ton outil.</p>"}, {"title": "6.1 Clamex P-14", "html": "<p><strong>Usage</strong> : connecteur démontable par levier, pour assemblages à 90°, à onglet, ou en angle libre. Matériau : ≥ 15 mm en about, ≥ 18 mm en onglet.</p>\n<p><strong>Dimensions de la rainure (P-System)</strong> :\n- <strong>Largeur</strong> : 7 mm (épaisseur de la fraise P-System standard Lamello)\n- <strong>Longueur</strong> : environ 52 mm\n- <strong>Profondeur</strong> : <strong>14 mm</strong> (d'où le nom P-14)\n- <strong>Distance du bord de pièce au centre de la rainure</strong> : ≥ 2 mm de la face, positionnement au centre de l'épaisseur typiquement</p>\n<p><strong>Trou d'accès du levier</strong> (sur la face du panneau) :\n- <strong>Diamètre</strong> : <strong>6 mm</strong>\n- <strong>Profondeur</strong> : traversant, placé pour donner accès à la manette du levier</p>\n<p><strong>Entre-axe entre deux connecteurs</strong> : typiquement 200 à 300 mm, minimum 100 mm.</p>\n<p><strong>Règle d'or pour symétrie</strong> : deux panneaux qui s'assemblent avec Clamex P-14 doivent avoir des rainures <strong>parfaitement symétriques</strong> en position. Une erreur de 1 mm et ça ne s'emboîte pas.</p>"}, {"title": "6.2 Clamex P-10", "html": "<p><strong>Usage</strong> : idem P-14 mais pour matériaux plus fins (≥ 12 mm en about, ≥ 15 mm en onglet).</p>\n<p><strong>Dimensions de la rainure</strong> :\n- Largeur : 7 mm\n- Longueur : environ 52 mm\n- <strong>Profondeur : 10 mm</strong></p>\n<p>Trou d'accès : identique (Ø 6 mm).</p>"}, {"title": "6.3 Clamex P-14/10 Medius", "html": "<p><strong>Usage</strong> : pour panneaux de séparation où deux étagères arrivent à la même hauteur de part et d'autre. Épaisseur minimale du panneau de séparation : 16 mm.</p>\n<p><strong>Principe</strong> : asymétrique. Une des deux rainures fait 14 mm de profondeur (côté levier), l'autre fait 10 mm (côté contre-part), pour pouvoir les placer dos à dos dans un panneau de 16 mm.</p>"}, {"title": "6.4 Cabineo 12", "html": "<p><strong>Usage</strong> : connecteur en une pièce pour assemblages d'angle, installation en surface uniquement (pas de perçage en chant). Compatible avec toutes les CNC 3 axes. Matériau : ≥ 13 mm.</p>\n<p><strong>Géométrie d'implantation</strong> :\n- <strong>Poche fraisée</strong> : <strong>Ø 12 mm</strong> (ou moins), profondeur correspondant au corps du connecteur\n- <strong>Corps du connecteur</strong> : 33,8 × 16,5 × 10,8 mm (pour référence, le fraisage doit accueillir ce corps)\n- <strong>Perçage du corps</strong> : <strong>Ø 15 mm</strong> pour la tête / Ø 5 mm pour la partie guide, ou fraisage direct au Ø 12 mm\n- <strong>Longueur de la vis pré-montée</strong> : <strong>12 mm</strong>\n- <strong>Trou de réception sur l'autre pièce</strong> : <strong>Ø 5 mm</strong>, profondeur minimum 12 mm</p>\n<p>Possibilités de machinage :\n- Avec une fraise Ø 12 mm seule (fraisage de la poche directement)\n- Avec un foret Ø 15 mm pour la partie haute + un foret Ø 5 mm pour le guide</p>"}, {"title": "6.5 Cabineo 8", "html": "<p><strong>Usage</strong> : version pour panneaux de séparation (dividing panels) où deux étagères arrivent à la même hauteur. Épaisseur minimale du panneau de séparation : 16 mm.</p>\n<p><strong>Géométrie</strong> : identique au Cabineo 12 (même corps 33,8 × 16,5 × 10,8 mm), mais avec une <strong>vis plus courte</strong> (8 mm).</p>\n<p><strong>Trou de réception</strong> : Ø 5 mm, profondeur minimum 8 mm.</p>"}, {"title": "6.6 Cabineo 8 M6", "html": "<p><strong>Usage</strong> : version métal-sur-métal ou métal-sur-bois renforcée.</p>\n<ul>\n<li>Dimensions : 12,3/15,3 × 9,3 × 9,3 mm</li>\n<li>Filetage : <strong>M6</strong></li>\n<li>Perçage : <strong>Ø 8 mm</strong></li>\n<li>Matériau du boîtier : laiton</li>\n</ul>"}, {"title": "6.7 Excentriques (Minifix / Rastex)", "html": "<p>Connecteurs classiques à boîtier + axe. Toujours très utilisés dans la production meuble.</p>\n<p><strong>Boîtier excentrique (partie ronde, sur une pièce)</strong> :\n- <strong>Diamètre</strong> : <strong>Ø 15 mm</strong> (Minifix 15) ou <strong>Ø 20 mm</strong> (Minifix 20, Rastex)\n- <strong>Profondeur</strong> : <strong>13 mm</strong> typique\n- <strong>Distance à l'axe</strong> : <strong>34 mm</strong> (norme du système 32)</p>\n<p><strong>Axe / tige</strong> (sur l'autre pièce) :\n- <strong>Perçage</strong> : <strong>Ø 5 mm</strong> (pour axe M4) ou <strong>Ø 7 mm</strong> (pour axe M6)\n- <strong>Profondeur</strong> : 22 à 25 mm typique\n- <strong>Distance au bord de la pièce</strong> : 9,5 mm de l'axe au bord (convention)</p>"}, {"title": "6.8 Tourillons (dowels)", "html": "<p>Connecteurs les plus simples, très utilisés en production meuble.</p>\n<ul>\n<li><strong>Diamètre</strong> : Ø 6, Ø 8 ou Ø 10 mm (Ø 8 standard pour meuble en 19 mm)</li>\n<li><strong>Longueur</strong> : 30 mm typique pour assemblage</li>\n<li><strong>Profondeur de perçage</strong> : 15 à 18 mm sur chaque pièce (moitié du tourillon)</li>\n<li><strong>Espacement</strong> : 64, 96 ou 128 mm (multiples du pas de 32)</li>\n</ul>"}, {"title": "6.9 Tableau récapitulatif — paramétrage dans ton outil", "html": "<table>\n<thead>\n<tr>\n<th>Connecteur</th>\n<th>Pièce A</th>\n<th>Pièce B</th>\n<th>Profondeur</th>\n<th>Distance au bord</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Clamex P-14</td>\n<td>Rainure 7 × 52 × 14 mm + trou Ø 6 accès</td>\n<td>Rainure 7 × 52 × 14 mm</td>\n<td>14 mm</td>\n<td>≥ 50 mm de bord</td>\n</tr>\n<tr>\n<td>Clamex P-10</td>\n<td>Rainure 7 × 52 × 10 mm + trou Ø 6</td>\n<td>Rainure 7 × 52 × 10 mm</td>\n<td>10 mm</td>\n<td>≥ 50 mm</td>\n</tr>\n<tr>\n<td>Cabineo 12</td>\n<td>Poche Ø 12, profondeur 11 mm</td>\n<td>Perçage Ø 5, profondeur 12 mm</td>\n<td>-</td>\n<td>≥ 20 mm</td>\n</tr>\n<tr>\n<td>Cabineo 8</td>\n<td>Poche Ø 12, profondeur 11 mm</td>\n<td>Perçage Ø 5, profondeur 8 mm</td>\n<td>-</td>\n<td>≥ 20 mm</td>\n</tr>\n<tr>\n<td>Minifix 15</td>\n<td>Perçage Ø 15, profondeur 13 mm</td>\n<td>Perçage Ø 5, profondeur 25 mm</td>\n<td>-</td>\n<td>Axe à 9,5 mm du bord</td>\n</tr>\n<tr>\n<td>Tourillon Ø 8</td>\n<td>Perçage Ø 8, profondeur 15 mm</td>\n<td>Perçage Ø 8, profondeur 15 mm</td>\n<td>-</td>\n<td>Entre-axes 32/64</td>\n</tr>\n</tbody>\n</table>"}, {"title": "6.10 Erreurs classiques à éviter dans ton générateur", "html": "<ol>\n<li><strong>Non-symétrie</strong> : générer les rainures Clamex de deux pièces qui s'assemblent à des positions différentes (même d'1 mm). Résultat : assemblage impossible.</li>\n<li><strong>Mauvais sens</strong> : positionner le trou d'accès Ø 6 du Clamex sur la mauvaise face de la pièce. L'opérateur ne peut pas accéder au levier.</li>\n<li><strong>Conflit de proximité</strong> : deux connecteurs trop proches l'un de l'autre, la fraise entre en collision avec un trou déjà fait.</li>\n<li><strong>Profondeur traversante non signalée</strong> : un perçage Ø 5 est \"borgne\" sur 12 mm dans un panneau de 19 mm, mais traversant dans un panneau de 10 mm. Ton outil doit vérifier.</li>\n<li><strong>Bord insuffisant</strong> : un connecteur placé à 15 mm du bord alors qu'il en faut 20 mm → risque d'éclatement.</li>\n</ol>\n<hr />"}, {"title": "PARTIE VII — Stratégie d'adaptation pour The Wooder", "html": "<p>Maintenant qu'on a le paysage complet, voici comment je te recommande de calibrer tes fichiers de sortie.</p>"}, {"title": "7.1 Le principe stratégique : 3 phases", "html": "<h3>Phase 1 — DXF \"woodWOP-compatible\" haute qualité</h3>\n<p><strong>Objectif</strong> : être immédiatement exploitable par 80% des ateliers CNC de menuiserie.</p>\n<p><strong>Ce que tu génères</strong> :\n- Un DXF par pièce, version <strong>AutoCAD 2000</strong> (AC1015), unités millimètres\n- Noms de calques <strong>conformes à la convention woodWOP</strong> (voir Partie V)\n- Polylignes fermées pour les contours\n- Cercles vrais pour les perçages\n- Conventions de profondeur via sous-calques (ex. <code>BOHRV5_P12</code> pour Ø 5 profondeur 12)</p>\n<p><strong>Bénéfice</strong> : exploitable direct dans Alphacam, Polyboard, et beaucoup de CAM qui lisent les conventions woodWOP.</p>\n<h3>Phase 2 — DXF adaptatif + cutting sheet structurée</h3>\n<p><strong>Objectif</strong> : s'adapter aux menuisiers qui ont des conventions personnelles.</p>\n<p><strong>Ce que tu ajoutes</strong> :\n- <strong>Profil de menuisier</strong> dans l'outil : choix du CAM utilisé (woodWOP / Alphacam / bSolid / TpaCAD), préférences de calques, version DXF préférée\n- <strong>Cutting sheet au format XML</strong> en plus du PDF humain, pour import automatique dans les CAM qui le supportent\n- <strong>Code-barres</strong> sur la cutting sheet, pour identifier automatiquement les pièces à la CNC (workflow industriel moderne)</p>\n<h3>Phase 3 — Exports natifs pour les formats dominants</h3>\n<p><strong>Objectif</strong> : devenir plug-and-play pour les ateliers équipés.</p>\n<p><strong>Ce que tu ajoutes</strong> :\n- Export <strong>MPR</strong> (woodWOP) en natif\n- Export <strong>CIX</strong> (bSolid) en natif\n- Peut-être <strong>TCN</strong> et <strong>HOP</strong> selon la demande</p>\n<p><strong>Ces exports représentent un gros travail</strong> — plusieurs mois de dev chacun. À ne pas faire avant d'avoir validé la Phase 1 auprès de 5-10 menuisiers.</p>"}, {"title": "7.2 Architecture technique recommandée", "html": "<p>Dans ton back-end, je te recommande cette architecture :</p>\n<pre><code>Configurateur client (ShapeDiver)\n        ↓\nModèle paramétrique interne (JSON)\n        ↓\nPipeline de génération :\n    ├→ Module Cutting Sheet (PDF + XML)\n    ├→ Module DXF Generator (avec profil CAM configurable)\n    ├→ Module Pricing (devis PDF)\n    └→ Module Fichiers natifs (MPR, CIX…) ← Phase 3\n        ↓\nPackage livraison (ZIP contenant tous les fichiers pour la commande)\n</code></pre>\n<p>Le <strong>modèle paramétrique interne</strong> est la clé : il faut qu'il soit suffisamment riche pour décrire chaque pièce, chaque usinage, chaque connecteur, de manière abstraite. À partir de ce modèle, tu génères ensuite chaque format.</p>\n<p><strong>Ne jamais générer directement depuis ShapeDiver vers le DXF</strong>. Toujours passer par le modèle intermédiaire — ça te permet de changer de générateur DXF sans tout refaire.</p>"}, {"title": "7.3 Bibliothèques techniques à envisager", "html": "<p>Pour la génération DXF côté serveur (Node.js ou Python) :</p>\n<p><strong>Côté Node.js / TypeScript</strong> :\n- <code>dxf-writer</code> (npm) — simple, mais limité aux entités de base\n- <code>dxf-parser</code> pour la lecture\n- <code>@tarikjabiri/dxf</code> — plus complet pour la lecture/écriture</p>\n<p><strong>Côté Python</strong> :\n- <strong><code>ezdxf</code></strong> — <strong>la référence</strong>. Librairie robuste, bien maintenue, supporte toutes les versions DXF R12 à 2018, gère calques, blocs, entités. Si tu as un back-end Python, utilise ça.</p>\n<p><strong>Côté PDF (cutting sheets)</strong> :\n- <strong><code>reportlab</code></strong> (Python) ou <strong><code>pdfkit</code></strong> / <strong><code>puppeteer</code></strong> (Node) pour générer les cutting sheets propres</p>\n<p><strong>Pour les formats natifs (Phase 3)</strong> :\n- Le <strong>MPR</strong> peut être écrit à la main (c'est du texte structuré) — pas de librairie dédiée\n- Le <strong>CIX</strong> est du XML — n'importe quelle librairie XML fait l'affaire\n- Mais il faut investir dans la compréhension fine de chaque format (documentation Homag / Biesse)</p>"}, {"title": "7.4 Ordre de priorité concret pour ton dev", "html": "<h3>Priorité 1 (les 4 prochaines semaines)</h3>\n<ul>\n<li>[ ] Génération DXF <strong>R12 ou AutoCAD 2000</strong>, unités mm</li>\n<li>[ ] Calques nommés selon convention woodWOP (<code>AUSSEN</code>, <code>BOHRV5</code>, <code>BOHRV8</code>, <code>BOHRH8_L</code>, <code>BOHRH8_R</code>, <code>NUT6</code>, <code>FRAES</code>, <code>TEXT</code>)</li>\n<li>[ ] Polylignes fermées pour contours</li>\n<li>[ ] Vrais cercles pour perçages</li>\n<li>[ ] Cas de test : 3 meubles types (caisson simple, dressing 2 portes, meuble avec connecteurs Clamex)</li>\n<li>[ ] Tests visuels dans <strong>LibreCAD</strong> + si possible <strong>Alphacam demo</strong></li>\n</ul>\n<h3>Priorité 2 (suivantes 4 à 8 semaines, selon retours menuisiers)</h3>\n<ul>\n<li>[ ] Ajout des sous-calques de profondeur (<code>BOHRV5_P12</code> etc.)</li>\n<li>[ ] Option \"profil CAM\" dans l'outil (woodWOP / générique)</li>\n<li>[ ] Cutting sheet XML en plus du PDF</li>\n<li>[ ] Code-barres sur cutting sheet pour traçabilité</li>\n</ul>\n<h3>Priorité 3 (mois 4-8 si traction validée)</h3>\n<ul>\n<li>[ ] Export MPR natif pour ateliers Homag / Weeke</li>\n<li>[ ] Export CIX natif pour ateliers Biesse</li>\n<li>[ ] Export TCN si demande significative (ateliers Felder)</li>\n</ul>\n<h3>Priorité 4 (ne rien faire avant d'avoir la demande)</h3>\n<ul>\n<li>[ ] HOP (Holz-Her), XXL (SCM)</li>\n<li>[ ] Intégration Izy quand la norme sera stable</li>\n</ul>"}, {"title": "7.5 Ce que tu dois documenter pour tes menuisiers", "html": "<p>Quand tu commenceras à signer des artisans fondateurs, prépare-leur <strong>une doc technique d'intégration</strong> qui répond à :</p>\n<ul>\n<li>Quels formats de fichiers vont-ils recevoir ?</li>\n<li>Quelles conventions de calques utilises-tu ?</li>\n<li>Quelle version DXF ?</li>\n<li>Comment sont codées les profondeurs d'usinage ?</li>\n<li>Quelle convention pour les connecteurs ?</li>\n<li>Qu'est-ce qu'ils doivent configurer dans leur CAM pour l'import ?</li>\n</ul>\n<p>Cette doc, c'est ton <strong>contrat technique</strong>. Les ateliers sérieux la liront, te remonteront des incompatibilités, et ça accélérera ton adaptation.</p>"}, {"title": "7.6 Les pièges à éviter", "html": "<p><strong>Ne pas sur-anticiper les formats natifs.</strong> Un bon DXF universel te couvre 80% des cas. Les formats natifs sont un gros investissement pour gagner les 20% restants. Fais-le quand tu as la demande, pas avant.</p>\n<p><strong>Ne pas oublier l'humain dans la boucle.</strong> Même un DXF parfait passe toujours par un opérateur qui vérifie avant de lancer la production. Conçois tes fichiers pour qu'un humain puisse <strong>comprendre et corriger</strong> en 30 secondes. Calques clairs, annotations textuelles, cutting sheet imprimable.</p>\n<p><strong>Ne pas négliger la cutting sheet papier.</strong> Dans beaucoup d'ateliers, l'opérateur fonctionne avec la feuille imprimée à côté de la machine. Une cutting sheet bien faite a autant de valeur qu'un DXF bien fait.</p>\n<p><strong>Ne pas t'engager sur une \"compatibilité universelle\" que tu ne peux pas tenir.</strong> Sois clair dans ta comm : \"The Wooder génère des DXF compatibles avec les principaux logiciels CAM du marché (Alphacam, woodWOP, Polyboard, bSolid). Pour les cas spécifiques, nous travaillons main dans la main avec nos artisans partenaires pour adapter les exports.\"</p>\n<hr />"}, {"title": "PARTIE VIII — Plan d'action technique", "html": "<p>Voici comment je transcris tout ce qui précède en actions concrètes pour les 4 à 8 semaines à venir.</p>"}, {"title": "8.1 Cette semaine — Audit et cadrage", "html": "<ul>\n<li>[ ] <strong>Lire ce document en entier</strong>, surligner ce qui est nouveau pour toi</li>\n<li>[ ] <strong>Tester ton DXF actuel</strong> dans LibreCAD, noter chaque écart avec la convention woodWOP</li>\n<li>[ ] <strong>Lister les 20 questions techniques</strong> que tu veux absolument poser à ton premier menuisier CNC (voir aussi document B, section 5)</li>\n<li>[ ] <strong>Télécharger et installer</strong> :</li>\n<li>LibreCAD (visualiseur DXF gratuit)</li>\n<li>Si possible : une version d'essai d'Alphacam ou de Polyboard (pour tester les imports)</li>\n</ul>"}, {"title": "8.2 Semaines 2 à 4 — Refactoriser la génération DXF", "html": "<ul>\n<li>[ ] Mettre en place la <strong>convention woodWOP</strong> dans ton générateur (noms de calques, structure)</li>\n<li>[ ] Basculer sur <strong>DXF R12 ou AutoCAD 2000</strong> par défaut</li>\n<li>[ ] Vérifier que ton unité est bien <strong>mm</strong> (<code>$INSUNITS = 4</code>)</li>\n<li>[ ] Tous les <strong>contours fermés</strong> (polylignes fermées)</li>\n<li>[ ] Tous les <strong>perçages en vrais cercles</strong> (entités <code>CIRCLE</code>)</li>\n<li>[ ] Générer les 3 cas de test, vérifier visuellement chacun</li>\n<li>[ ] Si tu as accès à un logiciel CAM en demo (Alphacam, bSolid), importer et vérifier la reconnaissance automatique des usinages</li>\n</ul>"}, {"title": "8.3 Semaines 5 à 8 — Validation menuisiers et itération", "html": "<ul>\n<li>[ ] <strong>Premiers RDV menuisiers CNC</strong> avec les fichiers refactorisés (voir document B)</li>\n<li>[ ] Pour chaque RDV, <strong>tester l'import DXF</strong> chez le menuisier dans son logiciel</li>\n<li>[ ] Noter les points de friction</li>\n<li>[ ] Après chaque RDV, <strong>itérer sur le générateur</strong> en priorité selon la fréquence des retours</li>\n</ul>"}, {"title": "8.4 Ressources pour approfondir", "html": "<h3>Documentation officielle</h3>\n<ul>\n<li><strong>Spécification DXF</strong> d'Autodesk (gratuit sur leur site dev)</li>\n<li><strong>Documentation ezdxf</strong> (si tu codes en Python) : https://ezdxf.readthedocs.io</li>\n<li><strong>Fiches techniques Lamello</strong> : https://www.lamello.com/fr/products/</li>\n<li><strong>Documentation woodWOP</strong> : accessible via les revendeurs Homag (papier, pas de lien public stable)</li>\n</ul>\n<h3>Communautés</h3>\n<ul>\n<li><strong>Woodweb.com</strong> (anglophone, knowledge base énorme sur CNC menuiserie)</li>\n<li><strong>Forum Metabricoleur</strong> (FR, communauté menuisiers)</li>\n<li><strong>Forum Copain des Copeaux</strong> (FR, forum bois pro/amateur)</li>\n<li><strong>Forum Usinages</strong> (FR, CNC au sens large)</li>\n<li><strong>LinkedIn</strong> : groupes CAM-CAO et menuiserie CNC France</li>\n</ul>\n<h3>Formations</h3>\n<ul>\n<li>Formations Homag / Weeke en France : via les revendeurs locaux (souvent 2 jours woodWOP base)</li>\n<li>Formations Alphacam via Hexagon France</li>\n<li>Formations TopSolid via Missler Software (Évry, 91)</li>\n</ul>\n<hr />"}, {"title": "Note finale", "html": "<p>Cette étude te donne le socle technique. Mais <strong>aucun document, aussi complet soit-il, ne remplace 3 heures dans l'atelier d'un menuisier qui te montre sa vraie chaîne de production</strong>. Chaque atelier a ses tics, ses contournements, ses préférences. Ton objectif dans les 4 prochaines semaines : sortir de cette documentation et aller voir ces ateliers.</p>\n<p>Ce que tu feras avec ces informations :\n1. Tu parleras d'égal à égal avec les menuisiers pendant les RDV — ils sentiront tout de suite que tu connais ton sujet\n2. Tu sauras poser les bonnes questions techniques\n3. Tu comprendras précisément ce qu'on te reproche quand quelque chose ne marche pas\n4. Tu pourras argumenter sur la roadmap produit avec des bases solides</p>\n<p>Prends ton temps pour assimiler ce document, reviens-y régulièrement, et n'hésite pas à me solliciter quand tu veux creuser un point précis (ex. \"implémentation concrète de l'export MPR\", \"détails des conventions bSolid\", \"comment structurer ma cutting sheet XML\", etc.).</p>"}]}, {"id": "V", "title": "Workflow par marque CNC", "subtitle": "Guide marque par marque : Homag, Biesse, SCM, Felder, Holz-Her", "sections": [{"title": "Document compagnon de l'étude technique", "html": "<p><strong>Objet</strong> : comprendre, marque par marque, comment fonctionne concrètement la chaîne de production d'un atelier équipé, et comment The Wooder doit produire ses fichiers pour s'y intégrer.</p>\n<p><strong>Comment utiliser ce document</strong> : c'est un document de référence à consulter <strong>juste avant un RDV</strong> avec un menuisier, une fois que tu connais sa marque de machine. Chaque section de marque est autonome — tu peux lire uniquement celle qui te concerne. À la fin, un tableau de synthèse comparatif te permet de voir les marques en parallèle.</p>\n<p><strong>Prérequis</strong> : avoir lu au moins la Partie I et la Partie V de l'étude technique générale (Document D). Les conventions DXF et le vocabulaire de base y sont expliqués.</p>\n<hr />"}, {"title": "Sommaire", "html": "<ol>\n<li><strong>Homag</strong> — woodWOP et la référence allemande</li>\n<li><strong>Biesse</strong> — BiesseWorks, bSolid et le monde CIX</li>\n<li><strong>SCM Group</strong> — Xilog Maestro et l'école italienne</li>\n<li><strong>Felder Group</strong> — TpaCAD et l'approche artisan</li>\n<li><strong>Holz-Her</strong> — NC-HOPS et la niche premium</li>\n<li><strong>Les autres marques</strong> (TPA, Maka, IMA Schelling, Masterwood, CMS, Uniteam)</li>\n<li><strong>Tableau de synthèse comparatif</strong></li>\n<li><strong>Scénarios de RDV par marque</strong></li>\n</ol>\n<hr />"}, {"title": "1.1 Présentation", "html": "<p><strong>Groupe</strong> : Homag Group (Allemagne), depuis 2014 filiale de Dürr AG.</p>\n<p><strong>Marques du groupe</strong> :\n- <strong>Homag</strong> (marque principale, haut de gamme artisanat et industrie)\n- <strong>Weeke</strong> (entrée et milieu de gamme, historiquement destiné aux artisans — désormais souvent absorbé dans la gamme Homag)\n- <strong>Butfering</strong> (ponçage)\n- <strong>Brandt</strong> (plaqueuses)\n- <strong>Torwegge</strong> (perçage)\n- <strong>Bargstedt</strong> (manutention)</p>\n<p><strong>Position marché France</strong> : <strong>numéro 1 sur l'artisanat pro moyen/haut de gamme</strong>. Extrêmement présent dans les cuisinistes, menuisiers d'agencement, ébénistes d'art. C'est souvent LA marque que tu rencontreras en premier.</p>\n<p><strong>Gammes de machines CNC</strong> :\n- <strong>DRILLTEQ</strong> — perceuses CNC dédiées (perçage pur, pose de ferrures)\n- <strong>CENTATEQ N</strong> — centres d'usinage nesting (ex-Venture, le plus répandu chez les artisans)\n- <strong>CENTATEQ P</strong> — centres d'usinage 5 axes\n- <strong>CENTATEQ T</strong> — machines combinées (fraisage + perçage + rainurage)\n- <strong>BMG</strong> / <strong>BMB</strong> — grandes séries industrielles</p>"}, {"title": "1.2 Écosystème logiciel", "html": "<p>L'écosystème Homag est le plus intégré et cohérent du marché. Tout tourne autour de <strong>woodWOP</strong>.</p>\n<h3>Les logiciels principaux</h3>\n<ul>\n<li><strong>woodWOP</strong> — logiciel CAM natif des machines Homag/Weeke. Dernière version : woodWOP 8.x.</li>\n<li><strong>DXF-Postprocessor (DXF-PP)</strong> — module séparé, installé en option dans woodWOP, qui convertit un DXF en fichier MPR.</li>\n<li><strong>BPP5</strong> (Bearbeitungs-Post-Processor 5) — postprocesseur de conversion, évolution du BPP historique.</li>\n<li><strong>woodCAD|CAM</strong> — solution CAO+CAM intégrée (nouvelle génération, moins répandue chez l'artisan).</li>\n<li><strong>tapio</strong> — plateforme cloud de maintenance et supervision.</li>\n<li><strong>intelliDivide Nesting</strong> — logiciel d'imbrication.</li>\n</ul>\n<h3>Versions de woodWOP et compatibilité</h3>\n<table>\n<thead>\n<tr>\n<th>Version woodWOP</th>\n<th>Année</th>\n<th>Spécificité</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>woodWOP 4.0 / 4.5</strong></td>\n<td>~2005-2010</td>\n<td>Noms de calques DXF très restrictifs (BPP legacy)</td>\n</tr>\n<tr>\n<td><strong>woodWOP 5.0</strong></td>\n<td>~2010</td>\n<td>Apparition de BPP5, calques plus descriptifs</td>\n</tr>\n<tr>\n<td><strong>woodWOP 6.x</strong></td>\n<td>~2015</td>\n<td>Standardisation. Encore très présent en atelier.</td>\n</tr>\n<tr>\n<td><strong>woodWOP 7.x</strong></td>\n<td>~2020</td>\n<td>Version très répandue actuellement. Introduction du format MPR5 (XML).</td>\n</tr>\n<tr>\n<td><strong>woodWOP 8.x</strong></td>\n<td>2023+</td>\n<td>Version la plus récente. Rétrocompatible.</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Important</strong> : les versions 6.1 à 8.x peuvent lire les MPR classiques (format texte). Donc si tu génères un MPR \"ancien format\", tu es compatible avec 90% du parc installé.</p>"}, {"title": "1.3 Workflow type d'un atelier Homag", "html": "<p>Voici comment se passe une journée type dans un atelier artisanal équipé d'un Homag Centateq N avec woodWOP 7 :</p>\n<p><strong>Étape 1 — Conception</strong>\nLe menuisier reçoit une commande. Il dessine le meuble dans son logiciel CAO : souvent <strong>TopSolid'Wood</strong> (le plus fréquent en France), parfois Cabinet Vision ou Polyboard.</p>\n<p><strong>Étape 2 — Décomposition en pièces</strong>\nLe logiciel CAO extrait la nomenclature des pièces. Pour chaque pièce : dimensions, matériau, usinages. Export selon les cas :\n- En MPR directement (si TopSolid'Wood avec post Homag configuré)\n- En DXF technologique avec calques woodWOP\n- Parfois saisie manuelle dans woodWOP</p>\n<p><strong>Étape 3 — Préparation dans woodWOP</strong>\nL'opérateur ouvre le fichier dans woodWOP. Il vérifie visuellement (woodWOP affiche la pièce en 3D avec les usinages). Il ajuste si besoin : ordre des opérations, outils, paramètres.</p>\n<p><strong>Étape 4 — Nesting / imbrication</strong> (si plusieurs pièces)\nLes pièces sont imbriquées sur le panneau via <strong>intelliDivide Nesting</strong> ou un module intégré.</p>\n<p><strong>Étape 5 — Envoi à la machine</strong>\nL'opérateur envoie le programme MPR à la machine via le réseau. La machine (contrôleur <strong>powerControl</strong> dans la gamme Centateq) régénère le G-code en interne à partir du MPR.</p>\n<p><strong>Étape 6 — Production</strong>\nLe panneau est posé sur la table, aspiration activée, l'opérateur lance. La machine exécute dans l'ordre : perçages, rainures, contours. En fin, les pièces sont étiquetées avec un code-barres pour suivi.</p>\n<p><strong>Étape 7 — Post-usinage</strong>\nLes pièces passent en plaquage de chant (Homag Edgeteq) puis éventuellement retour en perçage chant (DRILLTEQ) pour les ferrures.</p>"}, {"title": "1.4 Le format MPR — ce que tu dois savoir", "html": "<h3>Structure générale</h3>\n<p>Un fichier MPR est un fichier texte structuré en sections. Exemple simplifié pour une pièce de 600 × 300 × 19 mm :</p>\n<pre><code>[H]\nVERSION=&quot;8.0&quot;\nOPT_DOPPL=&quot;1&quot;\n\n[P]\nLA=600.000          &lt;- Longueur (mm)\nBR=300.000          &lt;- Largeur (mm)\nDI=19.000           &lt;- Épaisseur (mm)\nFNX=0.000\nFNY=0.000\nANX=0.000\nAKX=0.000\n\n[001]               &lt;- Premier usinage\n&lt;BEGIN&gt;\nBS Horizontal Bohren\nXA=50.000           &lt;- Position X\nYA=0.000            &lt;- Position Y (0 = chant)\nBTI=25.000          &lt;- Profondeur\nBM=8.000            &lt;- Diamètre\nSeite=1             &lt;- Face (1=chant avant)\n&lt;END&gt;\n\n[002]               &lt;- Deuxième usinage\n&lt;BEGIN&gt;\nBS Vertikal Bohren\nXA=100.000\nYA=50.000\nBTI=12.000\nBM=5.000\n&lt;END&gt;\n\n[END]\n</code></pre>\n<p><strong>Points clés</strong> :\n- Toutes les dimensions sont en <strong>mm</strong> (obligatoire)\n- Chaque usinage a un <strong>numéro séquentiel</strong> [001], [002], etc.\n- Chaque usinage commence par un mot-clé (<strong>BS</strong> = Beschreibung, \"description\")\n- Les noms d'usinages sont standardisés : <code>Horizontal Bohren</code>, <code>Vertikal Bohren</code>, <code>Nut</code>, <code>Freie Kontur Bohren</code>, etc.\n- L'ordre d'exécution suit l'ordre du fichier</p>\n<h3>Les types d'usinages principaux</h3>\n<table>\n<thead>\n<tr>\n<th>Nom MPR (allemand)</th>\n<th>Traduction</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>Vertikal Bohren</code></td>\n<td>Perçage vertical</td>\n<td>Depuis la face</td>\n</tr>\n<tr>\n<td><code>Horizontal Bohren</code></td>\n<td>Perçage horizontal</td>\n<td>Depuis le chant</td>\n</tr>\n<tr>\n<td><code>Nut</code></td>\n<td>Rainure</td>\n<td>Rainure droite</td>\n</tr>\n<tr>\n<td><code>Freie Kontur Fraesen</code></td>\n<td>Contournage libre</td>\n<td>Fraisage de forme</td>\n</tr>\n<tr>\n<td><code>Tasche</code></td>\n<td>Poche</td>\n<td>Fraisage de poche</td>\n</tr>\n<tr>\n<td><code>Saegen</code></td>\n<td>Sciage</td>\n<td>Avec lame circulaire</td>\n</tr>\n</tbody>\n</table>\n<h3>Générer du MPR : ce qu'il faut implémenter</h3>\n<p>Si tu décides (en Phase 3) de générer directement du MPR, il faut :\n1. Une bibliothèque interne qui décrive chaque type d'usinage avec ses paramètres\n2. Un template MPR avec les bons headers selon la version woodWOP cible\n3. Une gestion des faces (1-6 selon la convention woodWOP)\n4. Des tests sur de vraies machines (sans ça, impossible de garantir)</p>"}, {"title": "1.5 Import DXF dans woodWOP — mécanique précise", "html": "<p>C'est <strong>le</strong> point technique critique à comprendre. L'import DXF dans woodWOP fonctionne <strong>uniquement si les calques sont nommés selon une convention stricte</strong>.</p>\n<h3>Les deux modes d'import</h3>\n<p><strong>Mode BPP basique (toutes versions, restrictif)</strong>\nLes noms de calques doivent suivre un format codé très strict, type <code>FK2T128R</code> :\n- <code>FK</code> = type d'opération (<strong>FK</strong> = Freie Kontur, <strong>BV</strong> = Bohren Vertikal, <strong>BH</strong> = Bohren Horizontal, <strong>NU</strong> = Nut, etc.)\n- <code>2</code> = profondeur Z (en mm, relative à la face supérieure)\n- <code>T128</code> = numéro d'outil de la table d'outils de la machine\n- <code>R</code> ou <code>L</code> = compensation de fraise (<strong>R</strong> = Right/droite, <strong>L</strong> = Left/gauche, pas de lettre = centre)</p>\n<p>Ce format est archi-codé. Chaque caractère a une signification. C'est pénible à maintenir mais très précis.</p>\n<p><strong>Mode BPP5 descriptif (woodWOP 5.0+, Professional)</strong>\nNoms plus lisibles :\n- <code>BOHRV</code> = Bohrung Vertikal (perçage vertical)\n- <code>BOHRV5</code> = perçage vertical Ø 5\n- <code>BOHRV8</code> = perçage vertic
