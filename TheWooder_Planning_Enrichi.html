al Ø 8\n- <code>BOHRV15</code> = perçage vertical Ø 15\n- <code>BOHRHL8</code> = perçage horizontal Left (chant gauche) Ø 8\n- <code>BOHRHR8</code> = perçage horizontal Right (chant droit) Ø 8\n- <code>BOHRHV8</code> = perçage horizontal Vorn (chant avant) Ø 8\n- <code>BOHRHH8</code> = perçage horizontal Hinten (chant arrière) Ø 8\n- <code>AUSSEN</code> = contour extérieur\n- <code>INNEN</code> = contour intérieur\n- <code>NUT</code> = rainure\n- <code>NUT8</code> = rainure 8 mm\n- <code>TASCHE</code> = poche\n- <code>TEXT</code> = texte/annotation</p>\n<h3>Le processus d'import pas à pas</h3>\n<p>Dans woodWOP 7/8, l'import d'un DXF se fait ainsi (ce que l'opérateur vit) :</p>\n<ol>\n<li>Dans woodWOP : menu <strong>Fichier → Importer → DXF</strong></li>\n<li>Sélection du fichier .dxf</li>\n<li>woodWOP analyse les calques :</li>\n<li>Si les noms sont reconnus → conversion automatique en usinages MPR</li>\n<li>Sinon → import en \"géométrie auxiliaire\", l'opérateur doit manuellement assigner les outils et paramètres</li>\n<li>Si la conversion réussit, la pièce apparaît en 3D avec tous ses usinages</li>\n<li>L'opérateur vérifie, ajuste, sauve en MPR</li>\n</ol>\n<h3>Activation du plugin CAD</h3>\n<p><strong>Point crucial</strong> : dans woodWOP 7.1 et suivants, l'import DXF nécessite d'<strong>activer le plugin CAD</strong> dans les options (Extras → Paramètres → Plugin → cocher \"CAD-Plugin\" et \"CAD-Plugin Pro\"). Sans ça, les menus d'import DXF sont grisés.</p>\n<p>Cela signifie que si un menuisier te dit \"mon woodWOP n'arrive pas à lire ton DXF\", demande-lui d'abord s'il a activé le plugin CAD. C'est souvent oublié.</p>\n<h3>Blocs et macros woodWOP</h3>\n<p>Certains usinages complexes (poses de ferrures, connecteurs spécifiques) utilisent des <strong>blocs DXF prédéfinis</strong> fournis par Homag. Ces blocs sont stockés dans le dossier d'installation woodWOP (<code>\\HOMAG Group\\woodWOP6\\programs\\Bpp5\\Samples\\Blocks\\</code>).</p>\n<p>Pour référencer un bloc Homag (ex. pour une charnière standard), il faut <strong>insérer le bloc dans le DXF</strong> avec son nom exact. Pour une V1, tu n'as pas à gérer ça — tu te contentes des usinages géométriques de base.</p>"}, {"title": "1.6 Adapter The Wooder à Homag — checklist", "html": "<p>Pour qu'un menuisier Homag/Weeke puisse utiliser tes fichiers sans friction :</p>\n<h3>DXF à générer pour Homag</h3>\n<ul>\n<li>[ ] Version <strong>DXF R12</strong> ou <strong>AutoCAD 2000</strong></li>\n<li>[ ] Unités <strong>millimètres</strong> (<code>$INSUNITS = 4</code>)</li>\n<li>[ ] <strong>Origine</strong> : coin inférieur gauche de la pièce à (0, 0)</li>\n<li>[ ] <strong>Face visible</strong> vers le haut (convention Z positif)</li>\n<li>[ ] Contour extérieur sur calque <code>AUSSEN</code>, polyligne fermée</li>\n<li>[ ] Perçages verticaux sur <code>BOHRVxx</code> (xx = diamètre)</li>\n<li>[ ] Perçages horizontaux sur <code>BOHRHL/R/V/Hxx</code> selon la face</li>\n<li>[ ] Rainures sur <code>NUTxx</code> (xx = largeur)</li>\n<li>[ ] Contours de poche sur <code>TASCHE</code></li>\n<li>[ ] Profondeurs codées dans un sous-calque type <code>BOHRV5_P12</code></li>\n<li>[ ] Un fichier DXF <strong>par pièce</strong> (pas de multi-pièces dans un seul fichier)</li>\n</ul>\n<h3>Ce que tu peux promettre à un menuisier Homag</h3>\n<p>« Notre outil génère des DXF conformes aux conventions BPP5 de woodWOP. Il suffit d'importer le fichier dans woodWOP 6.x ou supérieur (plugin CAD activé) et la pièce apparaît directement avec ses usinages. »</p>\n<h3>Questions spécifiques à lui poser en RDV</h3>\n<ol>\n<li>Quelle version de woodWOP utilises-tu ?</li>\n<li>Tu importes directement en DXF, ou tu passes par TopSolid / autre CAO ?</li>\n<li>Le plugin CAD est-il activé ?</li>\n<li>Tes noms de calques — as-tu personnalisé en BPP5 Professional, ou tu utilises les noms standards ?</li>\n<li>Comment gères-tu les profondeurs (via sous-calques, ou via assignation manuelle) ?</li>\n</ol>\n<hr />"}, {"title": "2.1 Présentation", "html": "<p><strong>Groupe</strong> : Biesse SpA (Italie), groupe coté à Milan.</p>\n<p><strong>Marques du groupe</strong> :\n- <strong>Biesse</strong> (marque principale, machines bois)\n- <strong>Selco</strong> (sciage)\n- <strong>Sofitec</strong> (panneaux sur mesure)\n- <strong>IntermacDiamut</strong> (verre et pierre)\n- <strong>HSD</strong> (broches et composants)</p>\n<p><strong>Position marché France</strong> : <strong>n°2 juste derrière Homag</strong>, historiquement fort chez les artisans moyens et grands ateliers. Réputé pour le <strong>Rover</strong> (centre d'usinage), qui est presque devenu un synonyme de \"CNC menuiserie\" en France.</p>\n<p><strong>Gammes de machines CNC</strong> :\n- <strong>Rover A</strong> — centre nesting (équivalent Centateq N de Homag)\n- <strong>Rover B</strong> — centre d'usinage ventouses\n- <strong>Rover K</strong> — nesting simplifié\n- <strong>Rover C</strong> — grosses séries\n- <strong>Rover S / FT</strong> — 5 axes\n- <strong>Skipper</strong> — perceuse dédiée\n- <strong>Winstore</strong> — automatisation matière</p>"}, {"title": "2.2 Écosystème logiciel", "html": "<p>L'écosystème Biesse est <strong>moins cohérent que Homag</strong> parce qu'il est en pleine transition entre deux générations :</p>\n<ul>\n<li><strong>BiesseWorks</strong> — logiciel historique (années 2000-2015). Toujours présent sur beaucoup de machines en atelier.</li>\n<li><strong>bSolid</strong> — nouvelle génération (depuis ~2015), plus moderne, basé sur un noyau 3D paramétrique.</li>\n<li><strong>bNest</strong> — logiciel d'imbrication.</li>\n<li><strong>bPanel</strong> — gestion de panneaux.</li>\n<li><strong>bDoor</strong> — spécialisé portes.</li>\n<li><strong>bBox</strong> — spécialisé boîtes/meubles.</li>\n</ul>\n<h3>BiesseWorks vs bSolid — la transition</h3>\n<table>\n<thead>\n<tr>\n<th>Aspect</th>\n<th>BiesseWorks</th>\n<th>bSolid</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Interface</td>\n<td>Ancienne génération, 2D principalement</td>\n<td>3D, moderne</td>\n</tr>\n<tr>\n<td>Format natif sortie</td>\n<td><strong>BPP</strong></td>\n<td><strong>CIX</strong> / <strong>CID</strong></td>\n</tr>\n<tr>\n<td>Maintenance Biesse</td>\n<td>Maintenu mais plus de grosses évolutions</td>\n<td>Actif, reçoit les nouveautés</td>\n</tr>\n<tr>\n<td>Adoption actuelle</td>\n<td>Encore majoritaire chez les anciens ateliers</td>\n<td>Obligatoire sur les nouvelles machines</td>\n</tr>\n<tr>\n<td>Lecture BPP</td>\n<td>Oui</td>\n<td>Oui (retrocompatible)</td>\n</tr>\n<tr>\n<td>Lecture CIX</td>\n<td>Non</td>\n<td>Oui</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Conclusion pour toi</strong> : un menuisier qui a acheté sa machine après 2017 a probablement <strong>bSolid</strong>. Un atelier plus ancien a <strong>BiesseWorks</strong>. Les deux coexistent encore massivement.</p>"}, {"title": "2.3 Workflow type d'un atelier Biesse", "html": "<p><strong>Scénario typique avec un Rover A + bSolid</strong> (atelier récent) :</p>\n<ol>\n<li>Conception dans TopSolid'Wood, Polyboard ou directement dans bSolid (qui intègre une CAO simplifiée)</li>\n<li>Import en DXF ou fichier natif bSolid (.bsolid)</li>\n<li>Vérification et ajustement dans bSolid (3D)</li>\n<li>Génération automatique du CIX (sortie bSolid)</li>\n<li>Envoi du CIX à la machine</li>\n<li>Le contrôleur de la machine convertit en CNI (format interne Biesse) et exécute</li>\n</ol>\n<p><strong>Scénario avec BiesseWorks</strong> (atelier historique) :</p>\n<ol>\n<li>Conception externe ou dans BiesseWorks</li>\n<li>Import DXF <strong>manuel</strong> (opération plus laborieuse qu'en bSolid)</li>\n<li>Assignation des outils pièce par pièce</li>\n<li>Génération BPP</li>\n<li>Transfert machine</li>\n</ol>"}, {"title": "2.4 Les formats Biesse en détail", "html": "<h3>BPP (legacy)</h3>\n<p>Format texte, né avec BiesseWorks. Structure par macros (GEO, ROUT, HOLE, etc.). Toujours lu par les contrôleurs de machines Biesse.</p>\n<h3>CIX</h3>\n<p>Format <strong>XML moderne</strong>. Plus lisible, plus extensible. Exemple simplifié :</p>\n<pre><code class=\"language-xml\">&lt;CIXProgram&gt;\n  &lt;Variables&gt;\n    &lt;LA&gt;600&lt;/LA&gt;\n    &lt;BR&gt;300&lt;/BR&gt;\n    &lt;SP&gt;19&lt;/SP&gt;\n  &lt;/Variables&gt;\n  &lt;Machinings&gt;\n    &lt;Macro name=&quot;HOLE&quot;&gt;\n      &lt;X&gt;50&lt;/X&gt;\n      &lt;Y&gt;50&lt;/Y&gt;\n      &lt;Z&gt;-12&lt;/Z&gt;\n      &lt;D&gt;5&lt;/D&gt;\n    &lt;/Macro&gt;\n    &lt;Macro name=&quot;ROUT&quot;&gt;\n      &lt;StartX&gt;0&lt;/StartX&gt;\n      &lt;StartY&gt;0&lt;/StartY&gt;\n      ...\n    &lt;/Macro&gt;\n  &lt;/Machinings&gt;\n&lt;/CIXProgram&gt;\n</code></pre>\n<p>Le CIX est traduit par le logiciel Biesse en <strong>CNI</strong> (format binaire propriétaire) avant envoi à la machine.</p>\n<h3>CID</h3>\n<p>Version légèrement différente, souvent utilisée pour le nesting (jobs nestés de plusieurs pièces).</p>"}, {"title": "2.5 Import DXF dans BiesseWorks / bSolid — les 3 modes", "html": "<p>Biesse propose <strong>trois modes d'import DXF</strong>, ce qui est à la fois une force (flexibilité) et une faiblesse (complexité pour l'opérateur). Comprendre ces 3 modes est crucial pour toi.</p>\n<h3>Mode 1 — Import manuel \"géométrie seule\"</h3>\n<p>Le DXF n'a <strong>aucune</strong> convention de calques reconnue. L'opérateur importe la géométrie, puis assigne manuellement les outils et paramètres d'usinage dans le logiciel.</p>\n<ul>\n<li><strong>Avantage</strong> : marche toujours, quel que soit le DXF</li>\n<li><strong>Inconvénient</strong> : l'opérateur refait tout le travail CAM. Aucune valeur ajoutée pour lui si c'est toi qui lui fournit le DXF</li>\n</ul>\n<h3>Mode 2 — Import avec DXF \"technologique\" (calques configurés)</h3>\n<p>L'atelier configure une bibliothèque de correspondances calque → macro dans bSolid. Exemple :\n- Calque <code>DRILL5_12</code> → macro HOLE avec Ø 5 et profondeur 12\n- Calque <code>ROUT_PROFILE</code> → macro ROUT avec outil standard de contournage</p>\n<p>Quand le DXF est importé, bSolid reconnaît les calques et applique automatiquement les macros. <strong>C'est le mode optimal</strong> pour ta V1.</p>\n<p>Problème : <strong>chaque atelier a sa propre bibliothèque de macros</strong>, pas de standard universel. Contrairement à Homag où la convention BPP5 est quasi-standard.</p>\n<h3>Mode 3 — Import direct CIX</h3>\n<p>Si tu génères directement un CIX, pas de DXF du tout. Le CIX est déjà structuré avec les macros d'usinage. L'opérateur n'a qu'à vérifier et lancer.</p>\n<p><strong>Particularité</strong> : depuis la CN directement, il est possible d'ouvrir un CIX sans passer par bSolid, en modifiant le fichier <code>openINI/FLAG</code> du contrôleur (<code>progext=BPP,DXF,CID,CIX</code>). Mais dans ce cas, aucune modification n'est possible — le CIX doit être parfait.</p>"}, {"title": "2.6 Adapter The Wooder à Biesse — checklist", "html": "<h3>DXF à générer pour Biesse</h3>\n<ul>\n<li>[ ] <strong>DXF R12</strong> recommandé (certains vieux BiesseWorks ont du mal avec les versions récentes)</li>\n<li>[ ] <strong>Unités mm</strong> (configurable dans BiesseWorks, mais mets mm par défaut)</li>\n<li>[ ] <strong>Origine coin inférieur gauche</strong> à (0, 0) — important chez Biesse</li>\n<li>[ ] Conventions de calques à <strong>négocier atelier par atelier</strong></li>\n<li>[ ] Fournir un <strong>document PDF d'explication des calques</strong> avec chaque livraison</li>\n</ul>\n<h3>Stratégie recommandée pour Biesse (Phase 1)</h3>\n<p>Générer un DXF avec les <strong>mêmes conventions que woodWOP</strong> (AUSSEN, BOHRVxx, NUTxx, etc.) <strong>+ un fichier texte d'explications</strong>. Le menuisier Biesse configure sa bibliothèque de macros une fois (avec ses outils) pour matcher ta convention. Ensuite, tout est automatique.</p>\n<h3>Stratégie Phase 3 — CIX natif</h3>\n<p>Si tu développes l'export CIX, tu devras :\n1. Obtenir la documentation officielle (Biesse fournit à ses clients et partenaires)\n2. Implémenter la génération XML conforme\n3. Tester sur une vraie machine (impératif — il y a des subtilités comme le problème des points avec même X/Y et Z différents)</p>\n<h3>Questions spécifiques à un menuisier Biesse</h3>\n<ol>\n<li>BiesseWorks ou bSolid ?</li>\n<li>Quelle version du Rover et quand l'as-tu installé ?</li>\n<li>As-tu configuré des \"macros DXF technologiques\" dans ton logiciel ?</li>\n<li>Quelle est ta bibliothèque d'outils standards (diamètres, longueurs) ?</li>\n<li>Tu imports des DXF venant d'où actuellement ?</li>\n</ol>\n<hr />"}, {"title": "3.1 Présentation", "html": "<p><strong>Groupe</strong> : SCM Group (Italie), basé à Rimini.</p>\n<p><strong>Marques du groupe</strong> :\n- <strong>SCM</strong> (marque principale, machines bois)\n- <strong>Morbidelli</strong> (centres d'usinage haut de gamme)\n- <strong>CMS</strong> (matériaux composites et pierre)\n- <strong>CMS Balestrini</strong> (usinage bois massif)\n- <strong>SCM Industrial Machinery</strong> (industrie)</p>\n<p><strong>Position marché France</strong> : <strong>3e acteur majeur</strong> derrière Homag et Biesse. Historiquement bien implanté, notamment dans le Sud-Ouest via les distributeurs locaux. Le direction SCM Group France est assurée depuis 2017 par Thierry Nicolet, ingénieur formé à l'École Supérieure du Bois (Paris).</p>\n<p><strong>Gammes de machines CNC</strong> :\n- <strong>Morbidelli M</strong> — centres nesting et ventouses\n- <strong>Morbidelli X200 / X400</strong> — haut de gamme\n- <strong>SCM Accord</strong> — 5 axes, menuiserie architecturale\n- <strong>SCM Record</strong> — centres polyvalents\n- <strong>SCM Startech</strong> — perçages CNC\n- <strong>Pratix</strong> — entrée de gamme (issue du rachat Casadei/Busellato)</p>"}, {"title": "3.2 Écosystème logiciel", "html": "<ul>\n<li><strong>Xilog Plus</strong> — logiciel historique, encore très présent</li>\n<li><strong>Xilog Maestro</strong> / <strong>Maestro Active</strong> — nouvelle génération</li>\n<li><strong>Maestro CNC</strong> — logiciel machine</li>\n<li><strong>Maestro Nest</strong> — imbrication</li>\n<li><strong>Maestro Cabinet</strong> — spécifique meuble</li>\n<li><strong>Maestro Door</strong> — spécifique portes</li>\n<li><strong>Maestro Window</strong> — spécifique menuiserie extérieure</li>\n<li><strong>Maestro Stairs</strong> — spécifique escaliers</li>\n</ul>\n<p>L'écosystème Maestro est le plus <strong>modulaire/sectoriel</strong> du marché — chaque type de produit a son module dédié.</p>"}, {"title": "3.3 Workflow type d'un atelier SCM", "html": "<ol>\n<li>Conception dans TopSolid ou directement dans Maestro Cabinet/Door/etc.</li>\n<li>Génération des programmes en format <strong>XXL</strong> (Xilog) ou format Maestro</li>\n<li>Import dans <strong>Maestro CNC</strong> (logiciel machine)</li>\n<li>Exécution</li>\n</ol>\n<p><strong>Particularité SCM</strong> : le format <strong>XXL</strong> est un format texte structuré qui décrit directement les usinages. Moins documenté publiquement que le MPR ou le CIX, mais opérationnellement similaire.</p>"}, {"title": "3.4 Les formats SCM", "html": "<h3>XXL (Xilog)</h3>\n<p>Format texte legacy, écrit par Xilog Plus. Structure par opérations successives.</p>\n<h3>.tlf / .tlx</h3>\n<p>Autres extensions Xilog, selon les versions et configurations machine.</p>\n<h3>Format natif Maestro</h3>\n<p>Fichiers Maestro modernes, généralement XML ou binaire selon le module.</p>"}, {"title": "3.5 Import DXF dans Maestro", "html": "<p>L'import DXF est <strong>similaire dans l'esprit à bSolid</strong> : conventions de calques configurables par atelier, pas de standard universel. Le logiciel Maestro permet d'associer des macros à des noms de calques spécifiques.</p>\n<p>Le menuisier type configure une fois sa bibliothèque, puis tous les DXF conformes à ses conventions sont traités automatiquement.</p>"}, {"title": "3.6 Adapter The Wooder à SCM — checklist", "html": "<ul>\n<li>[ ] DXF R12, unités mm (comme pour Biesse)</li>\n<li>[ ] Conventions woodWOP utilisables ici aussi — le menuisier configurera ses macros pour matcher</li>\n<li>[ ] Documentation PDF accompagnant les DXF, indispensable</li>\n</ul>\n<h3>Questions à un menuisier SCM</h3>\n<ol>\n<li>Xilog Plus ou Maestro (quelle version) ?</li>\n<li>Quel module Maestro utilises-tu (Cabinet, Door, etc.) ?</li>\n<li>Tu as configuré des macros DXF ?</li>\n<li>Tu imports d'où actuellement (TopSolid, autre) ?</li>\n</ol>\n<hr />"}, {"title": "4.1 Présentation", "html": "<p><strong>Groupe</strong> : Felder Group (Autriche), basé à Hall in Tirol.</p>\n<p><strong>Marques du groupe</strong> :\n- <strong>Felder</strong> (milieu de gamme, très populaire chez les artisans)\n- <strong>Hammer</strong> (entrée de gamme)\n- <strong>Format-4</strong> (haut de gamme)\n- <strong>Mayer</strong> (scies à format)</p>\n<p><strong>Position marché France</strong> : <strong>LE choix dominant des petits ateliers artisanaux</strong> qui passent au CNC. Machines moins chères que Homag/Biesse, SAV réputé, mais fonctionnalités plus limitées.</p>\n<p><strong>Gammes de machines CNC</strong> :\n- <strong>Felder Profit H</strong> — centres nesting\n- <strong>Format-4 Profit H</strong> — versions haut de gamme\n- <strong>Format-4 Profit H100/H200</strong> — avec automatisation</p>"}, {"title": "4.2 Écosystème logiciel", "html": "<p>Felder <strong>n'a pas son propre CAM</strong>. Le groupe utilise <strong>TpaCAD</strong>, développé par TPA (éditeur italien indépendant).</p>\n<p>TpaCAD équipe aussi :\n- <strong>Vitap</strong>\n- <strong>Brema</strong>\n- Quelques autres constructeurs italiens</p>\n<p><strong>Format natif</strong> : <strong>TCN</strong>.</p>"}, {"title": "4.3 Workflow type d'un atelier Felder", "html": "<p>Scénario typique d'un artisan équipé Felder Profit H + TpaCAD :</p>\n<ol>\n<li>Conception dans un logiciel CAO externe (souvent <strong>Polyboard</strong>, <strong>SketchUp + extensions</strong>, ou <strong>TopSolid</strong> pour les plus gros)</li>\n<li>Export en DXF technologique (souvent via Polyboard qui produit directement des TCN)</li>\n<li>Import dans TpaCAD</li>\n<li>Vérification / ajustement</li>\n<li>Envoi à la machine Profit H</li>\n</ol>"}, {"title": "4.4 Le format TCN", "html": "<p>Format texte structuré, similaire à un MPR mais avec les conventions TPA. Moins documenté publiquement que le MPR (TPA est une boîte italienne de taille moyenne).</p>"}, {"title": "4.5 Import DXF dans TpaCAD", "html": "<p>TpaCAD lit les DXF mais <strong>nécessite souvent une étape de configuration manuelle</strong> : le logiciel ne reconnaît pas automatiquement les calques \"type woodWOP\". L'opérateur doit assigner les macros.</p>\n<p><strong>Polyboard Pro PP</strong> génère directement des TCN, ce qui court-circuite ce problème.</p>"}, {"title": "4.6 Adapter The Wooder à Felder — checklist", "html": "<ul>\n<li>[ ] DXF R12, unités mm</li>\n<li>[ ] Conventions de calques ouvertes : le menuisier configurera TpaCAD en conséquence</li>\n<li>[ ] Générer aussi un <strong>PDF de cutting sheet très détaillé</strong>, parce que l'opérateur Felder fait souvent plus d'opérations manuelles dans le logiciel</li>\n</ul>\n<h3>Questions à un menuisier Felder</h3>\n<ol>\n<li>Quel modèle de Profit H ?</li>\n<li>Tu utilises TpaCAD seul, ou avec un CAO amont (Polyboard, autre) ?</li>\n<li>Tu configurerais des macros DXF pour mes fichiers ?</li>\n</ol>\n<hr />"}, {"title": "5.1 Présentation", "html": "<p><strong>Groupe</strong> : Holz-Her est une filiale du groupe <strong>Weinig</strong> (allemand), autrefois indépendant.</p>\n<p><strong>Position marché France</strong> : <strong>acteur de niche</strong>, positionné milieu/haut de gamme, avec une réputation de qualité allemande. Présent dans des ateliers d'agencement et d'ébénisterie fine.</p>\n<p><strong>Gammes de machines CNC</strong> :\n- <strong>Pro-Master</strong> — centres d'usinage ventouses\n- <strong>Dynestic</strong> — nesting\n- <strong>Evolution</strong> — versions récentes\n- <strong>Streamer</strong> — plaqueuses</p>"}, {"title": "5.2 Écosystème logiciel", "html": "<ul>\n<li><strong>NC-HOPS</strong> — logiciel CAM natif Holz-Her</li>\n<li><strong>Cabinet Control</strong> — gestion de production</li>\n<li><strong>Campus</strong> — formation</li>\n</ul>\n<p><strong>Format natif</strong> : <strong>HOP</strong>.</p>"}, {"title": "5.3 Workflow type", "html": "<ol>\n<li>Conception externe (souvent Polyboard, qui génère nativement du HOP)</li>\n<li>Import dans NC-HOPS pour vérification</li>\n<li>Envoi machine</li>\n</ol>"}, {"title": "5.4 Le format HOP", "html": "<p>Format texte structuré, similaire dans l'esprit au MPR et au TCN.</p>"}, {"title": "5.5 Import DXF dans NC-HOPS", "html": "<p>Capacité d'import DXF standard. Conventions de calques configurables.</p>"}, {"title": "5.6 Adapter The Wooder à Holz-Her — checklist", "html": "<p>Même approche que Felder : DXF R12 mm, conventions woodWOP, documentation PDF.</p>\n<p><strong>Note</strong> : Polyboard Pro PP génère directement du HOP, c'est le chemin le plus courant pour les ateliers Holz-Her.</p>\n<hr />"}, {"title": "6.1 Machines TPA-équipées", "html": "<p><strong>Vitap, Brema, Essetre, Gabbiani, Cosmec, MasterWood</strong> — plusieurs constructeurs italiens utilisent <strong>TpaCAD</strong> comme logiciel CAM (format TCN). Tu traites ces machines comme Felder.</p>"}, {"title": "6.2 Maka (Allemagne)", "html": "<p>Constructeur allemand premium. Historiquement pour la menuiserie architecturale (fenêtres, escaliers, portes). Utilise son propre logiciel. Rare chez les artisans meubles.</p>"}, {"title": "6.3 IMA Schelling (Autriche)", "html": "<p>Fabricant industriel, rarement présent chez les artisans indépendants. Machines de très grande capacité.</p>"}, {"title": "6.4 CMS (Italie — SCM Group)", "html": "<p>Filiale SCM spécialisée composites, pierre. Même écosystème logiciel que SCM.</p>"}, {"title": "6.5 Uniteam / Belotti / Weinmann (charpente bois)", "html": "<p>Spécialisés dans la charpente et l'ossature bois. Format <strong>BTL</strong> (charpente) plus que formats meuble. Hors scope direct de The Wooder.</p>"}, {"title": "6.6 Anderson, Thermwood, Multicam (Amérique du Nord)", "html": "<p>Fabricants nord-américains présents à la marge en France. Souvent équipés Alphacam en CAM.</p>\n<hr />"}, {"title": "7. TABLEAU DE SYNTHÈSE COMPARATIF", "html": "<table>\n<thead>\n<tr>\n<th>Marque</th>\n<th>Logiciel CAM</th>\n<th>Format natif</th>\n<th>Import DXF</th>\n<th>Priorité pour toi</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Homag / Weeke</strong></td>\n<td>woodWOP 6/7/8</td>\n<td>MPR / MPR5</td>\n<td>Standardisé BPP5 (AUSSEN, BOHRVxx, NUTxx)</td>\n<td>⭐⭐⭐ Haute — cible principale</td>\n</tr>\n<tr>\n<td><strong>Biesse</strong></td>\n<td>BiesseWorks / bSolid</td>\n<td>BPP / CIX / CID</td>\n<td>Configurable par atelier, 3 modes</td>\n<td>⭐⭐⭐ Haute — cible principale</td>\n</tr>\n<tr>\n<td><strong>SCM / Morbidelli</strong></td>\n<td>Xilog / Maestro</td>\n<td>XXL / .tlf</td>\n<td>Configurable</td>\n<td>⭐⭐ Moyenne — répandu France</td>\n</tr>\n<tr>\n<td><strong>Felder / Format-4</strong></td>\n<td>TpaCAD</td>\n<td>TCN</td>\n<td>Configurable, Polyboard simplifie</td>\n<td>⭐⭐ Moyenne — beaucoup d'artisans</td>\n</tr>\n<tr>\n<td><strong>Holz-Her</strong></td>\n<td>NC-HOPS</td>\n<td>HOP</td>\n<td>Configurable</td>\n<td>⭐ Faible — niche</td>\n</tr>\n<tr>\n<td><strong>Vitap / Brema / TPA</strong></td>\n<td>TpaCAD</td>\n<td>TCN</td>\n<td>Configurable</td>\n<td>⭐ Faible — niche</td>\n</tr>\n<tr>\n<td><strong>Maka</strong></td>\n<td>Propriétaire</td>\n<td>Propriétaire</td>\n<td>Variable</td>\n<td>⭐ Très faible</td>\n</tr>\n<tr>\n<td><strong>IMA Schelling</strong></td>\n<td>Propriétaire</td>\n<td>Propriétaire</td>\n<td>Variable</td>\n<td>Hors scope</td>\n</tr>\n</tbody>\n</table>"}, {"title": "Compatibilité de ton DXF \"woodWOP-standard\"", "html": "<p>Un DXF généré avec les conventions woodWOP (AUSSEN, BOHRVxx, BOHRHLxx, NUTxx, etc.) est :</p>\n<ul>\n<li>✅ <strong>Directement exploitable</strong> sur les machines <strong>Homag / Weeke</strong></li>\n<li>⚠️ <strong>Exploitable après configuration initiale</strong> sur <strong>Biesse, SCM, Felder, Holz-Her</strong> — le menuisier configure une fois ses macros dans bSolid / Maestro / TpaCAD / NC-HOPS, puis ton DXF est traité automatiquement</li>\n<li>❌ <strong>Non exploitable</strong> sans adaptation lourde sur des machines exotiques ou très anciennes</li>\n</ul>\n<p>Conclusion : <strong>la convention woodWOP est ton meilleur dénominateur commun</strong>. Pars là-dessus.</p>\n<hr />"}, {"title": "8. SCÉNARIOS DE RDV PAR MARQUE", "html": "<p>Voici 5 mini-scénarios pour t'aider à anticiper un RDV selon la marque de machine du menuisier.</p>"}, {"title": "Scénario A — Menuisier avec Homag Centateq + woodWOP 7", "html": "<p><strong>Tu entres dans l'atelier, tu vois une machine bleue/grise Homag avec \"CENTATEQ\" sur le flanc.</strong></p>\n<p><strong>Ce que tu demandes</strong> :\n- \"Tu utilises woodWOP quelle version ?\"\n- \"Le plugin CAD est activé ?\"\n- \"Tu importes des DXF venant d'où actuellement ?\"\n- \"Tes conventions de calques — standard BPP5 ou personnalisées ?\"</p>\n<p><strong>Ce que tu peux annoncer tout de suite</strong> :\n« Mes DXF respectent les conventions BPP5 standards. Tu les importes, woodWOP te les convertit en MPR automatiquement. Je peux te montrer un exemple maintenant si tu veux. »</p>\n<p><strong>Ce que tu montres</strong> :\n- Un cas de test caisson simple avec perçages Ø 5 et Ø 8, une rainure NUT6\n- Tu ouvres le DXF dans LibreCAD pour montrer la structure des calques\n- Si possible, tu demandes à l'opérateur de l'importer dans son woodWOP</p>\n<p><strong>Validation</strong> : si le DXF s'importe proprement dans SON woodWOP, tu as validé Homag.</p>"}, {"title": "Scénario B — Menuisier avec Biesse Rover + bSolid", "html": "<p><strong>Tu vois une machine rouge \"Biesse Rover\" et un ordinateur avec bSolid ouvert.</strong></p>\n<p><strong>Ce que tu demandes</strong> :\n- \"BiesseWorks ou bSolid ? Depuis quand ?\"\n- \"Tu as configuré des macros pour l'import DXF technologique ?\"\n- \"Tu travailles avec quelle CAO en amont ?\"</p>\n<p><strong>Ce que tu annonces</strong> :\n« Je peux te livrer soit des DXF en conventions woodWOP (tu configures ta bibliothèque de macros bSolid une fois, c'est 30 min), soit à terme des CIX natifs. Pour commencer, on part sur le DXF. »</p>\n<p><strong>Ce que tu montres</strong> :\n- Même cas de test qu'en scénario A, mais en soulignant que la config initiale se fait dans bSolid\n- Tu proposes de <strong>t'asseoir avec lui pour configurer les macros</strong> — c'est un super moment d'échange, il apprécie l'accompagnement, et tu apprends comment il travaille</p>\n<p><strong>Validation</strong> : un DXF importé correctement dans bSolid + macros configurées = partenaire validé.</p>"}, {"title": "Scénario C — Menuisier avec Felder Profit H + TpaCAD", "html": "<p><strong>Atelier artisanal, machine orange Felder, TpaCAD à l'écran.</strong></p>\n<p><strong>Ce que tu demandes</strong> :\n- \"Tu utilises Polyboard en amont, ou autre ?\"\n- \"Tu fais souvent des import DXF, ou plutôt des saisies manuelles ?\"</p>\n<p><strong>Ce que tu proposes</strong> :\n« Je peux te livrer en DXF standardisé. Si tu utilises Polyboard, tu peux aussi récupérer mes pièces en tant que données source et les repasser dans Polyboard pour générer du TCN directement. À terme, on peut envisager un export TCN natif si ça t'intéresse. »</p>\n<p><strong>Note</strong> : Felder est un atelier souvent plus artisanal, moins technique. Adapte ton vocabulaire.</p>"}, {"title": "Scénario D — Menuisier avec SCM Morbidelli + Maestro Cabinet", "html": "<p><strong>Machine SCM, souvent avec l'autocollant jaune/noir. Logiciel Maestro Cabinet.</strong></p>\n<p><strong>Ce que tu demandes</strong> :\n- \"Maestro Active ou version précédente ?\"\n- \"Tu utilises Maestro Cabinet ou tu fais tout en générique ?\"\n- \"Tu as une CAO amont ou tu fais la conception dans Maestro ?\"</p>\n<p><strong>Ce que tu annonces</strong> :\n« Maestro peut lire mes DXF avec les conventions standard. Si tu es sur Cabinet, on peut explorer une intégration plus fine à terme (nomenclature, pièces paramétriques). »</p>"}, {"title": "Scénario E — Menuisier avec Holz-Her + NC-HOPS", "html": "<p><strong>Niche premium, atelier haut de gamme.</strong></p>\n<p><strong>Ce que tu demandes</strong> :\n- \"Quelle Pro-Master ou Dynestic ?\"\n- \"Tu utilises Polyboard avec un post HOP, ou tu importes DXF dans NC-HOPS ?\"</p>\n<p><strong>Ce que tu proposes</strong> :\n« Mes fichiers DXF peuvent être importés dans NC-HOPS avec configuration initiale de tes macros. Pour Polyboard utilisateurs, j'envisage à terme des exports compatibles. »</p>\n<hr />"}, {"title": "Note finale", "html": "<p>Ce document couvre les 5 marques qui représentent <strong>90% du parc machine CNC en menuiserie en France</strong>. Si tu rencontres une marque exotique (Anderson, Thermwood, Masterwood, etc.), applique le principe général : <strong>DXF R12 en mm avec conventions woodWOP + documentation PDF associée</strong>, et discute au cas par cas avec le menuisier pour adapter.</p>\n<p><strong>Principe d'or</strong> : tu ne dois <strong>jamais prétendre connaître</strong> tous les détails de chaque marque. Les menuisiers respectent la transparence. Si on te pose une question précise (ex. \"comment ça se passe avec un Biesse Rover C avec la version 2019 de bSolid ?\"), la bonne réponse est :</p>\n<blockquote>\n<p>\"Je ne connais pas cette config précise, mais j'aimerais la tester avec toi. Mon outil génère des DXF standards, on peut essayer ensemble l'import et adapter si besoin.\"</p>\n</blockquote>\n<p>Les menuisiers te rejoindront comme <strong>partenaires</strong> si tu les traites comme des experts de leur machine — ce qu'ils sont. Pas comme des cibles à convaincre.</p>\n<p><strong>Et n'oublie jamais</strong> : ce document te donne la grille de lecture. Les 3 premières visites d'atelier t'apprendront plus que 3 relectures de ce PDF. Fais-toi confiance pour adapter, noter ce qui te surprend, et revenir ici quand tu as besoin de vérifier un détail technique.</p>"}]}, {"id": "VI", "title": "Articulation avec le planning 20 semaines", "subtitle": "Comment utiliser L'Établi en lien avec ton planning", "sections": [{"title": "Introduction", "html": "<p><strong>Objet</strong> : ce document fait le pont entre <strong>L'Établi</strong> (le dossier que tu tiens entre les mains) et le <strong>planning de lancement 20 semaines</strong> que tu as en tant qu'application web. Il te dit, pour chaque phase et chaque semaine, quelles sections de L'Établi ouvrir en priorité.</p>\n<p><strong>Comment lire cette partie</strong> : d'abord la vue d'ensemble (comprendre le rôle complémentaire des deux outils), puis les tableaux de correspondance phase par phase, puis les conseils d'utilisation combinée.</p>\n<hr />"}, {"title": "1. Le rôle complémentaire des deux outils", "html": "<p>Tu disposes désormais de deux outils qui répondent à deux questions différentes.</p>\n<p>Le <strong>planning 20 semaines</strong> répond à la question <strong>\"quoi faire cette semaine ?\"</strong>. C'est ton fil conducteur opérationnel. Il découpe le temps en 20 unités, chaque semaine est découpée en 5 piliers (produit, marketing, prospection, juridique, business), chaque pilier a des tâches concrètes avec des durées estimées. Tu coches au fur et à mesure.</p>\n<p><strong>L'Établi</strong> répond à la question <strong>\"comment faire cette tâche ?\"</strong>. C'est ta bibliothèque de référence. Il contient les cadres méthodologiques, les scripts, les checklists, les connaissances techniques. Tu l'ouvres au moment où tu en as besoin, pas avant.</p>\n<p>En pratique : le <strong>lundi matin</strong>, tu ouvres ton planning, tu regardes les tâches de la semaine. Pour chaque tâche, <strong>si tu as un doute sur comment la faire, tu ouvres la partie correspondante de L'Établi</strong>. Le planning te dit le \"quoi\", L'Établi te donne le \"comment\".</p>\n<h3>Cas particulier des 4 premières semaines</h3>\n<p>Les 4 premières semaines du planning correspondent exactement au <strong>sprint opérationnel de la Partie I</strong> de L'Établi. La Partie I est donc le zoom détaillé jour par jour des semaines 1 à 4. Si le planning dit \"lancer la prospection menuisiers CNC\", la Partie I te donne le détail journalier de comment le faire, et la Partie II te donne les scripts exacts.</p>\n<p>Au-delà de la semaine 4, les Parties II, III, IV et V continuent d'être tes références permanentes — elles ne sont pas liées au sprint de 4 semaines, elles sont valables pour toute la durée du projet.</p>\n<hr />"}, {"title": "2. Cartographie globale par phase", "html": "<p>Voici, phase par phase, les parties de L'Établi à consulter en priorité. Garde ce tableau sous la main au début de chaque phase.</p>\n<h3>Phase 1 — Fondations (semaines 1 à 5)</h3>\n<p><strong>Répartition</strong> : 50 % produit, 20 % marketing, 10 % prospection, 10 % juridique, 10 % business.</p>\n<p><strong>Ton objectif global</strong> : finir le prototype technique, poser les bases marketing, enclencher la prospection menuisiers, préparer le juridique.</p>\n<p><strong>Partie de L'Établi la plus utile</strong> : <strong>Partie IV</strong> (étude technique) pour bien cadrer ton produit, <strong>Partie I</strong> (sprint 4 semaines) comme compagnon au quotidien.</p>\n<table>\n<thead>\n<tr>\n<th>Pilier</th>\n<th>Ce que le planning te demande</th>\n<th>L'Établi à consulter</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Produit</strong></td>\n<td>Finir outil fabrication, dashboard, intégrations ShapeDiver</td>\n<td>Partie IV §1.3 <em>(où ton outil s'insère)</em>, Partie IV §5 <em>(conventions DXF)</em>, Partie IV §7 <em>(stratégie d'adaptation)</em></td>\n</tr>\n<tr>\n<td><strong>Marketing</strong></td>\n<td>Cours : positionnement, branding, personas, SEO, réseaux sociaux</td>\n<td><em>(L'Établi ne couvre pas ces sujets — utilise les modules cours du planning)</em></td>\n</tr>\n<tr>\n<td><strong>Prospection</strong></td>\n<td>Lister 50 artisans cibles, premiers contacts</td>\n<td><strong>Partie II §1</strong> <em>(où trouver les cibles)</em>, <strong>Partie II §2</strong> <em>(email d'approche)</em>, <strong>Partie II §3</strong> <em>(script téléphone)</em></td>\n</tr>\n<tr>\n<td><strong>Juridique</strong></td>\n<td>CGV, contrats, mentions légales</td>\n<td><em>(L'Établi ne couvre pas — sujet à traiter avec un avocat spécialisé marketplace)</em></td>\n</tr>\n<tr>\n<td><strong>Business</strong></td>\n<td>Formule prix, pitch investisseur, BPI</td>\n<td><em>(voir ma réponse initiale sur la stratégie investisseurs dans notre conversation)</em></td>\n</tr>\n</tbody>\n</table>\n<h3>Phase 2 — Construction (semaines 6 à 10)</h3>\n<p><strong>Répartition</strong> : 40 % produit, 25 % marketing, 20 % prospection, 5 % juridique, 10 % business.</p>\n<p><strong>Ton objectif global</strong> : construire les briques techniques manquantes (auth, paiements, emails), passer aux premiers appels artisans, signer les premiers contrats.</p>\n<p><strong>Partie de L'Établi la plus utile</strong> : <strong>Partie II</strong> en exécution intensive, <strong>Partie III</strong> pour chaque démo.</p>\n<table>\n<thead>\n<tr>\n<th>Pilier</th>\n<th>Ce que le planning te demande</th>\n<th>L'Établi à consulter</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Produit</strong></td>\n<td>Auth Supabase, Stripe, emails, notifications</td>\n<td>Partie IV §7.2 <em>(architecture technique recommandée)</em>, Partie IV §7.3 <em>(bibliothèques techniques)</em></td>\n</tr>\n<tr>\n<td><strong>Marketing</strong></td>\n<td>Cours : publicité, copywriting, email marketing</td>\n<td><em>(cours du planning)</em></td>\n</tr>\n<tr>\n<td><strong>Prospection</strong></td>\n<td>Vagues d'appels, RDV de signature artisan</td>\n<td><strong>Partie II §4</strong> <em>(les questions en RDV)</em>, <strong>Partie II §5</strong> <em>(template debrief)</em>, <strong>Partie V §8</strong> <em>(scénarios de RDV par marque)</em></td>\n</tr>\n<tr>\n<td><strong>Juridique</strong></td>\n<td>Revues finales de contrats</td>\n<td>-</td>\n</tr>\n<tr>\n<td><strong>Business</strong></td>\n<td>Dossier BPI, mise à jour pitch</td>\n<td>-</td>\n</tr>\n</tbody>\n</table>\n<h3>Phase 3 — Pré-lancement (semaines 11 à 16)</h3>\n<p><strong>Répartition</strong> : 30 % produit, 30 % marketing, 25 % prospection, 5 % juridique, 10 % business.</p>\n<p><strong>Ton objectif global</strong> : transmettre les briques au développeur pour intégration Next.js, bêta fermée puis bêta clients, premières pubs.</p>\n<p><strong>Partie de L'Établi la plus utile</strong> : <strong>Partie III</strong> (checklist avant chaque démo bêta), <strong>Partie V</strong> (pour travailler avec les ateliers pilotes).</p>\n<table>\n<thead>\n<tr>\n<th>Pilier</th>\n<th>Ce que le planning te demande</th>\n<th>L'Établi à consulter</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Produit</strong></td>\n<td>Intégration Next.js, préparation démo bêta, itérations</td>\n<td><strong>Partie III complète</strong> <em>(checklist de validation avant chaque démo)</em>, Partie IV §7.4 <em>(ordre de priorité du dev)</em></td>\n</tr>\n<tr>\n<td><strong>Marketing</strong></td>\n<td>Préparation du lancement, premières pubs</td>\n<td><em>(cours du planning + retours terrain)</em></td>\n</tr>\n<tr>\n<td><strong>Prospection</strong></td>\n<td>Bêta fermée puis bêta clients, ateliers pilotes</td>\n<td><strong>Partie V §1-5</strong> <em>(workflow par marque)</em> à ouvrir à chaque visite, <strong>Partie V §7</strong> <em>(tableau comparatif)</em></td>\n</tr>\n<tr>\n<td><strong>Juridique</strong></td>\n<td>Mise à jour contrats bêta</td>\n<td>-</td>\n</tr>\n<tr>\n<td><strong>Business</strong></td>\n<td>Premières factures, reporting</td>\n<td>-</td>\n</tr>\n</tbody>\n</table>\n<h3>Phase 4 — Lancement (semaines 17 à 20)</h3>\n<p><strong>Répartition</strong> : 20 % produit, 35 % marketing, 25 % prospection, 5 % juridique, 15 % business.</p>\n<p><strong>Ton objectif global</strong> : lancement officiel, accélération, expansion géographique, premières vraies commandes.</p>\n<p><strong>Partie de L'Établi la plus utile</strong> : <strong>Partie V</strong> pour élargir la base artisan, <strong>Partie IV §7.4-7.5</strong> pour la roadmap dev post-lancement.</p>\n<table>\n<thead>\n<tr>\n<th>Pilier</th>\n<th>Ce que le planning te demande</th>\n<th>L'Établi à consulter</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Produit</strong></td>\n<td>Finitions, premiers correctifs retours utilisateurs</td>\n<td>Partie IV §7.4 <em>(priorités post-lancement)</em>, Partie IV §7.5 <em>(documentation pour artisans)</em></td>\n</tr>\n<tr>\n<td><strong>Marketing</strong></td>\n<td>Lancement officiel, scaling, SEO, partenariats</td>\n<td><em>(cours du planning + retours terrain)</em></td>\n</tr>\n<tr>\n<td><strong>Prospection</strong></td>\n<td>Nouvelles régions, nouveaux artisans</td>\n<td><strong>Partie V complète</strong> pour les prospects, <strong>Partie II</strong> à nouveau pour relancer ton pipeline</td>\n</tr>\n<tr>\n<td><strong>Juridique</strong></td>\n<td>Évolutions selon retours</td>\n<td>-</td>\n</tr>\n<tr>\n<td><strong>Business</strong></td>\n<td>KPI, unit economics, préparation levée</td>\n<td>-</td>\n</tr>\n</tbody>\n</table>\n<hr />"}, {"title": "3. Index rapide — quelle partie pour quelle situation", "html": "<p>Au-delà des phases, voici un index par situation concrète. Quand tu te retrouves dans une de ces situations au cours de n'importe quelle semaine, tu sais où chercher.</p>\n<table>\n<thead>\n<tr>\n<th>Situation concrète</th>\n<th>Partie de L'Établi à ouvrir</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Je prépare un email à envoyer à un menuisier</td>\n<td><strong>Partie II §2</strong></td>\n</tr>\n<tr>\n<td>Je dois appeler un menuisier au téléphone</td>\n<td><strong>Partie II §3</strong></td>\n</tr>\n<tr>\n<td>J'ai un RDV menuisier demain — que préparer ?</td>\n<td><strong>Partie II §4</strong> (questions) + <strong>Partie V §8</strong> (scénario selon marque)</td>\n</tr>\n<tr>\n<td>Je reviens d'un RDV menuisier — comment capitaliser</td>\n<td><strong>Partie II §5</strong> (template debrief)</td>\n</tr>\n<tr>\n<td>Je dois faire une démo technique de mon outil</td>\n<td><strong>Partie III complète</strong> (tour de contrôle)</td>\n</tr>\n<tr>\n<td>Mon DXF ne s'importe pas chez un menuisier Homag</td>\n<td><strong>Partie V §1</strong> (workflow Homag + mécanique import DXF)</td>\n</tr>\n<tr>\n<td>Mon DXF ne s'importe pas chez un menuisier Biesse</td>\n<td><strong>Partie V §2</strong> (workflow Biesse — 3 modes d'import)</td>\n</tr>\n<tr>\n<td>Je veux comprendre comment fonctionne une CNC bois</td>\n<td><strong>Partie IV §1 et §2</strong> (chaîne CAO→CAM→CNC, types de machines)</td>\n</tr>\n<tr>\n<td>Je dois choisir mon format de sortie</td>\n<td><strong>Partie IV §4</strong> (formats) + <strong>Partie IV §7</strong> (stratégie d'adaptation)</td>\n</tr>\n<tr>\n<td>Je dois documenter les connecteurs dans mon outil</td>\n<td><strong>Partie IV §6</strong> (spécifications Clamex, Cabineo, excentriques)</td>\n</tr>\n<tr>\n<td>Un menuisier me pose une question technique piège</td>\n<td><strong>Partie III §7</strong> (questions pièges à anticiper)</td>\n</tr>\n<tr>\n<td>Je veux savoir où en est ma semaine opérationnellement</td>\n<td>Le planning 20 semaines (pas L'Établi)</td>\n</tr>\n<tr>\n<td>Je veux comprendre une stratégie business sur 12 mois</td>\n<td><em>(voir notre conversation initiale — pas dans L'Établi)</em></td>\n</tr>\n</tbody>\n</table>\n<hr />"}, {"title": "4. Conseils d'utilisation combinée", "html": "<h3>Rituel du lundi matin</h3>\n<p>Chaque lundi, 15 minutes de cadrage : ouvre ton planning, lis les tâches de la semaine, pour chaque tâche vérifie si tu as un doute méthodologique. Si oui, note dans ton agenda la section de L'Établi à relire avant de démarrer la tâche. Tu évites ainsi de bricoler à l'aveugle ou de te retrouver bloqué en milieu de semaine.</p>\n<h3>Rituel du vendredi soir</h3>\n<p>Chaque vendredi, 15 minutes de bilan : coche dans le planning ce qui a été fait. Note ce qui a merdé et cherche dans L'Établi si tu trouves une réponse. Si une question n'a pas de réponse dans L'Établi, note-la dans un carnet à part — elle méritera peut-être d'être ajoutée dans une future version.</p>\n<h3>Avant chaque RDV menuisier</h3>\n<p>Le jour précédant le RDV : lecture rapide de la <strong>Partie II §4</strong> (questions à poser) et de la section <strong>Partie V</strong> correspondant à la marque du menuisier (Homag, Biesse, SCM, Felder, Holz-Her). Au besoin, imprime ces sections pour les avoir physiquement avec toi en RDV.</p>\n<h3>Avant chaque démo technique de ton outil</h3>\n<p>Le jour précédant la démo : tour de contrôle complet via la <strong>Partie III</strong>. Coche chaque item. Si un item échoue, tu corriges avant la démo. Mieux vaut une démo reportée d'un jour qu'une démo ratée.</p>\n<h3>Quand tu coinces sur une semaine</h3>\n<p>Si une semaine du planning te paraît infaisable (trop de choses, compétences manquantes, manque de temps), ne t'enlise pas seul. Reviens vers moi avec le contexte, je peux aider à découper, prioriser ou retirer des tâches. Le planning est une colonne vertébrale solide, pas un carcan.</p>\n<hr />"}, {"title": "5. Prochaines évolutions possibles", "html": "<p>Ce document s'enrichira au fur et à mesure de ton avancée. Voici ce qui peut y être ajouté quand le moment sera venu :</p>\n<p><strong>Après tes 5 premiers RDV menuisiers</strong> : une section \"Retours terrain consolidés\" qui capitalise les apprentissages. Dis-le-moi quand tu en seras là, on l'écrira ensemble.</p>\n<p><strong>Après la bêta fermée</strong> : une section \"Roadmap produit priorisée par retours utilisateurs\" qui traduit les retours en priorités dev concrètes.</p>\n<p><strong>Au moment de la levée de fonds</strong> : une partie dédiée à la préparation de la levée (pitch deck, data room, métriques à suivre, cible investisseurs). C'est un gros chapitre en soi qui méritera sa propre partie.</p>\n<p><strong>Si tu me partages le code source du planning</strong> : je pourrai intégrer directement dans l'application web des liens cliquables vers les sections de L'Établi, pour que chaque tâche du planning renvoie automatiquement à la bonne section du dossier. Ça évitera les allers-retours.</p>"}]}];

// État L'Établi (persisté)
var openPartie={}, openEtabliSection={}, readEtabli={}, readResource={};
try{readEtabli=JSON.parse(localStorage.getItem('tw_etabli_read')||'{}')}catch(e){}
try{readResource=JSON.parse(localStorage.getItem('tw_etabli_resource_read')||'{}')}catch(e){}
function saveEtabliState(){
  try{localStorage.setItem('tw_etabli_read',JSON.stringify(readEtabli))}catch(e){}
  try{localStorage.setItem('tw_etabli_resource_read',JSON.stringify(readResource))}catch(e){}
}

var customCours={};
try{customCours=JSON.parse(localStorage.getItem('tw_custom_cours')||'{}')}catch(e){}
var addingCours=false;
function saveCustomCours(){try{localStorage.setItem('tw_custom_cours',JSON.stringify(customCours))}catch(e){}}

function togglePartie(pid){openPartie[pid]=!openPartie[pid];renderEtabli()}
function toggleEtabliSection(key){
  openEtabliSection[key]=!openEtabliSection[key];
  if(openEtabliSection[key]){readEtabli[key]=true;saveEtabliState()}
  renderEtabli();
}
function markResourceRead(key,ev){
  if(ev)ev.stopPropagation();
  readResource[key]=!readResource[key];
  saveEtabliState();
  renderSemaine();
}

function renderEtabli(){
  var h='<div class="etabli-section"><h2>L\'Établi</h2>';
  h+='<p class="etabli-intro">Dossier stratégique et technique complet pour The Wooder. 6 parties couvrant le sprint opérationnel, la prospection, la validation technique, l\'écosystème CNC, les workflows par marque et l\'articulation avec ce planning. Clique sur une partie pour la déplier, puis sur une section pour lire le contenu.</p>';
  ETABLI.forEach(function(partie){
    var isO=!!openPartie[partie.id];
    h+='<div class="etabli-partie">';
    h+='<button class="etabli-partie-header" onclick="togglePartie(\''+partie.id+'\')">';
    h+='<span class="etabli-partie-id">'+partie.id+'</span>';
    h+='<div class="etabli-partie-titles"><div class="etabli-partie-title">'+partie.title+'</div><div class="etabli-partie-subtitle">'+partie.subtitle+'</div></div>';
    h+='<span class="etabli-chevron'+(isO?' open':'')+'">▼</span></button>';
    if(isO){
      h+='<div class="etabli-sections">';
      partie.sections.forEach(function(sec,si){
        var key=partie.id+'-'+si;
        var sOpen=!!openEtabliSection[key];
        var sRead=!!readEtabli[key];
        h+='<div class="etabli-section-item">';
        h+='<button class="etabli-section-header" onclick="toggleEtabliSection(\''+key+'\')">';
        h+='<span class="etabli-section-title">'+escapeHtml(sec.title)+'</span>';
        if(sRead)h+='<span class="etabli-section-read">✓ Lu</span>';
        h+='<span class="etabli-chevron'+(sOpen?' open':'')+'">▼</span></button>';
        if(sOpen){
          h+='<div class="etabli-section-content">'+sec.html+'</div>';
        }
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('viewEtabli').innerHTML=h;
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

var openRessources={};
function toggleRessources(){openRessources[activePhase+'-'+activeSemaine]=!openRessources[activePhase+'-'+activeSemaine];renderSemaine()}

function openEtabliFromResource(partieId,secIdx){
  // Basculer sur la vue Établi et ouvrir la bonne section
  switchView('etabli');
  openPartie[partieId]=true;
  openEtabliSection[partieId+'-'+secIdx]=true;
  readEtabli[partieId+'-'+secIdx]=true;
  saveEtabliState();
  renderEtabli();
  // Scroll jusqu'à la section
  setTimeout(function(){
    var el=document.querySelector('#viewEtabli .etabli-section-content');
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

function renderRessourcesBloc(){
  var key=activePhase+'-'+activeSemaine;
  var resources=WEEK_RESOURCES[key];
  if(!resources||!resources.length)return '';
  var isO=openRessources[key]!==false;
  var readCount=0;
  resources.forEach(function(r,ri){
    var rk=key+'-r'+ri;
    if(readResource[rk])readCount++;
  });
  var h='<div class="ressources-bloc">';
  h+='<button class="ressources-header" onclick="toggleRessources()">';
  h+='<span class="ressources-emoji">📖</span>';
  h+='<div class="ressources-info"><div class="ressources-title">Ressources L\'Établi</div>';
  h+='<div class="ressources-sub">'+readCount+'/'+resources.length+' sections lues cette semaine</div></div>';
  h+='<span class="ressources-arrow'+(isO?' open':'')+'">▼</span></button>';
  if(isO){
    h+='<div class="ressources-body">';
    resources.forEach(function(r,ri){
      var rk=key+'-r'+ri;
      var isRead=!!readResource[rk];
      h+='<div class="ressource-link" onclick="openEtabliFromResource(\''+r.p+'\','+r.s+')">';
      h+='<span style="flex:1">'+escapeHtml(r.label)+'</span>';
      h+='<span onclick="markResourceRead(\''+rk+'\',event)" style="padding:2px 6px;cursor:pointer;font-size:14px" title="Marquer lu">'+(isRead?'✅':'⬜')+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div>';
  return h;
}

// Override renderSemaine pour injecter le bloc ressources en tête
var _origRenderSemaine=renderSemaine;
renderSemaine=function(){
  _origRenderSemaine();
  var ressources=renderRessourcesBloc();
  if(ressources){
    var blocs=document.getElementById('blocsContainer');
    blocs.innerHTML=ressources+blocs.innerHTML;
  }
};

// ═══════════════════════════════════════
// AJOUT DE COURS PERSONNALISÉS
// ═══════════════════════════════════════
function toggleAddCours(){addingCours=!addingCours;renderCoursWithCustom()}
function saveNewCours(){
  var titre=document.getElementById('newCoursTitre').value.trim();
  var phase=document.getElementById('newCoursPhase').value;
  var content=document.getElementById('newCoursContent').value.trim();
  if(!titre||!content){alert('Merci de remplir le titre et le contenu');return}
  // Convertir texte simple en HTML basique (paragraphes, titres via ###)
  var html=content.split(/\n\n+/).map(function(block){
    block=block.trim();
    if(!block)return '';
    if(block.startsWith('### '))return '<h4>'+escapeHtml(block.substring(4))+'</h4>';
    if(block.startsWith('## '))return '<h3>'+escapeHtml(block.substring(3))+'</h3>';
    if(block.startsWith('# '))return '<h3>'+escapeHtml(block.substring(2))+'</h3>';
    if(block.startsWith('💡 '))return '<div class="tip">'+escapeHtml(block)+'</div>';
    if(block.startsWith('✅ '))return '<div class="example">'+escapeHtml(block)+'</div>';
    if(block.startsWith('- ')){
      var items=block.split('\n').filter(function(l){return l.trim().startsWith('- ')}).map(function(l){return '<li>'+escapeHtml(l.trim().substring(2))+'</li>'});
      return '<ul>'+items.join('')+'</ul>';
    }
    return '<p>'+escapeHtml(block).replace(/\n/g,'<br>')+'</p>';
  }).join('\n');
  customCours[titre]={phase:parseInt(phase),content:html,timestamp:Date.now()};
  saveCustomCours();
  addingCours=false;
  renderCoursWithCustom();
}
function deleteCustomCours(titre,ev){
  ev.stopPropagation();
  if(!confirm('Supprimer ce cours ?'))return;
  delete customCours[titre];
  saveCustomCours();
  renderCoursWithCustom();
}

function renderCoursWithCustom(){
  var h='<div class="cours-section"><h2>Programme de formation marketing</h2>';
  h+='<p class="intro">20 modules intégrés au planning + tes propres formations. Clique sur un cours pour lire le contenu. Tu peux ajouter autant de cours personnalisés que tu veux.</p>';
  // Bouton ajout
  if(addingCours){
    h+='<div class="add-cours-form">';
    h+='<input id="newCoursTitre" type="text" placeholder="Titre du cours" />';
    h+='<select id="newCoursPhase"><option value="1">Phase 1 — Fondations</option><option value="2">Phase 2 — Construction</option><option value="3">Phase 3 — Pré-lancement</option><option value="4">Phase 4 — Lancement</option></select>';
    h+='<textarea id="newCoursContent" placeholder="Contenu (utilise ### pour un titre, - pour une liste, ligne vide pour séparer paragraphes)"></textarea>';
    h+='<div class="add-cours-form-actions">';
    h+='<button class="btn-cancel" onclick="toggleAddCours()">Annuler</button>';
    h+='<button class="btn-save" onclick="saveNewCours()">Ajouter</button>';
    h+='</div></div>';
  } else {
    h+='<button class="add-cours-btn" onclick="toggleAddCours()">+ Ajouter un cours personnalisé</button>';
  }
  // Cours personnalisés
  var customList=Object.keys(customCours);
  if(customList.length){
    h+='<div class="cours-phase" style="color:#2E7D32">Tes cours personnalisés</div>';
    customList.forEach(function(titre,ci){
      var cKey='custom-'+ci;
      var isOpen=!!openCours[cKey];
      h+='<div class="cours-item"><button class="cours-item-header" onclick="toggleCours(\''+cKey+'\')">';
      h+='<span class="cours-sem">★</span>';
      h+='<span class="cours-name">'+escapeHtml(titre)+'<span class="custom-cours-tag">perso</span></span>';
      h+='<span class="cours-delete" onclick="deleteCustomCours(\''+titre.replace(/'/g,"\\'")+'\',event)">✕</span>';
      h+='<span class="cours-chevron'+(isOpen?' open':'')+'">▼</span></button>';
      if(isOpen)h+='<div class="cours-content">'+customCours[titre].content+'</div>';
      h+='</div>';
    });
  }
  // Cours natifs du planning
  PHASES.forEach(function(ph){
    var cours=[];
    ph.semaines.forEach(function(sem){
      sem.blocs.forEach(function(bl){
        bl.t.forEach(function(t){
          if(t.indexOf('📚')===0){var name=t.replace('📚 COURS : ','');cours.push({sem:sem.num,titre:name})}
        });
      });
    });
    if(cours.length){
      h+='<div class="cours-phase" style="color:'+ph.color+'">Phase '+ph.id+' — '+ph.title+'</div>';
      cours.forEach(function(c,ci){
        var cKey=ph.id+'-'+ci;
        var isOpen=!!openCours[cKey];
        var content=COURS[c.titre]||'<p>Contenu à venir — tu peux l\'ajouter en cliquant sur "Ajouter un cours personnalisé" en haut.</p>';
        h+='<div class="cours-item"><button class="cours-item-header" onclick="toggleCours(\''+cKey+'\')">';
        h+='<span class="cours-sem">S'+c.sem+'</span>';
        h+='<span class="cours-name">'+c.titre+'</span>';
        h+='<span class="cours-chevron'+(isOpen?' open':'')+'">▼</span></button>';
        if(isOpen)h+='<div class="cours-content">'+content+'</div>';
        h+='</div>';
      });
    }
  });
  h+='</div>';
  document.getElementById('viewCours').innerHTML=h;
}

// Remplacer renderCours par renderCoursWithCustom
renderCours=renderCoursWithCustom;

// Override switchView pour gérer le 3ᵉ onglet
var _origSwitchView=switchView;
switchView=function(v){
  document.getElementById('viewPlanning').style.display=v==='planning'?'':'none';
  document.getElementById('viewCours').style.display=v==='cours'?'':'none';
  document.getElementById('viewEtabli').style.display=v==='etabli'?'':'none';
  document.getElementById('navPlanning').className='nav-btn'+(v==='planning'?' active':'');
  document.getElementById('navCours').className='nav-btn'+(v==='cours'?' active':'');
  document.getElementById('navEtabli').className='nav-btn'+(v==='etabli'?' active':'');
};

// Rendre L'Établi au chargement
renderEtabli();
renderCoursWithCustom();
renderSemaine();

</script>
